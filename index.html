<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Guru - Full Fitur (Simulasi)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config={theme:{extend:{colors:{kop:'#1a2744',kopAccent:'#c9a84c',dark:'#0f1923',card:'#182538',border:'#2a3f5f',muted:'#7a8ba5',light:'#e8ecf1',success:'#22c55e',danger:'#ef4444',warning:'#f59e0b',info:'#06b6d4'},fontFamily:{display:['Playfair Display','serif'],body:['Source Sans 3','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(24,37,56,0.9);backdrop-filter:blur(12px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:#1a2744;border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:20px}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:rgba(239,68,68,0.15);border:1px solid #ef4444;color:#ef4444;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-danger:hover{background:#ef4444;color:white}

/* Print Styles */
@media print {
    @page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }
    body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
    .no-print { display: none !important; }
    .print-page { width: 100%; padding: 0; background: white; color: black; }
    .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
    .kop-surat img { height: 75px; width: auto; object-fit: contain; }
    .kop-text { text-align: center; line-height: 1.3; flex: 1; }
    .kop-text h1 { font-family: 'Times New Roman', serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .kop-text h2 { font-family: 'Times New Roman', serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .kop-text .kop-sub { font-family: 'Times New Roman', serif; font-size: 10pt; margin-top: 2px; font-style: normal; }
    .ujian-title { text-align: center; margin-bottom: 20px; }
    .ujian-title h3 { font-family: 'Times New Roman', serif; font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }
    .ujian-title p { font-family: 'Times New Roman', serif; font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }
    .soal-header { margin-bottom: 20px; }
    .soal-header table { width: 100%; font-family: 'Times New Roman', serif; font-size: 12pt; }
    .soal-header td { padding: 2px 0; vertical-align: bottom; }
    .soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }
    .section-heading { font-family: 'Times New Roman', serif; font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
    .petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }
    .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
    .soal-num { float: left; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 12pt; width: 35px; flex-shrink: 0; }
    .soal-text { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; }
    .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
    .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.4; text-align: left; }
    .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
    .opsi-label::after { content: "."; }
    .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }
    .clearfix::after { content: ""; display: table; clear: both; }
    .ttd-section { display: none; } 
}

/* Preview Styles */
.print-preview-wrap { background: #e5e7eb; padding: 40px; border-radius: 8px; display: flex; justify-content: center; overflow-x: auto; }
.print-preview-sheet { background: white; color: black; width: 210mm; max-width: 100%; min-height: 297mm; padding: 1.5cm 2cm 2cm 2cm; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.4; transform-origin: top center; }
.print-preview-sheet .kop-surat { display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; }
.print-preview-sheet .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
.print-preview-sheet .kop-surat img { height: 75px; width: auto; object-fit: contain; }
.print-preview-sheet .kop-text { text-align: center; line-height: 1.3; flex: 1; }
.print-preview-sheet .kop-text h1 { font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
.print-preview-sheet .kop-text h2 { font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
.print-preview-sheet .kop-text .kop-sub { font-size: 10pt; margin-top: 2px; color: #555; }
.print-preview-sheet .ujian-title { text-align: center; margin-bottom: 20px; }
.print-preview-sheet .ujian-title h3 { font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }
.print-preview-sheet .ujian-title p { font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }
.print-preview-sheet .soal-header { margin-bottom: 20px; }
.print-preview-sheet .soal-header table { width: 100%; font-size: 12pt; }
.print-preview-sheet .soal-header td { padding: 2px 0; vertical-align: bottom; }
.print-preview-sheet .soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }
.print-preview-sheet .section-heading { font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
.print-preview-sheet .petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }
.print-preview-sheet .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
.print-preview-sheet .soal-num { float: left; font-weight: bold; font-size: 12pt; width: 35px; flex-shrink: 0; }
.print-preview-sheet .soal-text { font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; margin-bottom: 8px; }
.print-preview-sheet .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
.print-preview-sheet .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12pt; line-height: 1.4; text-align: left; }
.print-preview-sheet .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
.print-preview-sheet .opsi-label::after { content: '.'; }
.print-preview-sheet .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #ccc; height: 80px; border-radius: 4px; background-color: #fafafa; }
.print-preview-sheet .ttd-section { display: none; }
.print-preview-sheet .clearfix::after { content: ""; display: table; clear: both; }
</style>
</head>
<body>

<!-- LOGIN / REGISTER GURU -->
<div id="loginPage" class="login-bg">
    <div class="glass rounded-2xl p-8 w-full max-w-lg fade-in">
        <div class="text-center mb-6">
            <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">PANEL GURU</h1>
            <p class="text-muted text-sm">Sistem Manajemen Ujian Sekolah (Demo Mode)</p>
        </div>

        <!-- FORM DAFTAR GURU BARU -->
        <div id="registerForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">NIP Guru</label>
                    <input type="number" id="regNip" class="input-field" placeholder="Contoh: 12345">
                </div>
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">Nama Lengkap</label>
                    <input type="text" id="regNama" class="input-field" placeholder="Nama Anda">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">Jenis Guru</label>
                    <select id="regJenis" class="input-field" onchange="handleJenisChange()">
                        <option value="kelas">Guru Kelas (1-6)</option>
                        <option value="pai">Guru PAI</option>
                        <option value="pjok">Guru PJOK</option>
                    </select>
                </div>
                
                <!-- Hanya muncul jika Guru Kelas -->
                <div id="wrapperKelas">
                    <label class="text-xs text-muted font-semibold uppercase">Kelas Ampuan</label>
                    <select id="regKelas" class="input-field">
                        <option value="Kelas 1">Kelas 1</option>
                        <option value="Kelas 2">Kelas 2</option>
                        <option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option>
                        <option value="Kelas 5">Kelas 5</option>
                        <option value="Kelas 6">Kelas 6</option>
                    </select>
                </div>

                <!-- Wajib semua guru -->
                <div id="wrapperRombel">
                    <label class="text-xs text-muted font-semibold uppercase">Rombel</label>
                    <select id="regRombel" class="input-field">
                        <option value="A">Rombel A</option>
                        <option value="B">Rombel B</option>
                        <option value="C">Rombel C</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password Baru</label>
                <input type="password" id="regPass" class="input-field" placeholder="Buat password">
            </div>
            <button onclick="doRegister()" class="btn-primary w-full mt-2">Daftar Akun Baru</button>
            <p class="text-center text-xs text-muted mt-2">Sudah punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Login disini</a></p>
        </div>

        <!-- FORM LOGIN GURU -->
        <div id="loginForm" class="space-y-4 hidden">
            <div>
                <label class="text-xs text-muted font-semibold uppercase">NIP Guru</label>
                <input type="number" id="logUser" class="input-field" placeholder="Masukkan NIP">
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password</label>
                <input type="password" id="logPass" class="input-field" placeholder="Password">
            </div>
            <button onclick="doLogin()" class="btn-primary w-full mt-2">Masuk Panel</button>
            <button onclick="doResetPassword()" class="btn-secondary w-full text-xs text-danger mt-2">Lupa Password?</button>
            <p class="text-center text-xs text-muted mt-2">Belum punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Daftar Guru Baru</a></p>
        </div>
    </div>
</div>

<!-- MAIN APP GURU -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-6 border-b border-border">
        <h2 class="font-display text-xl font-bold text-kopAccent">PANEL GURU</h2>
        <p id="userGreeting" class="text-xs text-muted mt-1">Selamat Datang</p>
    </div>
    <nav class="py-4">
        <div class="nav-item active" onclick="nav('dashboard')"><i class="fas fa-home w-5"></i>Dashboard</div>
        <div class="nav-item" onclick="nav('siswa')"><i class="fas fa-users w-5"></i>Data Siswa</div>
        <div class="nav-item" onclick="nav('soal-view')"><i class="fas fa-file-alt w-5"></i>Bank Soal</div> 
        <div class="nav-item" onclick="nav('kisi')"><i class="fas fa-table w-5"></i>Kisi-Kisi</div> 
        <div class="nav-item" onclick="nav('kunci')"><i class="fas fa-key w-5"></i>Kunci Jawaban</div> 
        <div class="nav-item" onclick="nav('print')"><i class="fas fa-print w-5"></i>Cetak Soal</div> 
        <div class="nav-item" onclick="nav('ujian')"><i class="fas fa-clock w-5"></i>Atur Ujian & Token</div>
        <div class="nav-item" onclick="nav('koreksi')"><i class="fas fa-check-double w-5"></i>Koreksi Jawaban</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="logout()" class="btn-danger w-full"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen bg-dark p-6">
    <div id="contentArea"></div>
</div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div id="modalContent"></div>
    </div>
</div>

<script>
// --- 1. DATA DUMMY & UTILITAS LOCALSTORAGE ---
var MAPEL = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},
    {id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},
    {id:'ipas',nama:'IPAS'},
    {id:'sbd',nama:'Seni Budaya'},
    {id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},
    {id:'pai',nama:'PAI'},
    {id:'pjok',nama:'PJOK'}
];

// Inisialisasi Data Dummy jika kosong (Agar user bisa langsung lihat fitur)
function initData(){
    if(!localStorage.getItem('soalList')){
        var dummySoal = [
            {id:'s1', mapel:'mat', kelas:'Kelas 1', type:'pg', text:'Berapa hasil 5 + 3?', options:['6','7','8','9'], answer:2, indicator:'Operasi hitung penjumlahan', score:2},
            {id:'s2', mapel:'pai', kelas:'Kelas 4', rombel:'A', type:'pg', text:'Rukun Islam yang pertama adalah...', options:['Sholat','Puasa','Zakat','Syahadat'], answer:3, indicator:'Memahami Rukun Islam', score:2},
            {id:'s3', mapel:'pjok', kelas:'Kelas 6', rombel:'B', type:'uraian', text:'Jelaskan teknik dasar passing bawah dalam permainan bola voli!', options:[], answer:'Passing bawah adalah cara memukul bola dari bawah dengan dua tangan rapat...', indicator:'Teknik dasar bola voli', score:5}
        ];
        localStorage.setItem('soalList', JSON.stringify(dummySoal));
    }
    if(!localStorage.getItem('users_guru')) localStorage.setItem('users_guru', JSON.stringify([]));
    if(!localStorage.getItem('data_siswa')) localStorage.setItem('data_siswa', JSON.stringify([]));
    if(!localStorage.getItem('token_ujian')) localStorage.setItem('token_ujian', JSON.stringify({})); // Object per mapel
    if(!localStorage.getItem('jawaban_siswa')) localStorage.setItem('jawaban_siswa', JSON.stringify([]));
}
initData();

// --- 2. STATE MANAGEMENT ---
var currentUser = null;
var tokenData = JSON.parse(localStorage.getItem('token_ujian'));

// --- 3. FUNGSI UTILITAS ---
function getMapelName(id){ var m=MAPEL.find(function(x){return x.id===id;}); return m?m.nama:id; }

// Tentukan Mapel apa saja yang boleh diakses Guru ini
function getTeacherMapels() {
    if (!currentUser) return [];
    if (currentUser.jenis === 'kelas') {
        // Guru Kelas: Semua mapel KECUALI PAI & PJOK
        return MAPEL.filter(m => m.id !== 'pai' && m.id !== 'pjok');
    } else {
        // Guru PAI / PJOK: Hanya mapelnya sendiri
        return MAPEL.filter(m => m.id === currentUser.jenis);
    }
}

// Fungsi Helper Refresh Data dari LocalStorage
function refreshData(){
    var soalList = JSON.parse(localStorage.getItem('soalList')) || [];
    var siswaList = JSON.parse(localStorage.getItem('data_siswa')) || [];
    var jawabanList = JSON.parse(localStorage.getItem('jawaban_siswa')) || [];
    tokenData = JSON.parse(localStorage.getItem('token_ujian')) || {};
    return {soalList, siswaList, jawabanList, tokenData};
}

// --- 4. LOGIKA FILTER SOAL (UPDATED) ---
function getFilteredQuestions(allQuestions, mapelFilter, typeFilter) {
    var availableMapels = getTeacherMapels();
    var result = allQuestions;

    // 1. Filter MAPEL (Berdasarkan Jenis Guru)
    result = result.filter(s => availableMapels.find(m => m.id === s.mapel));

    // 2. Filter Mapel Tambahan (Jika user pilih mapel spesifik di dropdown)
    if (mapelFilter) {
        result = result.filter(s => s.mapel === mapelFilter);
    }

    // 3. Filter KELAS & ROMBEL (LOGIKA BARU)
    if (currentUser.jenis === 'kelas') {
        // Guru Kelas: Hanya lihat kelas ampuannya
        result = result.filter(s => s.kelas === currentUser.kelas);
    } else {
        // Guru PAI/PJOK: Lihat sesuai Kelas & Rombel yang diinput saat register
        result = result.filter(s => s.kelas === currentUser.kelas && s.rombel === currentUser.rombel);
    }

    // 4. Filter Tipe Soal
    if (typeFilter) {
        result = result.filter(s => s.type === typeFilter);
    }

    return result;
}

// --- 5. AUTH GURU ---
function toggleLoginMode(){
    document.getElementById('registerForm').classList.toggle('hidden');
    document.getElementById('loginForm').classList.toggle('hidden');
}

function handleJenisChange(){
    var jenis = document.getElementById('regJenis').value;
    var wrapK = document.getElementById('wrapperKelas');
    if(jenis === 'kelas'){
        wrapK.classList.remove('hidden');
    } else {
        wrapK.classList.add('hidden');
    }
}

function doRegister(){
    var nip = document.getElementById('regNip').value;
    var nama = document.getElementById('regNama').value;
    var jenis = document.getElementById('regJenis').value;
    var kelas = (jenis==='kelas') ? document.getElementById('regKelas').value : 'Semua'; // Untuk PAI/PJOK, user bisa pilih kelas nanti di edit profil atau saat register kita tambahkan input manual
    var rombel = document.getElementById('regRombel').value;
    var pass = document.getElementById('regPass').value;

    if(!nip || !nama || !pass) return alert("Mohon lengkapi data!");

    // Simpan ke LocalStorage
    var users = JSON.parse(localStorage.getItem('users_guru'));
    if(users.find(u=>u.nip===nip)) return alert("NIP sudah terdaftar!");

    users.push({
        nip: nip, nama: nama, jenis: jenis, kelas: kelas, rombel: rombel, password: pass
    });
    localStorage.setItem('users_guru', JSON.stringify(users));
    
    alert("Registrasi Berhasil! Silakan Login.");
    toggleLoginMode();
}

function doLogin(){
    var user = document.getElementById('logUser').value;
    var pass = document.getElementById('logPass').value;
    
    var users = JSON.parse(localStorage.getItem('users_guru'));
    var found = users.find(u => u.nip === user && u.password === pass);

    if(found){
        currentUser = found;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('userGreeting').innerText = currentUser.nama;
        nav('dashboard');
    } else {
        alert("Login Gagal! Cek NIP dan Password.");
    }
}

function doResetPassword(){
    var nip = prompt("Masukkan NIP untuk reset password:");
    if(!nip) return;
    var users = JSON.parse(localStorage.getItem('users_guru'));
    var idx = users.findIndex(u=>u.nip===nip);
    if(idx > -1){
        if(confirm("Set password default menjadi '123456'?")){
            users[idx].password = '123456';
            localStorage.setItem('users_guru', JSON.stringify(users));
            alert("Password berhasil direset.");
        }
    } else {
        alert("NIP tidak ditemukan.");
    }
}

function logout(){
    currentUser = null;
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginForm').reset();
}

// --- 6. NAVIGASI ---
function nav(page){
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    var c = document.getElementById('contentArea');
    
    if(page==='dashboard') renderDashboard(c);
    else if(page==='siswa') renderSiswa(c);
    else if(page==='soal-view') renderSoalView(c);
    else if(page==='kisi') renderKisi(c);
    else if(page==='kunci') renderKunci(c);
    else if(page==='print') renderPrint(c);
    else if(page==='ujian') renderUjian(c);
    else if(page==='koreksi') renderKoreksi(c);
}

function openAddSiswa(){
    var html = '<h3 class="font-bold mb-4">Tambah Siswa</h3>'+
        '<input id="inNisn" class="input-field mb-2" placeholder="NISN">'+
        '<input id="inNama" class="input-field mb-2" placeholder="Nama Lengkap">'+
        '<select id="inKelas" class="input-field mb-2">'+
            ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'].map(k=>'<option value="'+k+'">'+k+'</option>').join('')+
        '</select>'+
        '<input id="inRombel" class="input-field mb-2" value="'+currentUser.rombel+'" readonly>'+
        '<button onclick="saveSiswa()" class="btn-primary w-full">Simpan</button>';
    openModal(html);
}

function saveSiswa(){
    var data = refreshData();
    var nisn = document.getElementById('inNisn').value;
    var nama = document.getElementById('inNama').value;
    var kelas = document.getElementById('inKelas').value;
    if(!nisn || !nama) return alert("Data tidak lengkap");
    
    data.siswaList.push({
        id: Date.now().toString(),
        nisn:nisn, nama:nama, kelas:kelas, rombel:currentUser.rombel
    });
    localStorage.setItem('data_siswa', JSON.stringify(data.siswaList));
    closeModal();
    renderSiswa();
}

function deleteSiswa(id){
    if(confirm("Hapus siswa ini?")){
        var data = refreshData();
        data.siswaList = data.siswaList.filter(s=>s.id!==id);
        localStorage.setItem('data_siswa', JSON.stringify(data.siswaList));
        renderSiswa();
    }
}

function renderUjian(c){
    var availableMapels = getTeacherMapels();
    
    c.innerHTML = '<div class="card fade-in">'+
        '<h3 class="font-bold text-lg mb-4">Atur Ujian</h3>'+

            '<label class="text-xs text-muted font-bold mb-1 block">Pilih Mapel untuk Diatur</label>'+
            '<select id="ujianMapelSelect" class="input-field" onchange="renderTokenControls()">'+
                availableMapels.map(m=>'<option value="'+m.id+'">'+m.nama+'</option>').join('')+
            '</select>'+
        '</div>'+
        '<div id="tokenControlsArea"></div>'+
    '</div>';

}

function renderTokenControls(){
    var mapel = document.getElementById('ujianMapelSelect').value;
    var container = document.getElementById('tokenControlsArea');
    
    // Ambil data token spesifik mapel ini dari global tokenData
    var myToken = (tokenData && tokenData[mapel]) ? tokenData[mapel] : { token: '', durasi: 60 };

    container.innerHTML = 
        '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">'+
            '<div>'+
                '<label class="text-xs text-muted font-bold mb-1 block">Set Token Ujian</label>'+
                '<input type="text" id="tokenInput" class="input-field mb-2" value="'+myToken.token+'" placeholder="Masukkan Token">'+
                '<button onclick="setToken(\''+mapel+'\')" class="btn-primary w-full">Simpan Token</button>'+
            '</div>'+
            '<div>'+
                '<label class="text-xs text-muted font-bold mb-1 block">Durasi Ujian (Menit)</label>'+
                '<input type="number" id="durasiInput" class="input-field mb-2" value="'+myToken.durasi+'">'+
                '<button onclick="setDurasi(\''+mapel+'\')" class="btn-secondary w-full">Update Durasi</button>'+
            '</div>'+
        '</div>'+
        '<div class="mt-4 p-4 bg-dark/50 rounded border border-border">'+
            '<h4 class="text-sm font-bold text-warning mb-2">STATUS TOKEN '+getMapelName(mapel).toUpperCase()+':</h4>'+
            '<p class="text-sm">Token Aktif: <span class="font-bold text-kopAccent">'+(myToken.token||'TIDAK ADA')+'</span></p>'+
            '<p class="text-sm">Durasi: <span class="font-bold text-info">'+myToken.durasi+' Menit</span></p>'+
        '</div>';
}

function setToken(mapelId){
    var t = document.getElementById('tokenInput').value;
    if(!tokenData) tokenData = {};
    tokenData[mapelId] = {
        token: t,
        durasi: parseInt(document.getElementById('durasiInput').value)||60,
        guruId: currentUser.id || currentUser.nip,
        mapel: mapelId
    };
    localStorage.setItem('token_ujian', JSON.stringify(tokenData));
    alert("Token Berhasil Disimpan untuk Mapel: " + getMapelName(mapelId));
    renderTokenControls();
}

function setDurasi(mapelId){
    if(!tokenData || !tokenData[mapelId]) return alert("Set token dulu!");
    var d = document.getElementById('durasiInput').value;
    tokenData[mapelId].durasi = parseInt(d);
    localStorage.setItem('token_ujian', JSON.stringify(tokenData));
    renderTokenControls();
}

        '<div class="space-y-4" id="koreksiList"></div></div>';

    var list = document.getElementById('koreksiList');
    if(myAnswers.length===0){
        list.innerHTML = '<p class="text-center text-muted">Belum ada jawaban masuk.</p>';
    } else {
        list.innerHTML = myAnswers.map(j=`
            <div class="p-4 bg-dark/30 border border-border rounded-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="font-bold text-kopAccent">${j.namaSiswa}</span>

                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <h5 class="text-xs font-bold text-muted uppercase">PG (Auto Score)</h5>
                        <p class="text-sm font-bold text-success">Benar: ${j.pgScore || 0}</p>
                    </div>

                        <h5 class="text-xs font-bold text-muted uppercase">Uraian (Manual)</h5>
                        <textarea id="essayNote-${j.id}" class="input-field text-xs mt-1" rows="2" placeholder="Catatan koreksi...">${j.essayNote||''}</textarea>
                        <div class="mt-2 flex gap-2">
                            <button onclick="saveKoreksi('${j.id}')" class="btn-primary text-xs py-1 px-2">Simpan Nilai</button>
                        </div>
                    </div>
                </div>
            </div>

function saveKoreksi(id){
    var data = refreshData();
    var note = document.getElementById('essayNote-'+id).value;
    var idx = data.jawabanList.findIndex(j=>j.id===id);
    if(idx > -1){
        data.jawabanList[idx].essayNote = note;
        data.jawabanList[idx].status = 'Dikoreksi';
        data.jawabanList[idx].dikoreksiOleh = currentUser.nama;
        localStorage.setItem('jawaban_siswa', JSON.stringify(data.jawabanList));
        alert("Data koreksi disimpan.");
    }
}

// --- 15. MODAL & PRINT UTILS ---
function openModal(html){
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('modalContent').innerHTML = html;
}
function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
}

function doPrintGeneric(containerId){
    var sheet = document.querySelector('#'+containerId+' .print-preview-sheet');
    if(!sheet) return;
    var printContent = sheet.innerHTML;
    
    var iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='0'; iframe.style.width='210mm'; iframe.style.height='297mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><style>@page{size:A4 portrait;margin:1cm}body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}</style></head><body>');
    doc.write(printContent);
    doc.write('</body></html>');
    doc.close();
    setTimeout(function(){
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(function(){document.body.removeChild(iframe);},3000);
    },500);
}
