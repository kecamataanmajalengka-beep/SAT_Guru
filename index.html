<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0c1222;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#141d30}::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:4px}
.login-bg{background:linear-gradient(160deg,#0c1222 0%,#0f2027 30%,#141d30 60%,#0c1222 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,148,136,0.1) 0%,transparent 70%);top:-100px;left:-100px;border-radius:50%;animation:pulse 6s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,0.06) 0%,transparent 70%);bottom:-80px;right:-80px;border-radius:50%;animation:pulse 8s ease-in-out infinite reverse}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.15);opacity:1}}
.glass{background:rgba(20,29,48,0.88);backdrop-filter:blur(20px);border:1px solid rgba(30,45,74,0.6)}
.sidebar{width:250px;min-height:100vh;background:linear-gradient(180deg,#111827 0%,#0c1222 100%);border-right:1px solid #1e2d4a;position:fixed;left:0;top:0;z-index:40;transition:transform .3s}
.main-content{margin-left:250px;transition:margin-left .3s}
.nav-item{padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px;font-size:13px;color:#64748b;user-select:none}
.nav-item:hover{background:rgba(30,45,74,0.35);color:#e2e8f0}
.nav-item.active{background:rgba(13,148,136,0.1);border-left-color:#0d9488;color:#14b8a6;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#0d9488,#0f766e);color:white;font-weight:600;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(13,148,136,0.35)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px}
.btn-secondary{background:transparent;border:1px solid #1e2d4a;color:#e2e8f0;padding:9px 20px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{border-color:#0d9488;color:#14b8a6}
.btn-danger{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s;font-size:12px;font-family:inherit}
.btn-danger:hover{background:#ef4444;color:white}
.btn-accent{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0c1222;font-weight:700;padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s;font-size:13px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-accent:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,158,11,0.35)}
.input-field{background:#0c1222;border:1px solid #1e2d4a;color:#e2e8f0;padding:9px 12px;border-radius:8px;width:100%;font-size:13px;transition:border-color .15s;font-family:inherit}
.input-field:focus{outline:none;border-color:#0d9488;box-shadow:0 0 0 2px rgba(13,148,136,0.12)}
.input-field:disabled{opacity:.5}
.input-field option{background:#141d30;color:#e2e8f0}
textarea.input-field{resize:vertical;min-height:60px}
.card{background:#141d30;border:1px solid #1e2d4a;border-radius:12px;padding:20px}
.toast{position:fixed;top:16px;right:16px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;animation:slideIn .3s ease;max-width:380px;display:flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#065f46,#047857);color:white;border:1px solid #10b981}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#141d30;border:1px solid #1e2d4a;border-radius:14px;padding:28px;max-width:560px;width:100%;animation:fadeIn .25s ease;max-height:88vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease forwards}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-250px)}.sidebar.mob-open{transform:translateX(0)}.main-content{margin-left:0!important}}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.3px}
.badge-success{background:rgba(16,185,129,0.15);color:#10b981}
.badge-danger{background:rgba(239,68,68,0.15);color:#ef4444}
.badge-warning{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-info{background:rgba(6,182,212,0.15);color:#06b6d4}
.stat-card{position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
table.tbl{width:100%;border-collapse:collapse;font-size:12px}
table.tbl th{background:#0c1222;padding:8px 10px;text-align:left;font-weight:600;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #1e2d4a}
table.tbl td{padding:8px 10px;border-bottom:1px solid rgba(30,45,74,0.4);vertical-align:middle}
table.tbl tr:hover td{background:rgba(30,45,74,0.2)}
</style>
</head>
<body>

<div id="toastBox"></div>
<div id="sbOverlay" class="sidebar-overlay" onclick="closeSB()"></div>

<!-- ========== LOGIN / REGISTRASI ========== -->
<div id="loginPage" class="login-bg">
<div class="glass rounded-2xl p-8 w-full max-w-md relative z-10 fade-in">
    <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto mb-3 rounded-xl bg-gradient-to-br from-primary to-primaryDark flex items-center justify-center shadow-lg shadow-primary/20">
            <i class="fas fa-chalkboard-teacher text-white text-2xl"></i>
        </div>
        <h1 class="text-xl font-extrabold text-white tracking-tight">Panel Guru</h1>
        <p class="text-muted text-xs mt-1">ASAS Digital — Sistem Ujian Online</p>
    </div>
    <div id="authTabs" class="flex mb-5 bg-dark/50 rounded-lg p-1">
        <button onclick="switchAuthTab('login')" id="tabLogin" class="flex-1 py-2 rounded-md text-xs font-bold transition-all bg-primary text-white">Masuk</button>
        <button onclick="switchAuthTab('register')" id="tabReg" class="flex-1 py-2 rounded-md text-xs font-bold transition-all text-muted">Registrasi</button>
    </div>
    <!-- LOGIN -->
    <div id="formLogin" class="space-y-3">
        <div><label class="text-xs text-muted font-semibold mb-1 block">NPSN Sekolah</label><input type="text" id="lNpsn" class="input-field" placeholder="Contoh: 20212345" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <div><label class="text-xs text-muted font-semibold mb-1 block">Password</label><input type="password" id="lPass" class="input-field" placeholder="Masukkan password" onkeydown="if(event.key==='Enter')doLogin()"></div>
        <p id="lErr" class="text-danger text-xs hidden"></p>
        <button onclick="doLogin()" class="btn-primary w-full"><i class="fas fa-sign-in-alt"></i>Masuk</button>
    </div>
    <!-- REGISTRASI -->
    <div id="formReg" class="space-y-3 hidden">
        <div><label class="text-xs text-muted font-semibold mb-1 block">NPSN Sekolah</label><input type="text" id="rNpsn" class="input-field" placeholder="Contoh: 20212345"></div>
        <div><label class="text-xs text-muted font-semibold mb-1 block">Nama Sekolah</label><input type="text" id="rNamaSekolah" class="input-field" placeholder="SDN 1 Majalengka"></div>
        <div><label class="text-xs text-muted font-semibold mb-1 block">Nama Guru</label><input type="text" id="rNamaGuru" class="input-field" placeholder="Budi Santoso, S.Pd"></div>
        <div><label class="text-xs text-muted font-semibold mb-1 block">Password</label><input type="password" id="rPass" class="input-field" placeholder="Min. 6 karakter"></div>
        <p id="rErr" class="text-danger text-xs hidden"></p>
        <button onclick="doRegister()" class="btn-primary w-full"><i class="fas fa-user-plus"></i>Daftar Akun</button>
    </div>
</div>
</div>

<!-- ========== MAIN APP ========== -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-4 border-b border-border">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-primary to-primaryDark flex items-center justify-center flex-shrink-0"><i class="fas fa-chalkboard-teacher text-white text-sm"></i></div>
            <div><h2 class="font-bold text-white text-sm leading-tight">ASAS Digital</h2><p class="text-muted text-[10px]">Panel Guru</p></div>
        </div>
    </div>
    <nav class="py-3" id="sideNav">
        <div class="px-4 mb-2"><span class="text-[10px] text-muted uppercase tracking-wider font-bold">Menu</span></div>
        <div class="nav-item active" data-p="dashboard"><i class="fas fa-th-large w-4 text-center"></i>Dashboard</div>
        <div class="nav-item" data-p="siswa"><i class="fas fa-users w-4 text-center"></i>Data Siswa</div>
        <div class="nav-item" data-p="token"><i class="fas fa-key w-4 text-center"></i>Token Ujian</div>
        <div class="nav-item" data-p="hasil"><i class="fas fa-clipboard-check w-4 text-center"></i>Hasil & Koreksi</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-3 border-t border-border">
        <div class="flex items-center gap-2.5 mb-2">
            <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center"><i class="fas fa-user text-primary text-[10px]"></i></div>
            <div class="min-w-0"><p id="sbUser" class="text-xs font-semibold text-light truncate"></p><p id="sbNpsn" class="text-[10px] text-muted truncate"></p></div>
        </div>
        <button onclick="doLogout()" class="btn-secondary w-full text-[11px] py-1.5"><i class="fas fa-sign-out-alt"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/80 backdrop-blur-xl border-b border-border px-4 md:px-5 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="toggleSB()" class="text-muted hover:text-light"><i class="fas fa-bars"></i></button>
            <h2 id="pageTitle" class="font-bold text-sm text-light">Dashboard</h2>
        </div>
        <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
    </header>
    <div class="p-4 md:p-5" id="pageContent"></div>
</div>
</div>

<!-- MODAL -->
<div id="modalOv" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ========== FIREBASE ==========
firebase.initializeApp({
    apiKey:"AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain:"pembuatan-soal.firebaseapp.com",
    projectId:"pembuatan-soal",
    storageBucket:"pembuatan-soal.firebasestorage.app",
    messagingSenderId:"56200686194",
    appId:"1:56200686194:web:eb2de00c9d152d87bcf0eb"
});
var db=firebase.firestore();

// ========== STATE ==========
var ME=null; // {npsn, namaSekolah, namaGuru}
var mySiswa=[]; // array siswa milik NPSN ini
var myTokens=[]; // token aktif
var bankSoal=[]; // dari questions (SAT)
var bankPAJ=[]; // dari questions_paj
var myJawaban=[]; // jawaban siswa
var unsubSiswa=null,unsubToken=null,unsubJawaban=null,unsubBank=null,unsubPAJ=null;

var MAPEL=[
    {id:'ppkn',nama:'Pendidikan Pancasila',s:'PPKn'},
    {id:'mat',nama:'Matematika',s:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',s:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',s:'Seni'},
    {id:'ipas',nama:'IPAS',s:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',s:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',s:'B.Inggris'},
    {id:'pai',nama:'PAI',s:'PAI'},
    {id:'pjok',nama:'PJOK',s:'PJOK'}
];
var KELAS=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];
var ROMBEL=['A','B','C'];
function mMapel(id){var m=MAPEL.find(function(x){return x.id===id});return m?m.nama:id}
function mMapelS(id){var m=MAPEL.find(function(x){return x.id===id});return m?m.s:id}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function getOptLetters(k){var n=parseInt((k||'').replace('Kelas ',''))||0;return['a','b','c','d','e'].slice(0,n<=2?3:n===6?5:4)}
function genToken(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='';for(var i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)];return r}

// ========== UTIL ==========
function toast(m,t){t=t||'success';var c=document.getElementById('toastBox'),e=document.createElement('div');var ic=t==='success'?'check-circle':t==='error'?'times-circle':'info-circle';e.className='toast toast-'+t;e.innerHTML='<i class="fas fa-'+ic+'"></i><span>'+m+'</span>';c.appendChild(e);setTimeout(function(){if(e.parentNode)e.remove()},3500)}
function closeModal(){document.getElementById('modalOv').classList.add('hidden');document.getElementById('modalBody').innerHTML=''}
function openModal(h){document.getElementById('modalOv').classList.remove('hidden');document.getElementById('modalBody').innerHTML=h}
function toggleSB(){var s=document.getElementById('sidebar'),o=document.getElementById('sbOverlay');s.classList.toggle('mob-open');o.classList.toggle('active',s.classList.contains('mob-open'))}
function closeSB(){document.getElementById('sidebar').classList.remove('mob-open');document.getElementById('sbOverlay').classList.remove('active')}

function switchAuthTab(t){
    document.getElementById('tabLogin').className='flex-1 py-2 rounded-md text-xs font-bold transition-all '+(t==='login'?'bg-primary text-white':'text-muted');
    document.getElementById('tabReg').className='flex-1 py-2 rounded-md text-xs font-bold transition-all '+(t==='register'?'bg-primary text-white':'text-muted');
    document.getElementById('formLogin').classList.toggle('hidden',t!=='login');
    document.getElementById('formReg').classList.toggle('hidden',t!=='register');
    document.getElementById('lErr').classList.add('hidden');
    document.getElementById('rErr').classList.add('hidden');
}

// ========== AUTH ==========
function doRegister(){
    var npsn=document.getElementById('rNpsn').value.trim();
    var sekolah=document.getElementById('rNamaSekolah').value.trim();
    var guru=document.getElementById('rNamaGuru').value.trim();
    var pass=document.getElementById('rPass').value;
    var err=document.getElementById('rErr');
    if(!npsn||npsn.length<6){err.textContent='NPSN minimal 6 digit';err.classList.remove('hidden');return}
    if(!sekolah){err.textContent='Nama sekolah wajib diisi';err.classList.remove('hidden');return}
    if(!guru){err.textContent='Nama guru wajib diisi';err.classList.remove('hidden');return}
    if(pass.length<6){err.textContent='Password minimal 6 karakter';err.classList.remove('hidden');return}
    db.collection('guru_accounts').doc(npsn).get().then(function(doc){
        if(doc.exists){err.textContent='NPSN ini sudah terdaftar! Silakan login.';err.classList.remove('hidden');return}
        return db.collection('guru_accounts').doc(npsn).set({npsn:npsn,namaSekolah:sekolah,namaGuru:guru,password:pass,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }).then(function(){
        if(!document.getElementById('rErr').classList.contains('hidden'))return;
        toast('Registrasi berhasil! Silakan login.');
        switchAuthTab('login');
        document.getElementById('lNpsn').value=npsn;
    }).catch(function(e){err.textContent='Gagal: '+e.message;err.classList.remove('hidden')});
}

function doLogin(){
    var npsn=document.getElementById('lNpsn').value.trim();
    var pass=document.getElementById('lPass').value;
    var err=document.getElementById('lErr');
    if(!npsn){err.textContent='Masukkan NPSN';err.classList.remove('hidden');return}
    db.collection('guru_accounts').doc(npsn).get().then(function(doc){
        if(!doc.exists){err.textContent='NPSN tidak terdaftar';err.classList.remove('hidden');return}
        var d=doc.data();
        if(d.password!==pass){err.textContent='Password salah';err.classList.remove('hidden');return}
        ME={npsn:d.npsn,namaSekolah:d.namaSekolah,namaGuru:d.namaGuru};
        startApp();
    }).catch(function(e){err.textContent='Error: '+e.message;err.classList.remove('hidden')});
}

function doLogout(){
    ME=null;
    if(unsubSiswa)unsubSiswa();
    if(unsubToken)unsubToken();
    if(unsubJawaban)unsubJawaban();
    if(unsubBank)unsubBank();
    if(unsubPAJ)unsubPAJ();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display='';
    document.getElementById('lPass').value='';
    closeSB();
}

// ========== START APP ==========
function startApp(){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('sbUser').textContent=ME.namaGuru;
    document.getElementById('sbNpsn').textContent=ME.namaSekolah+' ('+ME.npsn+')';

    // Subscribe data siswa milik NPSN ini
    unsubSiswa=db.collection('siswa').where('npsn','==',ME.npsn).orderBy('kelas').orderBy('rombel').orderBy('nama').onSnapshot(function(snap){
        mySiswa=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        var cp=getCurrentPage();
        if(cp==='dashboard')renderDashboard();
        if(cp==='siswa')renderSiswa();
    });

    // Subscribe token
    unsubToken=db.collection('tokens').where('npsn','==',ME.npsn).orderBy('createdAt','desc').onSnapshot(function(snap){
        myTokens=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        if(getCurrentPage()==='token')renderToken();
    });

    // Subscribe jawaban siswa
    unsubJawaban=db.collection('jawaban').where('npsn','==',ME.npsn).onSnapshot(function(snap){
        myJawaban=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
        if(getCurrentPage()==='hasil')renderHasil();
    });

    // Subscribe bank soal (dibaca dari Admin)
    unsubBank=db.collection('questions').onSnapshot(function(snap){
        bankSoal=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
    });
    unsubPAJ=db.collection('questions_paj').onSnapshot(function(snap){
        bankPAJ=snap.docs.map(function(d){return Object.assign({id:d.id},d.data())});
    });

    navigateTo('dashboard');
    toast('Selamat datang, '+ME.namaGuru);
}

function getCurrentPage(){var a=document.querySelector('.nav-item.active');return a?a.dataset.p:''}

// ========== NAVIGASI ==========
function navigateTo(p){
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active')});
    var t=document.querySelector('.nav-item[data-p="'+p+'"]');if(t)t.classList.add('active');
    var titles={dashboard:'Dashboard',siswa:'Data Siswa',token:'Token Ujian',hasil:'Hasil & Koreksi'};
    document.getElementById('pageTitle').textContent=titles[p]||p;
    closeSB();
    var c=document.getElementById('pageContent');
    switch(p){
        case'dashboard':renderDashboard();break;
        case'siswa':renderSiswa();break;
        case'token':renderToken();break;
        case'hasil':renderHasil();break;
    }
}
document.getElementById('sideNav').addEventListener('click',function(e){var i=e.target.closest('.nav-item');if(i)navigateTo(i.dataset.p)});

// ========== DASHBOARD ==========
function renderDashboard(){
    var c=document.getElementById('pageContent');
    var totalSiswa=mySiswa.length;
    var tokenAktif=myTokens.filter(function(t){return t.active}).length;
    var sudahUjian=myJawaban.length;
    // Hitung rombel unik
    var rombelSet={};
    mySiswa.forEach(function(s){rombelSet[s.kelas+'-'+s.rombel]=1});

function statCard(icon,label,val,color){
    var bgMap={primary:'from-primary/10 to-primary/5',info:'from-info/10 to-info/5',accent:'from-accent/10 to-accent/5',success:'from-success/10 to-success/5'};

    return '<div class="card stat-card bg-gradient-to-br '+bgMap[color]+' border-'+color+'/20"><div class="flex items-center justify-between"><div><p class="text-2xl font-extrabold '+txtMap[color]+'">'+val+'</p><p class="text-xs text-muted mt-0.5">'+label+'</p></div><div class="w-10 h-10 rounded-lg bg-'+color+'/10 flex items-center justify-center"><i class="fas '+icon+' '+txtMap[color]+'"></i></div></div></div>';
}

function saveSiswa(editId){
    var nisn=document.getElementById('mNisn').value.trim();
    var nama=document.getElementById('mNama').value.trim();
    var kelas=document.getElementById('mKelas').value;
    var rombel=document.getElementById('mRombel').value;
    var noPeserta=document.getElementById('mNoPeserta').value.trim();
    if(!nama){toast('Nama wajib diisi','error');return}
    if(!noPeserta){noPeserta=kelas.replace('Kelas ','')+'-'+rombel+'-'+String(mySiswa.length+1).padStart(3,'0')}
    var data={npsn:ME.npsn,nisn:nisn,nama:nama,kelas:kelas,rombel:rombel,noPeserta:noPeserta};
    var prom;
    if(editId){prom=db.collection('siswa').doc(editId).update(data)}
    else{prom=db.collection('siswa').add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}))}
    prom.then(function(){toast(editId?'Siswa diperbarui':'Siswa ditambahkan');closeModal()}).catch(function(e){toast('Gagal: '+e.message,'error')});
}

}

function doImportSiswa(){
    var txt=document.getElementById('mImportJson').value.trim();
    if(!txt){toast('JSON kosong','error');return}
    try{
        var arr=JSON.parse(txt);if(!Array.isArray(arr))throw new Error('Bukan array');
        var batch=db.batch(),count=0;
        arr.forEach(function(item){
            if(!item.nama)return;
            var kelas=item.kelas||'Kelas 1',rombel=item.rombel||'A';
            var noPeserta=item.noPeserta||(kelas.replace('Kelas ','')+'-'+rombel+'-'+String(mySiswa.length+count+1).padStart(3,'0'));
            batch.set(db.collection('siswa').doc(),{npsn:ME.npsn,nisn:item.nisn||'',nama:item.nama,kelas:kelas,rombel:rombel,noPeserta:noPeserta,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
            count++;
        });
        batch.commit().then(function(){toast(count+' siswa berhasil diimport');closeModal()}).catch(function(e){toast('Gagal: '+e.message,'error')});
    }catch(e){toast('JSON error: '+e.message,'error')}
}

function buatToken(){
    var mapel=document.getElementById('tMapel').value;
    var kelas=document.getElementById('tKelas').value;
    var rombel=document.getElementById('tRombel').value;
    var durasi=parseInt(document.getElementById('tDurasi').value)||60;
    var jenis=document.getElementById('tJenis').value;
    // Cek ketersediaan soal
    var source=jenis==='paj'?bankPAJ:bankSoal;
    var available=source.filter(function(q){return q.mapel===mapel&&q.kelas===kelas});
    if(!available.length){toast('Tidak ada soal '+mMapel(mapel)+' '+kelas+' di bank soal ('+jenis.toUpperCase()+')!','error');return}
    var token=genToken();
    db.collection('tokens').add({
        npsn:ME.npsn,token:token,mapel:mapel,kelas:kelas,rombel:rombel,
        durasi:durasi,jenis:jenis,active:true,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){toast('Token '+token+' berhasil dibuat!')}).catch(function(e){toast('Gagal: '+e.message,'error')});
}

function regenToken(id){
    var newToken=genToken();
    db.collection('tokens').doc(id).update({token:newToken}).then(function(){toast('Token diganti: '+newToken)}).catch(function(){toast('Gagal','error')});
}
function toggleToken(id,val){
    db.collection('tokens').doc(id).update({active:val}).then(function(){toast(val?'Token diaktifkan':'Token dinonaktifkan')}).catch(function(){toast('Gagal','error')});
}
function deleteToken(id){
    if(!confirm('Hapus token ini?'))return;
    db.collection('tokens').doc(id).delete().then(function(){toast('Token dihapus')}).catch(function(){toast('Gagal','error')});
}

    var c=document.getElementById('pageContent');
    c.innerHTML='<div class="fade-in">'+

                '<select id="hKelas" class="input-field w-36" onchange="filterHasil()"><option value="">Semua Kelas</option>'+KELAS.map(function(k){return'<option value="'+k+'">'+k+'</option>'}).join('')+'</select>'+

            '<th>No</th><th>Nama</th><th>Kelas</th><th>Mapel</th><th>Jenis</th><th>PG Skor</th><th>Uraian Skor</th><th>Total</th><th>Waktu</th><th>Aksi</th>'+
        '</tr></thead><tbody id="tblHasil"></tbody></table></div></div>'+
    '</div>';
    filterHasil();
}

function filterHasil(){
    var hm=document.getElementById('hMapel').value;
    var hk=document.getElementById('hKelas').value;
    var list=myJawaban.filter(function(j){
        if(hm&&j.mapel!==hm)return false;
        if(hk&&j.kelas!==hk)return false;
        return true;
    });
    var tb=document.getElementById('tblHasil');
    if(!list.length){tb.innerHTML='<tr><td colspan="10" class="text-center text-muted py-8">Belum ada jawaban masuk</td></tr>';return}
    tb.innerHTML=list.map(function(j,i){
        // Dekripsi & hitung skor
        var skorPG=0,skorUraian=0,totalSkorPG=0,totalSkorUraian=0;
        var answers=j.answers||[];
        var soalList=j.jenis==='paj'?bankPAJ:bankSoal;
        var mapelSoal=soalList.filter(function(q){return q.mapel===j.mapel&&q.kelas===j.kelas});
        
        mapelSoal.forEach(function(q){
            var idx=mapelSoal.indexOf(q);
            var ans=answers[idx];
            if(q.type==='pg'){
                totalSkorPG+=(q.score||1);
                if(ans&&ans.jawaban&&ans.jawaban.toUpperCase()===String(q.answer||'').toUpperCase()){skorPG+=(q.score||1)}
            }else{
                totalSkorUraian+=(q.score||1);
                skorUraian+=(ans&&ans.jawaban)?0:0; // Uraian dikoreksi manual
            }
        });
        var waktu=j.waktuSelesai?new Date(j.waktuSelesai.seconds*1000).toLocaleString('id-ID'):'-';
        return '<tr>'+
            '<td class="text-muted">'+(i+1)+'</td>'+
            '<td class="font-semibold text-light">'+esc(j.namaSiswa||'-')+'</td>'+
            '<td><span class="badge badge-info">'+esc(j.kelas||'-')+'</span></td>'+
            '<td class="text-xs">'+mMapel(j.mapel)+'</td>'+
            '<td><span class="badge '+(j.jenis==='paj'?'badge-danger':'badge-success')+'">'+(j.jenis==='paj'?'PAJ':'SAT')+'</span></td>'+
            '<td class="font-mono text-sm"><span class="text-primary font-bold">'+skorPG+'</span><span class="text-muted">/'+totalSkorPG+'</span></td>'+
            '<td class="font-mono text-sm"><span class="text-warning font-bold">'+skorUraian+'</span><span class="text-muted">/'+totalSkorUraian+'</span></td>'+
            '<td class="font-mono text-sm font-bold text-light">'+(skorPG+skorUraian)+'</td>'+
            '<td class="text-[10px] text-muted">'+waktu+'</td>'+
            '<td><button onclick="lihatDetail(\''+j.id+'\')" class="text-primary hover:text-primaryLight p-1" title="Detail"><i class="fas fa-eye text-[10px]"></i></button></td>'+
        '</tr>';
    }).join('');
}

function lihatDetail(id){
    var j=myJawaban.find(function(x){return x.id===id});if(!j)return;
    var soalList=j.jenis==='paj'?bankPAJ:bankSoal;
    var mapelSoal=soalList.filter(function(q){return q.mapel===j.mapel&&q.kelas===j.kelas});
    var answers=j.answers||[];
    var html='<h3 class="font-bold text-base text-light mb-1">Detail Jawaban</h3>'+
        '<p class="text-xs text-muted mb-4">'+esc(j.namaSiswa)+' — '+mMapel(j.mapel)+' — '+j.kelas+' — '+(j.jenis==='paj'?'PAJ':'SAT')+'</p>'+
        '<div class="space-y-3 max-h-[60vh] overflow-y-auto pr-1">';
    
    mapelSoal.forEach(function(q,i){
        var ans=answers[i]||{};
        var benar=q.type==='pg'&&ans.jawaban&&ans.jawaban.toUpperCase()===String(q.answer||'').toUpperCase();
        html+='<div class="p-3 rounded-lg '+(q.type==='pg'?(benar?'bg-success/10 border border-success/30':'bg-danger/10 border border-danger/30'):'bg-dark/30 border border-border')+'">'+
            '<div class="flex items-start gap-2 mb-2"><span class="font-bold text-xs text-muted w-6">'+(i+1)+'.</span>'+
            '<div class="flex-1"><p class="text-sm">'+esc(q.text)+'</p>'+
            (q.type==='pg'?
                '<div class="mt-2 text-xs"><span class="text-muted">Jawaban siswa: </span><span class="font-bold '+(benar?'text-success':'text-danger')+'">'+esc(ans.jawaban||'-')+'</span>'+
                ' <span class="text-muted ml-3">Kunci: </span><span class="font-bold text-primary">'+esc(q.answer||'-')+'</span>'+
                ' <span class="ml-3 badge '+(benar?'badge-success':'badge-danger')+'">'+(benar?'Benar (+'+(q.score||1)+')':'Salah')+'</span></div>'
                :'<div class="mt-2 text-xs"><span class="text-muted">Jawaban siswa:</span><div class="mt-1 p-2 bg-dark/50 rounded text-light">'+esc(ans.jawaban||'(kosong)')+'</div>'+
                '<div class="mt-1"><span class="text-muted">Kunci/Pedoman:</span><div class="mt-1 p-2 bg-primary/10 rounded text-primary">'+esc(q.answer||'-')+'</div>'+
                '<div class="mt-1 flex items-center gap-2"><label class="text-xs text-muted">Skor Uraian:</label><input type="number" id="skorUraian_'+i+'" class="input-field w-16 text-center text-xs" value="0" min="0" max="'+(q.score||1)+'"><span class="text-xs text-muted">/ '+(q.score||1)+'</span></div></div>'
            )+
            '</div></div></div>';
    });
    html+='</div>'+
        '<div class="flex justify-end gap-2 mt-4 pt-3 border-t border-border">'+
            '<button onclick="closeModal()" class="btn-secondary btn-sm">Tutup</button>'+
            '<button onclick="simpanSkorUraian(\''+id+'\')" class="btn-primary btn-sm"><i class="fas fa-save"></i>Simpan Skor Uraian</button>'+
        '</div>';
    openModal(html);
}

function simpanSkorUraian(jawabanId){
    var j=myJawaban.find(function(x){return x.id===jawabanId});if(!j)return;
    var soalList=j.jenis==='paj'?bankPAJ:bankSoal;
    var mapelSoal=soalList.filter(function(q){return q.mapel===j.mapel&&q.kelas===j.kelas});
    var answers=j.answers||[];
    var updated=0;
    mapelSoal.forEach(function(q,i){
        if(q.type==='uraian'){
            var el=document.getElementById('skorUraian_'+i);
            if(el){
                if(!answers[i])answers[i]={};
                answers[i].skorUraian=parseInt(el.value)||0;
                updated++;
            }
        }
    });
    db.collection('jawaban').doc(jawabanId).update({answers:answers}).then(function(){
        toast(updated+' skor uraian disimpan');closeModal();
    }).catch(function(e){toast('Gagal: '+e.message,'error')});
}

function cetakHasil(){
    // Cetak tabel hasil sederhana via iframe
    var hm=document.getElementById('hMapel').value;
    var hk=document.getElementById('hKelas').value;
    var list=myJawaban.filter(function(j){if(hm&&j.mapel!==hm)return false;if(hk&&j.kelas!==hk)return false;return true});
    if(!list.length){toast('Tidak ada data untuk dicetak','error');return}
    
    var printHtml='<table style="width:100%;border-collapse:collapse;font-size:10pt"><thead><tr>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">No</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Nama</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Kelas</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Mapel</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Skor PG</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Skor Uraian</th>'+
        '<th style="border:1px solid #000;padding:4px;background:#eee">Total</th>'+
        '</tr></thead><tbody>';
    list.forEach(function(j,i){
        var skorPG=0,skorUraian=0,totalPG=0,totalUraian=0;
        var answers=j.answers||[];
        var soalList=j.jenis==='paj'?bankPAJ:bankSoal;
        var mapelSoal=soalList.filter(function(q){return q.mapel===j.mapel&&q.kelas===j.kelas});
        mapelSoal.forEach(function(q,idx){
            var a=answers[idx];
            if(q.type==='pg'){totalPG+=(q.score||1);if(a&&a.jawaban&&a.jawaban.toUpperCase()===String(q.answer||'').toUpperCase())skorPG+=(q.score||1)}
            else{totalUraian+=(q.score||1);skorUraian+=(a&&a.skorUraian)?a.skorUraian:0}
        });
        printHtml+='<tr><td style="border:1px solid #000;padding:4px;text-align:center">'+(i+1)+'</td>'+
            '<td style="border:1px solid #000;padding:4px">'+esc(j.namaSiswa||'-')+'</td>'+
            '<td style="border:1px solid #000;padding:4px;text-align:center">'+esc(j.kelas||'-')+'</td>'+
            '<td style="border:1px solid #000;padding:4px">'+mMapel(j.mapel)+'</td>'+
            '<td style="border:1px solid #000;padding:4px;text-align:center">'+skorPG+'/'+totalPG+'</td>'+
            '<td style="border:1px solid #000;padding:4px;text-align:center">'+skorUraian+'/'+totalUraian+'</td>'+
            '<td style="border:1px solid #000;padding:4px;text-align:center;font-weight:bold">'+(skorPG+skorUraian)+'</td></tr>';
    });
    printHtml+='</tbody></table>';
    
    var iframe=document.createElement('iframe');iframe.style.position='fixed';iframe.style.left='-9999px';iframe.style.top='0';iframe.style.width='210mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();doc.write('<!DOCTYPE html><html><head><style>@page{size:A4 landscape;margin:1cm}body{font-family:"Times New Roman",serif;margin:0;padding:20px}</style></head><body>');
    doc.write('<h2 style="text-align:center;font-size:14pt">Lembar Hasil Jawaban Siswa</h2>');
    doc.write('<p style="text-align:center;font-size:11pt">'+esc(ME.namaSekolah)+' — NPSN: '+ME.npsn+'</p>');
    if(hm)doc.write('<p style="text-align:center;font-size:11pt">Mata Pelajaran: '+mMapel(hm)+'</p>');
    if(hk)doc.write('<p style="text-align:center;font-size:11pt">Kelas: '+hk+'</p>');
    doc.write('<br>'+printHtml);
    doc.write('</body></html>');doc.close();
    setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(function(){document.body.removeChild(iframe)},3000)},500);
}
</script>
