<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Ujian Online - Kecamatan Majalengka</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{kop:'#1a2744',kopAccent:'#c9a84c',dark:'#0f1923',card:'#182538',cardHover:'#1f3350',border:'#2a3f5f',muted:'#7a8ba5',light:'#e8ecf1',success:'#22c55e',danger:'#ef4444',warning:'#f59e0b',info:'#06b6d4'},fontFamily:{display:['Playfair Display','serif'],body:['Source Sans 3','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
.login-bg::after{content:'';position:absolute;width:450px;height:450px;background:radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%);bottom:-80px;left:-80px;border-radius:50%;animation:floatBlob 10s ease-in-out infinite reverse}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}

.glass{background:rgba(24,37,56,0.85);backdrop-filter:blur(24px);border:1px solid rgba(42,63,95,0.5)}

.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-item.paj-item { border-left-color: #ef4444; color: #ef4444; font-weight: 600; }

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;font-family:'Source Sans 3',sans-serif}
.btn-danger:hover{background:#ef4444;color:white}

.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s;font-family:'Source Sans 3',sans-serif}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-field option{background:#182538;color:#e8ecf1}
textarea.input-field{resize:vertical;min-height:40px}

.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:420px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white;border:1px solid #06b6d4}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}

.img-preview{max-width:100%;max-height:180px;object-fit:contain;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f;background:#0f1923}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

    /* PRINT STYLES */
    @media print {
        @page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }
        body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
        #sidebar, #mainArea > header, #sidebarOverlay, .no-print, #toastContainer, #modalOverlay, #loginPage, .card { display: none !important; }
        #mainArea { margin: 0 !important; padding: 0 !important; width: 100% !important; height: auto !important; background: white !important; overflow: visible !important; }
        #pageContent { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; color: black !important; overflow: visible !important; }
        .print-page { width: 100%; padding: 0; background: white; color: black; }
        
        .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
        .kop-surat img { height: 75px; width: auto; object-fit: contain; }
        .kop-text { text-align: center; line-height: 1.3; flex: 1; }
        .kop-text h1 { font-family: 'Times New Roman', serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .kop-text h2 { font-family: 'Times New Roman', serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }

        .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
        .soal-num { float: left; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 12pt; width: 35px; flex-shrink: 0; }
        .soal-text { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; }
        .soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ccc; background-color: #eee; }
        .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
        .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.4; text-align: left; }
        .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
        .opsi-label::after { content: "."; }
        .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }
        .clearfix::after { content: ""; display: table; clear: both; }
        .ttd-section { display: none; } 
        .print-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-family: 'Times New Roman', serif; font-size: 10pt; table-layout: fixed; }
        .print-table th, .print-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: top; overflow: hidden; }
        .print-table th { background-color: #eee !important; -webkit-print-color-adjust: exact; text-align: center; font-weight: bold; font-size: 9pt; text-transform: uppercase; }
        .print-table td.center { text-align: center; vertical-align: middle; }
        .print-table td.wrap-text { word-wrap: break-word; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; font-size: 9.5pt; }
        
        /* Siswa Answer Sheet Print */
        .siswa-answer-sheet table { width: 100%; border: 1px solid #000; margin-bottom: 20px; }
        .siswa-answer-sheet th, .siswa-answer-sheet td { border: 1px solid #000; padding: 8px; text-align: center; }
        .siswa-essay-area { min-height: 100px; border: 1px dashed #999; margin: 10px 0 20px 35px; padding: 10px; }
    }

    /* PREVIEW STYLES */
    .print-preview-wrap { background: #e5e7eb; padding: 40px; border-radius: 8px; display: flex; justify-content: center; overflow-x: auto; }
    .print-preview-sheet { background: white; color: black; width: 210mm; max-width: 100%; min-height: 297mm; padding: 1.5cm 2cm 2cm 2cm; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.4; transform-origin: top center; }
    
    .exam-option-label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; padding: 8px; border: 1px solid #374151; border-radius: 6px; transition: all 0.2s; }
    .exam-option-label:hover { background: #1f3350; border-color: #c9a84c; }
    .exam-option-label input:checked + span { color: #c9a84c; font-weight: bold; }
    .exam-option-label input:checked { accent-color: #c9a84c; }

.modal-body-content { max-height: 60vh; overflow-y: auto; }
</style>
</head>
<body>

<div id="toastContainer"></div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-bg">
<div class="glass rounded-2xl p-8 w-full max-w-lg relative z-10 fade-in">
    <div class="text-center mb-6">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full overflow-hidden border-4 border-kopAccent shadow-lg shadow-kopAccent/20 flex items-center justify-center bg-white">
            <img src="https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">KOREK API</h1>
        <p class="text-muted text-sm mt-1">Sistem Ujian Online Sekolah</p>
    </div>

    <!-- Login Tabs -->
    <div class="flex mb-6 border-b border-border">
        <button onclick="switchLoginTab('guru')" id="tabGuru" class="flex-1 pb-2 text-sm font-bold text-kopAccent border-b-2 border-kopAccent">GURU / ADMIN</button>
        <button onclick="switchLoginTab('siswa')" id="tabSiswa" class="flex-1 pb-2 text-sm text-muted hover:text-light">SISWA</button>
    </div>

    <!-- FORM GURU -->
    <div id="formGuru" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">NPSN</label>
                <input type="text" id="gNPSN" class="input-field" placeholder="NPSN Sekolah">
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">NIP</label>
                <input type="text" id="gNIP" class="input-field" placeholder="NIP Guru">
            </div>
        </div>
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Nama Lengkap</label>
            <input type="text" id="gNama" class="input-field" placeholder="Nama Guru">
        </div>
        <div class="grid grid-cols-2 gap-3">
             <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Jenis Guru</label>
                <select id="gJenis" class="input-field">
                    <option value="Kelas">Guru Kelas</option>
                    <option value="Mapel">Guru Mapel</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Password</label>
                <input type="password" id="gPass" class="input-field" placeholder="Password">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
             <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kelas Ampuan</label>
                <select id="gKelas" class="input-field">
                    <option value="">-- Pilih --</option>
                    <option value="Kelas 1">Kelas 1</option>
                    <option value="Kelas 2">Kelas 2</option>
                    <option value="Kelas 3">Kelas 3</option>
                    <option value="Kelas 4">Kelas 4</option>
                    <option value="Kelas 5">Kelas 5</option>
                    <option value="Kelas 6">Kelas 6</option>
                    <option value="Semua">Semua (Admin)</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Rombel</label>
                <input type="text" id="gRombel" class="input-field" placeholder="Contoh: A, B, 1">
            </div>
        </div>
        
        <div class="pt-2 flex gap-2">
            <button onclick="doLoginGuru()" class="btn-primary flex-1"><i class="fas fa-sign-in-alt mr-2"></i>Masuk</button>
            <button onclick="openRegisterModal()" class="btn-secondary flex-1 text-xs"><i class="fas fa-user-plus mr-1"></i>Registrasi</button>
        </div>
        <div class="text-center"><a href="#" onclick="openForgotModal()" class="text-xs text-muted hover:text-kopAccent">Lupa Password?</a></div>
    </div>

    <!-- FORM SISWA -->
    <div id="formSiswa" class="space-y-3 hidden">
        <div class="grid grid-cols-2 gap-3">
             <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Nama Siswa</label>
                <input type="text" id="sNama" class="input-field" placeholder="Nama Lengkap">
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">NISN</label>
                <input type="text" id="sNISN" class="input-field" placeholder="NISN">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
             <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Kelas</label>
                <select id="sKelas" class="input-field" onchange="loadRombelOptions()">
                    <option value="">-- Pilih --</option>
                    <option value="Kelas 1">Kelas 1</option>
                    <option value="Kelas 2">Kelas 2</option>
                    <option value="Kelas 3">Kelas 3</option>
                    <option value="Kelas 4">Kelas 4</option>
                    <option value="Kelas 5">Kelas 5</option>
                    <option value="Kelas 6">Kelas 6</option>
                </select>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Rombel</label>
                <select id="sRombel" class="input-field">
                    <option value="">-- Pilih Kelas Dulu --</option>
                </select>
            </div>
        </div>
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Mata Pelajaran</label>
            <select id="sMapel" class="input-field">
                <option value="">-- Pilih Mapel --</option>
            </select>
        </div>
        <div>
            <label class="text-xs text-muted font-semibold uppercase tracking-wider mb-1 block">Token Ujian</label>
            <input type="text" id="sToken" class="input-field text-lg tracking-widest text-center font-bold" placeholder="X Y Z 1 2 3" style="letter-spacing: 4px;">
        </div>
        <button onclick="doLoginSiswa()" class="btn-primary w-full mt-2"><i class="fas fa-laptop-code mr-2"></i>Mulai Ujian</button>
    </div>
</div>
</div>

<!-- MAIN APP (GURU & ADMIN) -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-fire text-kop text-lg"></i></div>
            <div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Online Mode</p></div>
        </div>
    </div>
    <nav class="py-4" id="sidebarNav">
        <div class="px-5 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Menu Utama</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="questions"><i class="fas fa-list w-5 text-center"></i>Bank Soal</div>
        <div class="nav-item" data-page="tokens"><i class="fas fa-key w-5 text-center"></i>Kelola Token</div>
        <div class="nav-item" data-page="results"><i class="fas fa-chart-bar w-5 text-center"></i>Hasil Ujian</div>
        <div class="nav-item" data-page="scoring"><i class="fas fa-edit w-5 text-center"></i>Koreksi Uraian</div>
        
        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Output Dokumen</span></div>
        <div class="nav-item" data-page="print"><i class="fas fa-print w-5 text-center"></i>Cetak Soal</div>
        <div class="nav-item" data-page="kisi"><i class="fas fa-table w-5 text-center"></i>Kisi-Kisi</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <div class="flex items-center gap-3 mb-3">
            <div class="w-8 h-8 rounded-full bg-kopAccent/20 flex items-center justify-center"><i class="fas fa-user text-kopAccent text-xs"></i></div>
            <div class="min-w-0"><p id="sidebarUser" class="text-sm font-semibold text-light truncate"></p><p id="sidebarRole" class="text-xs text-muted truncate"></p></div>
        </div>
        <button onclick="doLogout()" class="btn-secondary w-full text-xs py-2" type="button"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/80 backdrop-blur-xl border-b border-border px-4 md:px-6 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-muted hover:text-light transition-colors" type="button"><i class="fas fa-bars text-lg"></i></button>
            <h2 id="pageTitle" class="font-display text-base md:text-lg font-bold text-light">Dashboard</h2>
        </div>
        <div class="flex items-center gap-3"><span id="topbarInfo" class="text-sm"></span><span class="w-2 h-2 rounded-full bg-success animate-pulse"></span></div>
    </header>
    <div class="p-4 md:p-6" id="pageContent"></div>
</div>
</div>

<!-- MAIN APP (SISWA) -->
<div id="siswaPage" class="hidden min-h-screen bg-dark">
    <header class="bg-kop border-b border-border px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
             <div class="w-8 h-8 rounded-full bg-kopAccent/20 flex items-center justify-center"><i class="fas fa-user-graduate text-kopAccent"></i></div>
             <div>
                 <h1 class="text-sm font-bold text-light">Ujian Online</h1>
                 <p id="siswaInfoHeader" class="text-xs text-muted">Nama - Kelas</p>
             </div>
        </div>
        <div class="text-right">
            <div id="examTimer" class="text-lg font-mono font-bold text-kopAccent">00:00:00</div>
            <button onclick="finishExam()" class="text-xs bg-danger/20 text-danger border border-danger px-3 py-1 rounded hover:bg-danger hover:text-white transition">Selesai Ujian</button>
        </div>
    </header>
    <div class="p-4 md:p-6 max-w-4xl mx-auto" id="siswaExamContent">
        <!-- Soal akan dirender di sini via JS -->
    </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas fa-' + icon + ' flex-shrink-0"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

function doLoginSiswa(){
    var nama = document.getElementById('sNama').value;
    var nisn = document.getElementById('sNISN').value;
    var kelas = document.getElementById('sKelas').value;
    var rombel = document.getElementById('sRombel').value;
    var mapel = document.getElementById('sMapel').value;
    var tokenIn = document.getElementById('sToken').value.trim();
    
    if(!nama||!nisn||!kelas||!rombel||!mapel||!tokenIn){ showToast('Lengkapi semua data','error'); return; }
    
    // Validasi Token
    var validToken = tokens.find(function(t){ 
        return t.token===tokenIn && t.mapel===mapel && t.kelas===kelas && t.rombel===rombel && t.status==='active'; 
    });

    if(!validToken){ showToast('Token tidak valid atau kadaluarsa','error'); return; }

    currentSiswa = { nama:nama, nisn:nisn, kelas:kelas, rombel:rombel, mapel:mapel, token:validToken };
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('siswaPage').classList.remove('hidden');
    startExam();
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');
    var titles = {
        dashboard:'Dashboard', questions:'Bank Soal (Lihat Saja)',
        tokens:'Kelola Token Ujian', results:'Hasil Ujian Siswa', scoring:'Koreksi Uraian',
        print:'Cetak Soal', kisi:'Kisi-Kisi'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    closeSidebar();
    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(c); break;
        case 'questions': renderQuestions(c); break;
        case 'tokens':    renderTokens(c); break;
        case 'results':   renderResultPage(c); break;
        case 'scoring':   renderScoringPage(c); break;
        case 'print':     renderPrint(c); break;
        case 'kisi':      renderKisi(c); break;
    }
}

function generateToken(){
    var tMapel = currentUser.jenis==='Admin' ? prompt('Masukkan ID Mapel (cth: mat)') : (prompt('Masukkan ID Mapel (cth: mat)') || 'mat'); // Simplified
    var tKelas = currentUser.kelas==='Semua'?prompt('Kelas (cth: Kelas 1)'):currentUser.kelas;
    var tRombel = prompt('Rombel (cth: A)') || 'A';
    if(!tMapel||!tKelas) return;
    var code = Math.random().toString(36).substring(2,8).toUpperCase();
    db.collection('tokens').add({
        mapel:tMapel, kelas:tKelas, rombel:tRombel,
        token:code, status:'active', createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){showToast('Token: '+code);});
}
function renderTokenList(){
    var list = tokens.filter(function(t){ 
        return currentUser.jenis==='Admin' || (t.kelas===currentUser.kelas); 
    });
    var tb = document.getElementById('tokenTableBody');
    if(!list.length){ tb.innerHTML='<tr><td colspan="6" class="text-center py-4">Belum ada token</td></tr>'; return; }
    tb.innerHTML = list.map(function(t){
        return '<tr class="border-b border-border hover:bg-dark/30"><td class="px-4 py-3">'+getMapelName(t.mapel)+'</td><td class="px-4 py-3">'+t.kelas+'</td><td class="px-4 py-3">'+t.rombel+'</td><td class="px-4 py-3 font-mono font-bold text-kopAccent">'+t.token+'</td><td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-bold '+(t.status==='active'?'bg-success/20 text-success':'bg-danger/20 text-danger')+'">'+t.status+'</span></td><td class="px-4 py-3"><button onclick="toggleToken(\''+t.id+'\',\''+(t.status==='active'?'inactive':'active')+'\')" class="text-info hover:text-white"><i class="fas fa-power-off"></i></button></td></tr>';
    }).join('');
}

function printResultSheet(id){

    html += '<table><tr><th>No</th><th>Benar/Salah</th><th>Skor</th></tr>';
    r.details.forEach(function(d, i){ html+='<tr><td>'+(i+1)+'</td><td>'+(d.isCorrect?'Benar':'Salah')+'</td><td>'+d.score+'</td></tr>'; });
    html += '</table><h3>Total: '+Math.round(r.totalScore)+'</h3></body></html>';
    win.document.write(html); win.document.close(); win.print();
}

function renderScoringPage(c){
    c.innerHTML = '<div class="fade-in card">' +
        '<div class="flex gap-4 mb-4"><select id="scoreFilterKelas" class="input-field" onchange="renderScoringList()"><option value="">Semua Kelas</option>'+KELAS_LIST.map(function(k){return '<option value="'+k+'">'+k+'</option>';}).join('')+'</select></div>' +
        '<div id="scoringList" class="space-y-4"></div></div>';

function renderScoringList(){
    var k = document.getElementById('scoreFilterKelas')?.value;
    var list = examResults.filter(function(r){ return !r.manualScoreCheck; }); // Filter yang butuh koreksi manual (uraian)
    if(k) list = list.filter(function(r){ return r.kelas===k; });
    
    var con = document.getElementById('scoringList');
    if(!list.length){ con.innerHTML = '<p class="text-center text-muted">Tidak ada jawaban uraian yang perlu dikoreksi.</p>'; return; }
    
    con.innerHTML = list.map(function(r){
        var essayQs = r.details.filter(function(d){ return d.type==='uraian'; });
        return '<div class="bg-dark/30 p-4 rounded border border-border">' +
            '<div class="flex justify-between mb-2"><strong>'+r.siswaNama+'</strong><span class="text-xs text-muted">'+r.kelas+'</span></div>'+
            essayQs.map(function(d, idx){
                return '<div class="mb-3 p-2 bg-dark rounded"><p class="text-xs font-bold mb-1">Soal No.'+(d.qIdx+1)+'</p><div class="text-sm mb-2 italic">Jawaban: '+escHtml(d.studentAnswer)+'</div><input type="number" id="score-'+r.id+'-'+d.qIdx+'" class="input-field text-sm" placeholder="Nilai (Max '+d.maxScore+')" value="'+(d.givenScore||0)+'"></div>';
            }).join('') +
            '<button onclick="saveManualScore(\''+r.id+'\')" class="btn-primary text-xs w-full">Simpan Nilai</button>'+
        '</div>';
    }).join('');
}
function saveManualScore(resId){
    var r = examResults.find(function(x){return x.id===resId;});
    if(!r) return;
    var newTotal = 0;
    r.details.forEach(function(d){
        if(d.type==='pg') newTotal += parseFloat(d.score);
        else {
            var inp = document.getElementById('score-'+resId+'-'+d.qIdx);
            var val = inp ? parseFloat(inp.value) : 0;
            newTotal += val;
        }
    });
    db.collection('results').doc(resId).update({ totalScore:newTotal, manualScoreCheck:true }).then(function(){ showToast('Nilai disimpan'); });
}

// ================================================================
function startExam(){
    document.getElementById('siswaInfoHeader').textContent = currentSiswa.nama + ' | ' + currentSiswa.kelas + ' ' + currentSiswa.rombel;
    
    // Load Questions based on Token/Mapel
    var examQuestions = questions.filter(function(q){ return q.mapel===currentSiswa.mapel && q.kelas===currentSiswa.kelas; });
    // Shuffle simple
    examQuestions.sort(function(){ return 0.5 - Math.random(); });
    
    var container = document.getElementById('siswaExamContent');
    container.innerHTML = '';
    
    examQuestions.forEach(function(q, i){
        var html = '<div class="card mb-6 fade-in" id="qwrap-'+i+'">';
        html += '<div class="flex gap-3"><div class="flex-shrink-0 w-8 h-8 rounded-full bg-kopAccent text-kop font-bold flex items-center justify-center">'+(i+1)+'</div><div class="flex-1">';
        html += '<p class="text-base font-medium mb-3 leading-relaxed">'+escHtml(q.text)+'</p>';
        if(q.image) html += '<img src="'+q.image+'" class="mb-3 rounded border border-border max-h-48 object-contain">';
        
        if(q.type==='pg'){
            html += '<div class="space-y-2">';
            var letters = ['A','B','C','D','E'];
            (q.options||[]).forEach(function(opt, oi){
                html += '<label class="exam-option-label"><input type="radio" name="ans_'+i+'" value="'+letters[oi]+'" data-qidx="'+i+'" data-correct="'+q.answer+'"> <span>'+letters[oi]+'. '+escHtml(opt)+'</span></label>';
            });
            html += '</div>';
        } else {
            html += '<textarea class="input-field" rows="4" id="ans_text_'+i+'" placeholder="Ketik jawaban Anda di sini..."></textarea>';
        }
        html += '</div></div></div>';
        container.innerHTML += html;
    });

    // Timer (10 Minutes Default)
    var timeLeft = 600; 
    examTimerInterval = setInterval(function(){
        var m = Math.floor(timeLeft/60); var s = timeLeft%60;
        document.getElementById('examTimer').textContent = (m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
        if(timeLeft<=0){ clearInterval(examTimerInterval); finishExam(true); }
        timeLeft--;
    }, 1000);
}

function finishExam(force){
    if(!force && !confirm('Yakin ingin menyelesaikan ujian?')) return;
    clearInterval(examTimerInterval);
    
    // Collect Answers
    var qEls = document.querySelectorAll('[id^="qwrap-"]');
    var totalScore = 0;
    var details = [];
    
    // Re-fetch exam questions (needed for answer key)
    var examQuestions = questions.filter(function(q){ return q.mapel===currentSiswa.mapel && q.kelas===currentSiswa.kelas; });
    // Note: In real app, we need to map visual index to question ID carefully. Here assuming order is same or simplistic.
    // Since we shuffled visual, we need to map them properly. 
    // Simplified: The rendered HTML is in order of `examQuestions` array shuffled.
    
    Array.from(qEls).forEach(function(el, i){
        var q = examQuestions[i];
        var score = 0;
        var isCorrect = false;
        var studentAns = '';
        
        if(q.type==='pg'){
            var selected = el.querySelector('input[type="radio"]:checked');
            if(selected){
                studentAns = selected.value;
                if(selected.value === q.answer){ isCorrect = true; score = q.score || 1; }
            }
        } else {
            var ta = el.querySelector('textarea');
            studentAns = ta ? ta.value : '';
            // Manual check needed later
        }
        
        details.push({
            qId: q.id,
            qIdx: i,
            type: q.type,
            correctAnswer: q.answer,
            studentAnswer: studentAns,
            isCorrect: isCorrect,
            maxScore: q.score || 1,
            score: score,
            givenScore: 0 // For manual scoring
        });
        totalScore += score;
    });

    var resultData = {
        siswaNama: currentSiswa.nama, nisn: currentSiswa.nisn, kelas: currentSiswa.kelas, rombel: currentSiswa.rombel, mapel: currentSiswa.mapel,
        details: details, totalScore: totalScore, manualScoreCheck: false,
        submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    db.collection('results').add(resultData).then(function(){
        showToast('Jawaban tersimpan! Terima kasih.');
        document.getElementById('siswaPage').innerHTML = '<div class="text-center mt-20"><i class="fas fa-check-circle text-6xl text-success mb-4"></i><h2 class="text-2xl font-bold">Ujian Selesai</h2><p class="text-muted">Jawaban Anda telah dikirim ke guru.</p></div>';
    }).catch(function(e){ showToast('Gagal mengirim jawaban: '+e.message, 'error'); });
}

        html += '<div class="section-heading">I. Pilihan Ganda</div>';
        pg.forEach(function(q, i){
            html += '<div class="soal-item clearfix">';
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+escHtml(q.text)+'</div>';
