<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(24,37,56,0.85);backdrop-filter:blur(24px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:280px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease;overflow-y:auto}
.main-content{margin-left:280px;transition:margin-left .3s ease}
.nav-group-title{padding:12px 20px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#4b617d;font-weight:700}
.nav-item{padding:10px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:13px;color:#8da2c0;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.1);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-sub-item{padding:8px 20px 8px 52px;cursor:pointer;font-size:12px;color:#7a8ba5;transition:all .2s}
.nav-sub-item:hover{color:#e8ecf1;transform:translateX(4px)}
.nav-sub-item.active{color:#c9a84c;font-weight:600}

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 20px;border-radius:6px;border:none;cursor:pointer;transition:all .2s;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:6px;cursor:pointer;transition:all .2s;font-size:13px}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}

.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field option{background:#182538;color:#e8ecf1}

.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:20px;margin-bottom:20px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #2a3f5f;padding-bottom:12px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:8px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:#166534;border:1px solid #22c55e;color:white}
.toast-error{background:#991b1b;border:1px solid #ef4444;color:white}

@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:12px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-header{padding:16px 20px;border-bottom:1px solid #2a3f5f;font-weight:bold;font-size:18px}
.modal-body{padding:20px;overflow-y:auto}
.modal-footer{padding:16px 20px;border-top:1px solid #2a3f5f;display:flex;justify-content:end;gap:10px}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBox">
        <div class="modal-header" id="modalTitle">Judul Modal</div>
        <div class="modal-body" id="modalBody">Konten Modal</div>

<script>
// ================================================================
// FIREBASE CONFIG
// ================================================================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

// ================================================================
// DATA MASTER & STATE
// ================================================================
var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},
    {id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},
    {id:'sbd',nama:'Seni Budaya'},
    {id:'ipas',nama:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},
    {id:'pai',nama:'PAI'},
    {id:'pjok',nama:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];
var currentUser = null;
var listeners = []; // Store snapshot listeners to unsubscribe

function getMapelName(id){ var m=MAPEL_LIST.find(x=>x.id===id); return m?m.nama:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================================================================
// NAVIGATION & MENU STRUCTURE
// ================================================================
var MENU_STRUCTURE = [
    { title: "Menu Utama", items: [
        { id: 'dashboard', icon: 'fas fa-home', label: 'Dashboard' },
        { id: 'siswa', icon: 'fas fa-users', label: 'Data Siswa' }
    ]},
    { title: "Bank Soal", items: [
        { id: 'bank-sat', icon: 'fas fa-book', label: 'Bank Soal SAT', sub: KELAS_LIST.map(k=>({id:'bank-sat-'+k,label:k, param: k})) },
        { id: 'bank-paj', icon: 'fas fa-file-alt', label: 'Bank Soal PAJ', sub: [{id:'bank-paj-Kelas 6',label:'Kelas 6', param:'Kelas 6'}] }
    ]},
    { title: "Persiapan Ujian", items: [
        { id: 'token-sat', icon: 'fas fa-key', label: 'Token Ujian SAT', sub: KELAS_LIST.map(k=>({id:'token-sat-'+k,label:k, param: k})) },
        { id: 'token-paj', icon: 'fas fa-lock', label: 'Token Ujian PAJ', sub: [{id:'token-paj-Kelas 6',label:'Kelas 6', param:'Kelas 6'}] },
        { id: 'jadwal', icon: 'fas fa-calendar-alt', label: 'Jadwal Ujian' }
    ]},
    { title: "Pelaksanaan", items: [
        { id: 'ujian-sat', icon: 'fas fa-laptop', label: 'Ujian SAT', sub: KELAS_LIST.map(k=>({id:'ujian-sat-'+k,label:k, param: k})) },
        { id: 'ujian-paj', icon: 'fas fa-laptop-code', label: 'Ujian PAJ', sub: [{id:'ujian-paj-Kelas 6',label:'Kelas 6', param:'Kelas 6'}] }
    ]},
    { title: "Nilai & Laporan", items: [
        { id: 'rekap-sat', icon: 'fas fa-chart-bar', label: 'Rekap Nilai SAT' },
        { id: 'rekap-paj', icon: 'fas fa-chart-line', label: 'Rekap Nilai PAJ' },
        { id: 'cetak-laporan', icon: 'fas fa-print', label: 'Cetak Laporan' }
    ]}
];

function renderSidebar() {
    var container = document.getElementById('navContainer');
    var html = '';
    
    // Filter menu based on role if needed (currently showing all for structure demo)
    MENU_STRUCTURE.forEach(group => {
        html += `<div class="nav-group-title">${group.title}</div>`;
        group.items.forEach(item => {
            if(item.sub) {
                html += `
                <div class="nav-item group" onclick="toggleSubmenu(this)">
                    <i class="${item.icon} w-5 text-center"></i> ${item.label} <i class="fas fa-chevron-down ml-auto text-xs transition-transform"></i>
                    <div class="submenu hidden">
                        ${item.sub.map(sub => `<div class="nav-sub-item" data-page="${sub.id}" data-param="${sub.param||''}">${sub.label}</div>`).join('')}
                    </div>
                </div>`;
            } else {
                html += `<div class="nav-item" data-page="${item.id}"><i class="${item.icon} w-5 text-center"></i> ${item.label}</div>`;
            }
        });
    });
    container.innerHTML = html;

    // Event Delegation
    container.addEventListener('click', function(e) {
        var target = e.target.closest('.nav-item');
        var subTarget = e.target.closest('.nav-sub-item');
        
        if(subTarget) {
            e.stopPropagation();
            navigateTo(subTarget.dataset.page, subTarget.dataset.param);
        } else if(target && !target.querySelector('.submenu')) {
            navigateTo(target.dataset.page);
        }
    });
}

function toggleSubmenu(el) {
    var sm = el.querySelector('.submenu');
    var icon = el.querySelector('.fa-chevron-down');
    if(sm.classList.contains('hidden')) {
        sm.classList.remove('hidden');
        if(icon) icon.style.transform = 'rotate(180deg)';
    } else {
        sm.classList.add('hidden');
        if(icon) icon.style.transform = 'rotate(0deg)';
    }
}

// ================================================================
// CORE LOGIC
// ================================================================
function navigateTo(page, param) {
    // Update Active State
    document.querySelectorAll('.nav-item, .nav-sub-item').forEach(el => el.classList.remove('active'));
    var activeEl = document.querySelector(`.nav-sub-item[data-page="${page}"]`) || document.querySelector(`.nav-item[data-page="${page}"]`);
    if(activeEl) activeEl.classList.add('active');

    // Title
    var titles = {
        dashboard: 'Dashboard', siswa: 'Data Siswa', bank: 'Bank Soal', token: 'Token Ujian', jadwal: 'Jadwal Ujian',
        ujian: 'Pelaksanaan Ujian', rekap: 'Rekap Nilai', cetak: 'Cetak Laporan'
    };
    document.getElementById('pageTitle').innerText = param ? `${titles[page.split('-')[0]] || 'Halaman'} - ${param}` : (titles[page] || page);

    closeSidebar();
    renderPage(page, param);
}

function renderPage(page, param) {
    var c = document.getElementById('pageContent');
    c.innerHTML = '<div class="text-center text-muted py-20"><i class="fas fa-spinner fa-spin fa-2x mb-4"></i><br>Memuat halaman...</div>';
    
    // Unsubscribe old listeners
    listeners.forEach(l => l());
    listeners = [];

    setTimeout(() => {
        if(page === 'dashboard') renderDashboard(c);
        else if(page.startsWith('bank-sat')) renderBankSoal(c, param, 'sat');
        else if(page.startsWith('bank-paj')) renderBankSoal(c, param, 'paj');
        else if(page === 'siswa') renderSiswa(c);
        else if(page.startsWith('token-sat')) renderToken(c, param, 'sat');
        else if(page.startsWith('token-paj')) renderToken(c, param, 'paj');
        else if(page === 'jadwal') renderJadwal(c);
        else if(page.startsWith('ujian-sat')) renderUjianInterface(c, param, 'sat');
        else if(page.startsWith('ujian-paj')) renderUjianInterface(c, param, 'paj');
        else if(page === 'rekap-sat') renderRekap(c, 'sat');
        else if(page === 'rekap-paj') renderRekap(c, 'paj');
        else if(page === 'cetak-laporan') renderCetak(c);
        else c.innerHTML = '<div class="text-center py-20">Halaman dalam pengembangan</div>';
    }, 100);
}

// ================================================================
// INIT & AUTH
// ================================================================
function initApp() {
    // Setup Login Dropdown (Simulated Accounts)
    var sel = document.getElementById('loginUser');
    sel.innerHTML = '<option value="admin">Administrator (Full Access)</option>';
    MAPEL_LIST.forEach(m => {
        sel.innerHTML += `<option value="${m.id}">Guru ${m.nama}</option>`;
    });
    KELAS_LIST.forEach(k => {
        sel.innerHTML += `<option value="${k}">Wali Kelas ${k}</option>`;
    });
}

function doLogin() {
    var u = document.getElementById('loginUser').value;
    var p = document.getElementById('loginPass').value;
    // Simple bypass for demo logic structure
    currentUser = {
        role: u === 'admin' ? 'admin' : (MAPEL_LIST.find(m=>m.id===u) ? 'guru' : 'walikelas'),
        id: u,
        name: u === 'admin' ? 'Administrator' : (getMapelName(u) || u)
    };
    
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('sidebarRoleDisplay').innerText = currentUser.name;
    
    renderSidebar();
    navigateTo('dashboard');
    showToast('Selamat Datang, ' + currentUser.name, 'success');
}

function doLogout() {
    currentUser = null;
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('loginPass').value = '';
}

// ================================================================
// 1. DASHBOARD
// ================================================================
function renderDashboard(c) {
    // Mock stats for structure demo
    c.innerHTML = `
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="card border-l-4 border-kopAccent">
            <div class="text-muted text-xs uppercase">Total Siswa</div>
            <div class="text-2xl font-bold text-white mt-1">450</div>
        </div>
        <div class="card border-l-4 border-info">
            <div class="text-muted text-xs uppercase">Bank Soal SAT</div>
            <div class="text-2xl font-bold text-white mt-1">1,250</div>
        </div>
        <div class="card border-l-4 border-warning">
            <div class="text-muted text-xs uppercase">Bank Soal PAJ</div>
            <div class="text-2xl font-bold text-white mt-1">85</div>
        </div>
        <div class="card border-l-4 border-success">
            <div class="text-muted text-xs uppercase">Ujian Selesai</div>
            <div class="text-2xl font-bold text-white mt-1">12</div>
        </div>
    </div>
    <div class="card">
        <div class="card-header"><h3 class="font-bold text-lg text-light">Jadwal Hari Ini</h3></div>
        <table class="w-full text-sm">
            <thead><tr class="text-left text-muted"><th>Jam</th><th>Mapel</th><th>Kelas</th><th>Status</th></tr></thead>
            <tbody>
                <tr class="border-b border-border"><td class="py-2">07:30 - 09:00</td><td>Matematika</td><td>Kelas 6</td><td><span class="badge badge-success">Berjalan</span></td></tr>
                <tr class="border-b border-border"><td class="py-2">09:30 - 11:00</td><td>Bahasa Indonesia</td><td>Kelas 5</td><td><span class="badge badge-warning">Menunggu</span></td></tr>
            </tbody>
        </table>
    </div>`;
}

// ================================================================
// 2. DATA SISWA
// ================================================================
function renderSiswa(c) {
    c.innerHTML = `
    <div class="card">
        <div class="card-header">
            <h3 class="font-bold text-lg text-light">Data Siswa</h3>
            <button onclick="addSiswaModal()" class="btn-primary text-sm"><i class="fas fa-plus"></i> Tambah Siswa</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-dark/50 text-muted"><tr><th>NIS</th><th>Nama Lengkap</th><th>Kelas</th><th>L/P</th><th>Aksi</th></tr></thead>
                <tbody id="siswaTableBody">
                    <tr><td colspan="5" class="text-center py-4">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>`;
    
    listeners.push(db.collection('siswa').orderBy('nama').onSnapshot(snap => {
        var rows = snap.docs.map(d => {
            var s = d.data(); var id = d.id;
            return `<tr class="border-b border-border hover:bg-white/5">
                <td class="py-2">${s.nis||'-'}</td>
                <td class="font-semibold">${s.nama}</td>
                <td>${s.kelas}</td>
                <td>${s.jk}</td>
                <td>
                    <button onclick="deleteSiswa('${id}')" class="text-danger hover:text-white"><i class="fas fa-trash"></i></button>
                </td>
            </tr>`;
        }).join('');
        document.getElementById('siswaTableBody').innerHTML = rows || '<tr><td colspan="5" class="text-center py-4">Belum ada data siswa</td></tr>';
    }));
}

function addSiswaModal() {
    var html = `
    <div class="space-y-3">
        <div><label class="text-xs text-muted block mb-1">NIS</label><input id="addNis" class="input-field" type="text"></div>
        <div><label class="text-xs text-muted block mb-1">Nama Lengkap</label><input id="addNama" class="input-field" type="text"></div>
        <div class="grid grid-cols-2 gap-4">

function renderToken(c, kelas, mode) {
    c.innerHTML = `
    <div class="card">
        <div class="card-header">
            <h3 class="font-bold text-lg text-light">Token Ujian ${mode.toUpperCase()} - ${kelas}</h3>
            <button onclick="generateToken('${kelas}','${mode}')" class="btn-primary text-sm"><i class="fas fa-sync"></i> Buat Token Baru</button>
        </div>
        <div class="text-center py-10 bg-dark/30 rounded-lg">
            <div class="text-sm text-muted uppercase tracking-widest mb-2">Token Aktif</div>
            <div id="activeTokenDisplay" class="text-5xl font-mono font-bold text-kopAccent tracking-widest">-----</div>
            <p class="text-xs text-muted mt-4">Token berlaku selama sesi ujian berlangsung.</p>
        </div>
    </div>`;
    
    // Listen to specific token doc
    var docId = `token_${mode}_${kelas.replace(' ','')}`;
    listeners.push(db.collection('tokens').doc(docId).onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('activeTokenDisplay').innerText = doc.data().code;
        } else {
            document.getElementById('activeTokenDisplay').innerText = "-----";
        }
    }));
}

function generateToken(kelas, mode) {
    var code = Math.floor(100000 + Math.random() * 900000).toString();
    var docId = `token_${mode}_${kelas.replace(' ','')}`;
    db.collection('tokens').doc(docId).set({
        code: code,
        kelas: kelas,
        mode: mode,
        active: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>showToast('Token berhasil dibuat'));
}

function startExam(kelas, mode) {
    var nis = document.getElementById('uNis').value;
    var token = document.getElementById('uToken').value;
    var docId = `token_${mode}_${kelas.replace(' ','')}`;
    
    // 1. Validate Token
    db.collection('tokens').doc(docId).get().then(snap => {
        if(!snap.exists || snap.data().code !== token) return showToast('Token Salah / Tidak Aktif', 'error');
        
        // 2. Get Student Info
        return db.collection('siswa').where('nis','==',nis).limit(1).get();
    }).then(snap => {
        if(snap.empty) return showToast('Siswa tidak ditemukan', 'error');
        var siswa = snap.docs[0].data();
        
        // 3. Get Questions (Randomized logic should be here, simple get for demo)
        var coll = mode==='paj'?'questions_paj':'questions';
        return db.collection(coll).where('kelas','==',kelas).where('mapel','==',currentUser.id).get(); // Assuming current user acts as the mapel context
    }).then(snap => {
        if(snap.empty) return showToast('Soal belum tersedia untuk mapel ini', 'error');
        var questions = snap.docs.map(d=>Object.assign({id:d.id},d.data()));
        
        // Render Exam
        renderExamQuestions(kelas, mode, questions);
    }).catch(e => showToast('Error: '+e.message, 'error'));
}

function renderExamQuestions(kelas, mode, questions) {
    var html = `
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-lg">Ujian ${mode.toUpperCase()} - ${kelas}</h2>
            <div class="text-info font-mono" id="examTimer">45:00</div>
        </div>
        <div class="space-y-6">
            ${questions.map((q,i) => `
                <div class="p-4 border border-border rounded bg-dark/30">
                    <div class="font-bold mb-2">${i+1}. ${q.text}</div>
                    ${q.type==='pg' ? 
                        `<div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            ${['A','B','C','D'].map(opt => `
                                <label class="flex items-center gap-2 cursor-pointer hover:bg-white/5 p-2 rounded">
                                    <input type="radio" name="q_${q.id}" value="${opt}"> <span>${opt}.</span> 
                                    <span class="text-sm">${q.options?q.options[opt.toLowerCase()]:''}</span> <!-- Demo: Options need to be stored properly in Question object -->
                                </label>
                            `).join('')}
                         </div>` 
                        : `<textarea class="input-field" rows="3" placeholder="Jawaban Anda..."></textarea>`
                    }
                </div>
            `).join('')}
        </div>
        <button onclick="submitExam()" class="btn-primary w-full mt-8 py-3 text-lg">Kirim Jawaban</button>
    </div>`;
    document.getElementById('pageContent').innerHTML = html;
    startTimer();
}

function startTimer() {
    var duration = 45 * 60; // 45 mins
    var display = document.getElementById('examTimer');
    var timer = setInterval(function () {
        var minutes = parseInt(duration / 60, 10);
        var seconds = parseInt(duration % 60, 10);
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.textContent = minutes + ":" + seconds;
        if (--duration < 0) { clearInterval(timer); submitExam(); }
    }, 1000);
}

function submitExam() {
    if(confirm('Kirim jawaban sekarang?')) {
        showToast('Jawaban berhasil dikirim!', 'success');
        navigateTo('dashboard');
    }
}

// ================================================================
// UTILITIES
// ================================================================
function openModal(title, body, footer) {
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalBody').innerHTML = body;
    document.getElementById('modalFooter').innerHTML = footer || '';
    document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }
function toggleSidebar() {
    var sb = document.getElementById('sidebar');
    var ov = document.getElementById('sidebarOverlay');
    sb.classList.toggle('mobile-open');
    ov.classList.toggle('active', sb.classList.contains('mobile-open'));
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}
function showToast(msg, type) {
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
    t.className = 'toast toast-'+type;
    t.innerHTML = '<i class="fas fa-'+icon+'"></i><span>'+msg+'</span>';
    c.appendChild(t);
    setTimeout(()=>{ if(t.parentNode) t.remove(); }, 3000);
}
function deleteDoc(coll, id) {
    if(confirm('Hapus data ini?')) db.collection(coll).doc(id).delete().then(()=>showToast('Dihapus')).catch(e=>showToast(e.message,'error'));
}
