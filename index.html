<style>
/* STYLE UTILITIES & ANIMATION */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(24,37,56,0.9);backdrop-filter:blur(12px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease;overflow-y:auto}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c}
.input-field option{background:#182538;color:#e8ecf1}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* PRINT STYLES */
@media print {
    @page { size: A4 portrait; margin: 0.5cm; }
    body { background: white !important; color: black !important; font-family: 'Times New Roman', Times, serif !important; }
    #sidebar, #mainArea > header, .no-print, #toastContainer, #modalOverlay, #loginPage, .card { display: none !important; }
    #mainArea { margin: 0 !important; padding: 0 !important; width: 100% !important; background: white !important; overflow: visible !important; }
    #pageContent { padding: 0 !important; margin: 0 !important; background: white !important; color: black !important; overflow: visible !important; }
    .print-only { display: block !important; }
    
    /* Kartu Ujian Print */
    .exam-card { width: 100%; border: 2px solid #000; padding: 20px; margin-bottom: 20px; page-break-inside: avoid; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .exam-card img { max-width: 100%; height: auto; margin: 10px 0; }
    .exam-card-header { font-weight: bold; font-size: 16pt; text-transform: uppercase; margin-bottom: 10px; border-bottom: 2px solid #000; width: 100%; padding-bottom: 5px; }
    .exam-card-row { display: flex; width: 100%; justify-content: space-between; margin: 5px 0; font-size: 11pt; }
}

.print-only { display: none; }
</style>
</head>
<body>

<div id="toastContainer"></div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-bg">
<div class="glass rounded-2xl p-10 w-full max-w-md relative z-10 fade-in">
    <div class="text-center mb-8">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full overflow-hidden border-4 border-kopAccent shadow-lg flex items-center justify-center bg-white">
            <img src="https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">KOREK API</h1>
        <p class="text-muted text-sm mt-1">Sistem Ujian Digital & Penilaian</p>
    </div>
    <div class="space-y-4">
        <div><label class="text-xs text-muted font-semibold uppercase mb-1 block">Pilih Mapel</label><select id="loginMapel" class="input-field"></select></div>
        <div><label class="text-xs text-muted font-semibold uppercase mb-1 block">Pilih Kelas</label><select id="loginKelas" class="input-field" disabled></select></div>
        <div><label class="text-xs text-muted font-semibold uppercase mb-1 block">Password</label><input type="password" id="loginPass" class="input-field" placeholder="******"></div>
        <p id="loginError" class="text-danger text-xs hidden"></p>
        <button onclick="doLogin()" class="btn-primary w-full mt-2"><i class="fas fa-sign-in-alt mr-2"></i>Masuk</button>

</div>
</div>

<!-- MAIN APP -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center"><i class="fas fa-fire text-kop text-lg"></i></div>
        <div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Sistem Terintegrasi</p></div>
    </div>
    <nav class="py-4" id="sidebarNav">
        <div class="px-5 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Master Data</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="students"><i class="fas fa-user-graduate w-5 text-center"></i>Data Siswa</div>
        
        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Pelaksanaan Ujian SAT</span></div>
        <div class="nav-item" data-page="exam-sat"><i class="fas fa-laptop-code w-5 text-center"></i>Ujian SAT (Online)</div>
        <div class="nav-item" data-page="results-sat"><i class="fas fa-clipboard-check w-5 text-center"></i>Hasil SAT</div>

        <div class="px-5 mt-4 mb-2"><span class="text-xs text-danger font-semibold uppercase tracking-wider font-semibold">Pelaksanaan PAJ</span></div>
        <div class="nav-item paj-item" data-page="exam-paj"><i class="fas fa-graduation-cap w-5 text-center"></i>Ujian PAJ (Online)</div>
        <div class="nav-item paj-item" data-page="results-paj"><i class="fas fa-award w-5 text-center"></i>Hasil PAJ</div>

        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Dokumen</span></div>
        <div class="nav-item" data-page="print-docs"><i class="fas fa-print w-5 text-center"></i>Cetak Soal & Kisi</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="doLogout()" class="btn-secondary w-full text-xs py-2"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/90 backdrop-blur border-b border-border px-4 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3"><button onclick="toggleSidebar()" class="text-muted hover:text-light"><i class="fas fa-bars"></i></button><h2 id="pageTitle" class="font-display font-bold text-light">Dashboard</h2></div>
        <div class="flex items-center gap-2"><span id="userInfo" class="text-sm font-semibold text-kopAccent"></span></div>
    </header>
    <div class="p-4 md:p-6" id="pageContent"></div>
</div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ================= KONFIGURASI FIREBASE =================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

// ================= DATA MASTER =================
var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},
    {id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},
    {id:'sbd',nama:'Seni Budaya'},
    {id:'ipas',nama:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},
    {id:'pai',nama:'PAI'},
    {id:'pjok',nama:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMapelName(id){ var m=MAPEL_LIST.find(x=>x.id===id); return m?m.nama:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================= STATE =================
var currentUser = null;
var questions = []; 
var questionsPAJ = [];
var students = [];
var unsubQ = null, unsubPAJ = null, unsubS = null;

// ================= UI UTILS =================
function showToast(msg, type){
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    t.className = 'toast toast-'+(type||'success');
    t.innerHTML = '<i class="fas fa-info-circle"></i><span>'+msg+'</span>';
    c.appendChild(t);
    setTimeout(()=>t.remove(), 3000);
}
function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('modalBody').innerHTML=''; }
function openModal(html){ document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('modalBody').innerHTML=html; }
function toggleSidebar(){ 
    document.getElementById('sidebar').classList.toggle('mobile-open');
    document.getElementById('sidebarOverlay').classList.toggle('active', document.getElementById('sidebar').classList.contains('mobile-open'));
}
function makeMapelOpt(sel){
    if(currentUser && currentUser.isAdmin){
        var h = '<option value="">-- Pilih --</option>';
        MAPEL_LIST.forEach(m=>h+='<option value="'+m.id+'"'+(m.id===sel?' selected':'')+'>'+m.nama+'</option>');
        return h;
    }
    return '<option value="'+currentUser.mapel+'" selected>'+getMapelName(currentUser.mapel)+'</option>';
}
function makeKelasOpt(sel){
    if(currentUser && currentUser.isAdmin){
        var h = '<option value="">-- Pilih --</option>';
        KELAS_LIST.forEach(k=>h+='<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>');
        return h;
    }
    return '<option value="'+currentUser.kelas+'" selected>'+currentUser.kelas+'</option>';
}

// ================= INIT & AUTH =================
function initApp(){
    db.collection('accounts').limit(1).get().then(snap=>{
        if(snap.empty){
            var batch = db.batch();
            batch.set(db.collection('accounts').doc('admin'), {mapel:'admin', kelas:'Semua', password:'admin123'});
            MAPEL_LIST.forEach(m=>{
                KELAS_LIST.forEach(k=>{
                    batch.set(db.collection('accounts').doc(m.id+'_'+k.replace(' ','')), {mapel:m.id, kelas:k, password:'guru123'});
                });
            });
            return batch.commit();
        }
    }).then(()=>{ showToast('Sistem Siap'); }).catch(()=>{});

    db.collection('accounts').onSnapshot(snap=>{
        var acc = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        var sel = document.getElementById('loginMapel');
        sel.innerHTML = '<option value="">-- Pilih Mapel --</option><option value="admin">Admin</option>';
        MAPEL_LIST.forEach(m=>sel.innerHTML+='<option value="'+m.id+'">'+m.nama+'</option>');
        sel.onchange = function(){
            var ks = document.getElementById('loginKelas');
            if(this.value==='admin'){
                ks.innerHTML = '<option value="Semua">Semua Kelas</option>'; ks.disabled=false;
            } else if(this.value){
                ks.disabled=false; ks.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                KELAS_LIST.forEach(k=>ks.innerHTML+='<option value="'+k+'">'+k+'</option>');
            } else { ks.innerHTML=''; ks.disabled=true; }
        };
    });
}

function doLogin(){
    var mapel = document.getElementById('loginMapel').value;
    var kelas = document.getElementById('loginKelas').value;
    var pass = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginError');
    if(!mapel || !kelas){ errEl.textContent='Lengkapi data login'; errEl.classList.remove('hidden'); return; }

    db.collection('accounts').where('mapel','==',mapel).where('kelas','==',kelas).where('password','==',pass).limit(1).get().then(snap=>{
        if(snap.empty){ errEl.textContent='Password salah!'; errEl.classList.remove('hidden'); return; }
        var d = snap.docs[0].data();
        currentUser = { id: snap.docs[0].id, mapel:d.mapel, kelas:d.kelas, isAdmin: d.mapel==='admin' };
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('userInfo').textContent = currentUser.isAdmin ? 'Administrator' : getMapelName(currentUser.mapel)+' '+currentUser.kelas;
        initMainPage();
    });
}

function doLogout(){
    currentUser = null;
    if(unsubQ) unsubQ(); if(unsubPAJ) unsubPAJ(); if(unsubS) unsubS();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display='';
    document.getElementById('loginPass').value='';
}

// ================= MAIN LOGIC =================
function initMainPage(){
    // Listen Soal SAT
    unsubQ = db.collection('questions').orderBy('createdAt','asc').onSnapshot(snap=>{
        questions = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        renderDashboard(); // Refresh stats if active
    });
    // Listen Soal PAJ
    unsubPAJ = db.collection('questions_paj').orderBy('createdAt','asc').onSnapshot(snap=>{
        questionsPAJ = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
    });
    // Listen Siswa
    unsubS = db.collection('students').orderBy('nama','asc').onSnapshot(snap=>{
        students = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        if(document.getElementById('studentsListContainer')) renderStudentList();
        if(document.getElementById('resultsTable')) renderResultsTable();
    });

    navigateTo('dashboard');
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector('.nav-item[data-page="'+page+'"]')?.classList.add('active');
    document.getElementById('pageTitle').textContent = page.replace('-',' ').toUpperCase();
    closeSidebar();
    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(); break;
        case 'students': renderStudents(); break;
        case 'exam-sat': renderExamSetup('sat'); break;
        case 'exam-paj': renderExamSetup('paj'); break;
        case 'results-sat': renderResults('sat'); break;
        case 'results-paj': renderResults('paj'); break;
        case 'print-docs': renderPrintDocs(); break;
    }
}

document.getElementById('sidebarNav').addEventListener('click', e=>{
    var item = e.target.closest('.nav-item');
    if(item) navigateTo(item.dataset.page);
});

// ================= 1. DASHBOARD =================
function renderDashboard(){
    var c = document.getElementById('pageContent');
    var myQ = currentUser.isAdmin ? questions : questions.filter(q=>q.mapel===currentUser.mapel && q.kelas===currentUser.kelas);
    var myPAJQ = currentUser.isAdmin ? questionsPAJ : questionsPAJ.filter(q=>q.mapel===currentUser.mapel);
    
    c.innerHTML = '<div class="grid grid-cols-2 md:grid-cols-4 gap-4 fade-in">'+
        '<div class="card text-center border-l-4 border-kopAccent"><div class="text-3xl font-bold text-kopAccent">'+questions.length+'</div><div class="text-xs text-muted">Soal SAT</div></div>'+
        '<div class="card text-center border-l-4 border-danger"><div class="text-3xl font-bold text-danger">'+questionsPAJ.length+'</div><div class="text-xs text-muted">Soal PAJ</div></div>'+
        '<div class="card text-center border-l-4 border-info"><div class="text-3xl font-bold text-info">'+students.length+'</div><div class="text-xs text-muted">Total Siswa</div></div>'+
        '<div class="card text-center border-l-4 border-success"><div class="text-3xl font-bold text-success">0</div><div class="text-xs text-muted">Ujian Aktif</div></div>'+
    '</div>';
}

// ================= 2. MANAJEMEN SISWA =================
function renderStudents(){
    var c = document.getElementById('pageContent');
    c.innerHTML = '<div class="fade-in card">'+
        '<div class="flex justify-between items-center mb-4">'+
            '<h3 class="font-display font-bold text-light">Data Siswa</h3>'+
            '<button onclick="openAddStudentModal()" class="btn-primary text-sm"><i class="fas fa-plus mr-1"></i>Tambah Siswa</button>'+
        '</div>'+
        '<div class="mb-4 grid grid-cols-1 md:grid-cols-3 gap-2">'+
            '<input type="text" id="searchStudent" class="input-field" placeholder="Cari Nama / NISN..." onkeyup="renderStudentList()">'+
            '<select id="filterKelasSiswa" class="input-field" onchange="renderStudentList()"><option value="">Semua Kelas</option>'+KELAS_LIST.map(k=>'<option value="'+k+'">'+k+'</option>').join('')+'</select>'+
        '</div>'+
        '<div class="overflow-x-auto"><table class="w-full text-sm text-left text-muted"><thead class="text-xs uppercase bg-dark border-b border-border"><tr><th class="px-4 py-3">NISN</th><th class="px-4 py-3">Nama</th><th class="px-4 py-3">Kelas</th><th class="px-4 py-3">Rombel</th><th class="px-4 py-3">Aksi</th></tr></thead><tbody id="studentsListContainer"></tbody></table></div>'+
    '</div>';
    renderStudentList();
}

function renderStudentList(){
    var q = document.getElementById('searchStudent').value.toLowerCase();
    var k = document.getElementById('filterKelasSiswa').value;
    var list = students.filter(s=>{
        return (!q || s.nama.toLowerCase().includes(q) || s.nisn.includes(q)) && (!k || s.kelas===k);
    });
    var tb = document.getElementById('studentsListContainer');
    if(!list.length){ tb.innerHTML='<tr><td colspan="5" class="px-4 py-4 text-center">Tidak ada data</td></tr>'; return; }
    tb.innerHTML = list.map(s=>`
        <tr class="bg-dark/30 border-b border-border hover:bg-dark/50">
            <td class="px-4 py-2 font-mono">${s.nisn}</td>
            <td class="px-4 py-2 font-semibold text-light">${s.nama}</td>
            <td class="px-4 py-2">${s.kelas}</td>
            <td class="px-4 py-2">${s.rombel||'-'}</td>
            <td class="px-4 py-2 flex gap-2">
                <button onclick="printCard('${s.id}')" class="text-kopAccent hover:text-white" title="Cetak Kartu"><i class="fas fa-id-card"></i></button>
                <button onclick="deleteStudent('${s.id}')" class="text-danger hover:text-white" title="Hapus"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function openAddStudentModal(){
    openModal(`
        <h3 class="font-bold mb-4">Tambah/Edit Siswa</h3>
        <input type="hidden" id="sId">
        <div class="grid gap-3">
            <div><label class="text-xs text-muted">Nama Lengkap</label><input id="sNama" class="input-field"></div>
            <div><label class="text-xs text-muted">NISN</label><input id="sNisn" class="input-field"></div>
            <div><label class="text-xs text-muted">Kelas</label><select id="sKelas" class="input-field">${KELAS_LIST.map(k=>'<option value="'+k+'">'+k+'</option>').join('')}</select></div>
            <div><label class="text-xs text-muted">Rombel (Contoh: 6A)</label><input id="sRombel" class="input-field"></div>
            <button onclick="saveStudent()" class="btn-primary w-full mt-2">Simpan</button>
        </div>
    `);
}

function saveStudent(){
    var id = document.getElementById('sId').value;
    var data = {
        nama: document.getElementById('sNama').value.trim(),
        nisn: document.getElementById('sNisn').value.trim(),
        kelas: document.getElementById('sKelas').value,
        rombel: document.getElementById('sRombel').value.trim().toUpperCase(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    if(!data.nama || !data.nisn || !data.kelas) return showToast('Data tidak lengkap','error');
    
    if(id){ db.collection('students').doc(id).update(data).then(()=>{showToast('Data diupdate');closeModal();}); }
    else { db.collection('students').add(data).then(()=>{showToast('Siswa ditambah');closeModal();}); }
}

function deleteStudent(id){
    if(confirm('Hapus siswa ini?')) db.collection('students').doc(id).delete().then(()=>showToast('Dihapus'));
}

function printCard(sid){
    var s = students.find(x=>x.id===sid);
    if(!s) return;
    // Generate Barcode Canvas
    var cId = 'bc-'+Date.now();
    openModal(`<div class="text-center"><canvas id="${cId}"></canvas><p class="mt-2 text-muted">Kartu Ujian: ${s.nama}</p><button onclick="printCardExecute('${cId}','${s.nama}','${s.nisn}','${s.kelas}','${s.rombel}')" class="btn-primary mt-4">Cetak Sekarang</button></div>`);
    setTimeout(()=>{
        JsBarcode("#"+cId, s.nisn, {format: "CODE128", displayValue:true, height:50, width:2, fontSize:14});
    }, 500);
}

function printCardExecute(canvasId, nama, nisn, kelas, rombel){
    var canvas = document.getElementById(canvasId);
    var imgData = canvas.toDataURL("image/png");
    
    var printWindow = window.open('', '', 'height=600,width=800');
    printWindow.document.write('<html><head><title>Kartu Ujian</title>');
    printWindow.document.write('<style>body{font-family:sans-serif;text-align:center;padding:20px;} .card{border:2px solid #000;padding:20px;width:350px;margin:0 auto;} .row{display:flex;justify-content:space-between;margin:10px 0;font-size:14px;}</style>');
    printWindow.document.write('</head><body>');
    printWindow.document.write('<div class="card">');
    printWindow.document.write('<h3>KARTU PESERTA UJIAN</h3>');
    printWindow.document.write('<img src="'+imgData+'" style="width:100%;margin:10px 0;">');
    printWindow.document.write('<div class="row"><span>Nama:</span> <strong>'+nama+'</strong></div>');
    printWindow.document.write('<div class="row"><span>NISN:</span> <strong>'+nisn+'</strong></div>');
    printWindow.document.write('<div class="row"><span>Kelas:</span> <strong>'+kelas+'</strong></div>');
    printWindow.document.write('<div class="row"><span>Rombel:</span> <strong>'+rombel+'</strong></div>');
    printWindow.document.write('</div></body></html>');
    printWindow.document.close();
    printWindow.print();
}

// ================= 3. PENGATURAN UJIAN (TOKEN & WAKTU) =================
function renderExamSetup(type){
    var isPAJ = type === 'paj';
    var title = isPAJ ? 'UJIAN PAJ (KELAS 6)' : 'UJIAN SAT (KELAS 1-6)';
    var c = document.getElementById('pageContent');
    
    var html = '<div class="fade-in card"><h3 class="font-display font-bold text-light mb-4">'+title+'</h3>';
    html += '<div class="grid md:grid-cols-2 gap-4 mb-4">';
    html += '<div><label class="text-xs text-muted mb-1">Mapel</label><select id="examMapel" class="input-field" onchange="loadExamSettings(\''+type+'\')">'+makeMapelOpt(currentUser.mapel)+'</select></div>';
    html += '<div><label class="text-xs text-muted mb-1">Kelas</label><select id="examKelas" class="input-field" onchange="loadExamSettings(\''+type+'\')">'+makeKelasOpt(currentUser.kelas)+'</select></div>';
    html += '</div>';
    
    html += '<div class="bg-dark/30 p-4 rounded-lg border border-border mb-4">';
    html += '<h4 class="text-sm font-bold mb-2 text-kopAccent">Pengaturan Ujian</h4>';
    html += '<div class="grid grid-cols-2 gap-4">';
    html += '<div><label class="text-xs text-muted mb-1 block">Token Akses</label><input type="text" id="examToken" class="input-field font-mono uppercase" placeholder="MASUKKAN TOKEN"></div>';
    html += '<div><label class="text-xs text-muted mb-1 block">Durasi (Menit)</label><input type="number" id="examTime" class="input-field" value="60" min="10"></div>';
    html += '</div>';
    html += '<div class="mt-4 text-right"><button onclick="saveExamSettings(\''+type+'\')" class="btn-primary"><i class="fas fa-save mr-1"></i>Simpan Pengaturan</button></div>';
    html += '</div>';
    
    html += '<div id="examStudentList"></div>'; // Area daftar siswa yang eligible
    html += '</div>';
    
    c.innerHTML = html;
    loadExamSettings(type);
}

function loadExamSettings(type){
    var mapel = document.getElementById('examMapel').value;
    var kelas = document.getElementById('examKelas').value;
    if(!mapel || !kelas) return;

    // Load settings dari 'settings' collection
    var settingId = type + '_' + mapel + '_' + kelas;
    db.collection('settings').doc(settingId).get().then(doc=>{
        if(doc.exists){
            document.getElementById('examToken').value = doc.data().token || '';
            document.getElementById('examTime').value = doc.data().duration || 60;
        } else {
            document.getElementById('examToken').value = '';
            document.getElementById('examTime').value = 60;
        }
        renderEligibleStudents(mapel, kelas, type);
    });
}

function saveExamSettings(type){
    var mapel = document.getElementById('examMapel').value;
    var kelas = document.getElementById('examKelas').value;
    var token = document.getElementById('examToken').value.trim();
    var time = parseInt(document.getElementById('examTime').value) || 60;
    
    var settingId = type + '_' + mapel + '_' + kelas;
    db.collection('settings').doc(settingId).set({
        token: token,
        duration: time,
        type: type,
        mapel: mapel,
        kelas: kelas,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>showToast('Pengaturan disimpan!'));
}

function renderEligibleStudents(mapel, kelas, type){
    // Tampilkan daftar siswa di kelas tersebut
    var list = students.filter(s => s.kelas === kelas);
    var container = document.getElementById('examStudentList');
    container.innerHTML = '<h4 class="text-sm font-bold mb-2 text-light">Peserta Kelas '+kelas+'</h4>' + 
        '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 max-h-60 overflow-y-auto">'+
        list.map(s=>'<div class="bg-dark/50 p-2 rounded text-xs flex justify-between"><span>'+s.nama+'</span> <span class="text-muted">'+s.rombel+'</span></div>').join('')+
    '</div>';
}

// ================= 4. HASIL & KOREKSI =================
function renderResults(type){
    var isPAJ = type === 'paj';
    var c = document.getElementById('pageContent');
    c.innerHTML = `<div class="fade-in card">
        <h3 class="font-display font-bold text-light mb-4">Hasil ${isPAJ?'PAJ':'SAT'}</h3>
        <div class="flex flex-wrap gap-4 mb-4">
            <select id="resMapel" class="input-field" onchange="renderResultsTable('${type}')">${makeMapelOpt('')}</select>
            <select id="resKelas" class="input-field" onchange="renderResultsTable('${type}')"><option value="">Pilih Kelas</option>${KELAS_LIST.map(k=>`<option value="${k}">${k}</option>`).join('')}</select>
            <button onclick="renderResultsTable('${type}')" class="btn-secondary"><i class="fas fa-sync"></i> Refresh</button>
        </div>
        <div class="overflow-x-auto bg-white text-black rounded-lg">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-200 border-b">
                    <tr><th class="p-2">Nama</th><th class="p-2">Mapel</th><th class="p-2">PG</th><th class="p-2">Uraian</th><th class="p-2">Nilai Akhir</th><th class="p-2">Status</th></tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
    </div>`;
}

function renderResultsTable(type){
    var mapel = document.getElementById('resMapel').value;
    var kelas = document.getElementById('resKelas').value;
    var tb = document.getElementById('resultsTable');
    if(!mapel || !kelas){ tb.innerHTML='<tr><td colspan="6" class="p-4 text-center text-gray-500">Pilih Mapel & Kelas</td></tr>'; return; }

    var col = type==='paj' ? 'results_paj' : 'results_sat';
    db.collection(col).where('mapel','==',mapel).where('kelas','==',kelas).get().then(snap=>{
        if(snap.empty){ tb.innerHTML='<tr><td colspan="6" class="p-4 text-center">Belum ada hasil ujian</td></tr>'; return; }
        var html = '';
        snap.forEach(doc=>{
            var d = doc.data();
            var sName = students.find(s=>s.nisn===d.nisn)?.nama || d.nisn;
            var skorPG = d.scorePG || 0;
            var skorUraian = d.scoreEssay || 0;
            var final = (skorPG + skorUraian).toFixed(1);
            var status = parseFloat(final) >= 75 ? '<span class="text-success font-bold">TUNTAS</span>' : '<span class="text-danger font-bold">REMIDIAL</span>';
            
            html += `<tr class="border-b">
                <td class="p-2">${sName}</td>
                <td class="p-2">${getMapelName(mapel)}</td>
                <td class="p-2 text-center">${skorPG}</td>
                <td class="p-2 text-center">${skorUraian}</td>
                <td class="p-2 text-center font-bold">${final}</td>
                <td class="p-2 text-center">${status}</td>
            </tr>`;
        });
        tb.innerHTML = html;
    });
}

    // Placeholder untuk fitur cetak soal yang lama jika diperlukan

}
