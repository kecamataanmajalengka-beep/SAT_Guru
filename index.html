<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(24,37,56,0.9);backdrop-filter:blur(12px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:#1a2744;border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}

.input-field:focus{outline:none;border-color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}

/* Print & Preview Styles */

    .clearfix::after { content: ""; display: table; clear: both; }
    .ttd-section { display: none; } 

    .print-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-family: 'Times New Roman', serif; font-size: 10pt; table-layout: fixed; }
    .print-table th, .print-table td { border: 1px solid #000; padding: 6px 8px; text-align: left; vertical-align: top; overflow: hidden; }
    .print-table th { background-color: #eee !important; -webkit-print-color-adjust: exact; text-align: center; font-weight: bold; font-size: 9pt; text-transform: uppercase; }
    .print-table td.center { text-align: center; vertical-align: middle; }
    .print-table td.wrap-text { word-wrap: break-word; white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; font-size: 9.5pt; }
}

.print-preview-sheet .soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ddd; background-color: #f9f9f9; }

<body>

<!-- LOGIN / REGISTER GURU -->
<div id="loginPage" class="login-bg">
    <div class="glass rounded-2xl p-8 w-full max-w-lg fade-in">
        <div class="text-center mb-6">
            <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">GURU PANEL</h1>
            <p class="text-muted text-sm">Terintegrasi dengan Database Soal Pusat (Read-Only)</p>
        </div>

        <!-- FORM DAFTAR GURU BARU -->
        <div id="registerForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">NPSN Sekolah</label>
                    <input type="number" id="regNpsn" class="input-field" placeholder="202xxxx">
                </div>
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">NIP Guru</label>
                    <input type="number" id="regNip" class="input-field" placeholder="NIP Anda">
                </div>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Nama Lengkap</label>
                <input type="text" id="regNama" class="input-field" placeholder="Nama Lengkap + Gelar">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">Jenis Guru</label>
                    <select id="regJenis" class="input-field" onchange="handleJenisChange()">
                        <option value="kelas">Guru Kelas (1-6)</option>
                        <option value="pai">Guru PAI</option>
                        <option value="pjok">Guru PJOK</option>
                    </select>
                </div>
                
                <!-- Hanya muncul jika Guru Kelas -->
                <div id="wrapperKelas">
                    <label class="text-xs text-muted font-semibold uppercase">Kelas Ampuan</label>
                    <select id="regKelas" class="input-field">
                        <option value="Kelas 1">Kelas 1</option>
                        <option value="Kelas 2">Kelas 2</option>
                        <option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option>
                        <option value="Kelas 5">Kelas 5</option>
                        <option value="Kelas 6">Kelas 6</option>
                    </select>
                </div>

                <!-- Wajib semua guru -->
                <div id="wrapperRombel">
                    <label class="text-xs text-muted font-semibold uppercase">Rombel</label>
                    <select id="regRombel" class="input-field">
                        <option value="A">Rombel A</option>
                        <option value="B">Rombel B</option>
                        <option value="C">Rombel C</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password Baru</label>
                <input type="password" id="regPass" class="input-field" placeholder="Buat password">
            </div>
            <button onclick="doRegister()" class="btn-primary w-full mt-2">Daftar Guru</button>
            <p class="text-center text-xs text-muted mt-2">Sudah punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Login disini</a></p>
        </div>

        <!-- FORM LOGIN GURU -->
        <div id="loginForm" class="space-y-4 hidden">
            <div>
                <label class="text-xs text-muted font-semibold uppercase">NIP / NPSN</label>
                <input type="text" id="logUser" class="input-field" placeholder="Masukkan NIP atau NPSN">
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password</label>
                <input type="password" id="logPass" class="input-field" placeholder="Password">
            </div>
            <button onclick="doLogin()" class="btn-primary w-full mt-2">Masuk Panel</button>
            <button onclick="doResetPassword()" class="btn-secondary w-full text-xs text-danger mt-2">Lupa Password?</button>
            <p class="text-center text-xs text-muted mt-2">Belum punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Daftar Guru Baru</a></p>
        </div>
    </div>
</div>

<!-- MAIN APP GURU -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-6 border-b border-border">
        <h2 class="font-display text-xl font-bold text-kopAccent">PANEL GURU</h2>
        <p id="userGreeting" class="text-xs text-muted mt-1">Selamat Datang</p>
    </div>
    <nav class="py-4">
        <div class="nav-item active" onclick="nav('dashboard')"><i class="fas fa-home w-5"></i>Dashboard</div>
        <div class="nav-item" onclick="nav('siswa')"><i class="fas fa-users w-5"></i>Data Siswa</div>
        <div class="nav-item" onclick="nav('soal-view')"><i class="fas fa-file-alt w-5"></i>Bank Soal</div> 
        <div class="nav-item" onclick="nav('kisi')"><i class="fas fa-table w-5"></i>Kisi-Kisi</div> 
        <div class="nav-item" onclick="nav('kunci')"><i class="fas fa-key w-5"></i>Kunci Jawaban</div> 
        <div class="nav-item" onclick="nav('print')"><i class="fas fa-print w-5"></i>Cetak Soal</div> 
        <div class="nav-item" onclick="nav('ujian')"><i class="fas fa-clock w-5"></i>Atur Ujian & Token</div>
        <div class="nav-item" onclick="nav('koreksi')"><i class="fas fa-check-double w-5"></i>Koreksi Jawaban</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="logout()" class="btn-danger w-full"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen bg-dark p-6">
    <div id="contentArea"></div>
</div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div id="modalContent"></div>
    </div>
</div>

<script>
// --- KONFIGURASI FIREBASE ---
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
var db = firebase.firestore();

// --- DATA MASTER ---
var MAPEL = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},
    {id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},
    {id:'ipas',nama:'IPAS'},
    {id:'sbd',nama:'Seni Budaya'},
    {id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},
    {id:'pai',nama:'PAI'},
    {id:'pjok',nama:'PJOK'}
];
var KELAS = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

// --- STATE ---
var currentUser = null;
var soalList = []; 
var pajSoalList = [];
var siswaList = []; 
var jawabanList = []; 
var tokenData = null; // Ubah jadi object per mapel: { 'pai': {token:'...', durasi:60}, 'pjok': {...} }

// --- FUNGSI UTILITAS ---
function getMapelName(id){ var m=MAPEL.find(function(x){return x.id===id;}); return m?m.nama:id; }

// Helper: Tentukan Mapel apa saja yang boleh diakses Guru ini
function getTeacherMapels() {
    if (!currentUser) return [];
    if (currentUser.jenis === 'kelas') {
        // Guru Kelas: Semua mapel KECUALI PAI & PJOK
        return MAPEL.filter(m => m.id !== 'pai' && m.id !== 'pjok');
    } else {
        // Guru PAI / PJOK: Hanya mapelnya sendiri
        return MAPEL.filter(m => m.id === currentUser.jenis);
    }
}

function toggleLoginMode(){
    document.getElementById('registerForm').classList.toggle('hidden');
    document.getElementById('loginForm').classList.toggle('hidden');
}

function handleJenisChange(){
    var jenis = document.getElementById('regJenis').value;
    var wrapK = document.getElementById('wrapperKelas');
    var wrapR = document.getElementById('wrapperRombel');
    if(jenis === 'kelas'){
        wrapK.classList.remove('hidden');
        wrapR.classList.remove('hidden');
    } else {
        wrapK.classList.add('hidden');
        wrapR.classList.remove('hidden');
    }
}

// --- AUTH GURU ---
function doRegister(){
    var npsn = document.getElementById('regNpsn').value;
    var nip = document.getElementById('regNip').value;
    var nama = document.getElementById('regNama').value;
    var jenis = document.getElementById('regJenis').value;
    var kelas = (jenis==='kelas') ? document.getElementById('regKelas').value : 'Semua';
    var rombel = document.getElementById('regRombel').value;
    var pass = document.getElementById('regPass').value;

    if(!npsn || !nip || !nama || !pass) return alert("Mohon lengkapi data!");

    db.collection('users_guru').add({
        npsn: npsn, nip: nip, nama: nama, jenis: jenis, kelas: kelas, rombel: rombel, password: pass, role: 'guru', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
        alert("Registrasi Berhasil!");
        doLoginDirect(nip, pass);
    }).catch(e=>alert("Error: "+e.message));
}

function doLogin(){
    var user = document.getElementById('logUser').value;
    var pass = document.getElementById('logPass').value;
    doLoginDirect(user, pass);
}

function doLoginDirect(user, pass){
    db.collection('users_guru').where('nip', '==', user).where('password','==',pass).get()
    .then(snap=>{
        if(snap.empty) return alert("Login Gagal! Cek NIP/NPSN dan Password.");
        var doc = snap.docs[0];
        currentUser = doc.data();

// --- INISIALISASI DATA ---
function initListeners(){
    // 1. Ambil Soal Regular
    db.collection('questions').orderBy('createdAt','asc')
    .onSnapshot(function(snap){
        soalList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    // 2. Ambil Soal PAJ (Khusus Mapel PAI & PJOK)
    db.collection('questions_paj').orderBy('createdAt','asc')
    .onSnapshot(function(snap){
        pajSoalList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    // 3. Ambil Data Siswa
    db.collection('data_siswa').where('rombel', '==', currentUser.rombel)
    .onSnapshot(function(snap){
        siswaList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.innerText.includes('Data Siswa')) renderSiswa();
    });

    // 4. Ambil Jawaban Masuk
    db.collection('jawaban_siswa').orderBy('waktuKirim', 'desc')
    .onSnapshot(function(snap){
        jawabanList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.innerText.includes('Koreksi')) renderKoreksi();
    });

    // 5. Cek Token Aktif (Ambil semua token, kita filter di dashboard)
    db.collection('token_ujian').onSnapshot(snap=>{
        tokenData = {};
        snap.forEach(doc=>{
            tokenData[doc.id] = doc.data();
        });
        if(document.querySelector('.nav-item.active')?.innerText.includes('Dashboard')) renderDashboard();
        if(document.querySelector('.nav-item.active')?.innerText.includes('Atur Ujian')) renderUjian();
    });
}

// Refresh view jika data berubah
function refreshCurrentView(){
    var activeText = document.querySelector('.nav-item.active')?.innerText;
    if(!activeText) return;
    if(activeText.includes('Bank Soal')) renderSoalView();
    else if(activeText.includes('Kisi-Kisi')) renderKisi();
    else if(activeText.includes('Kunci')) renderKunci();
    else if(activeText.includes('Cetak Soal')) renderPrint();
}

// --- NAVIGASI ---
function nav(page){
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    var c = document.getElementById('contentArea');
    
    if(page==='dashboard') renderDashboard(c);
    else if(page==='siswa') renderSiswa(c);
    else if(page==='soal-view') renderSoalView(c);
    else if(page==='kisi') renderKisi(c);
    else if(page==='kunci') renderKunci(c);
    else if(page==='print') renderPrint(c);
    else if(page==='ujian') renderUjian(c);
    else if(page==='koreksi') renderKoreksi(c);
}

// --- CORE LOGIC FILTER SOAL (UPDATED) ---
function getFilteredQuestions(mapelFilter, typeFilter) {
    var availableMapels = getTeacherMapels();
    var combinedList = soalList.concat(pajSoalList);
    var result = combinedList;

    // 1. Filter MAPEL (Berdasarkan Jenis Guru)
    // Jika Guru Kelas: Otomatis buang PAI & PJOK
    // Jika Guru PAI/PJOK: Otomatis ambil HANYA mapel mereka
    result = result.filter(s => availableMapels.find(m => m.id === s.mapel));

    // 2. Filter Mapel Tambahan (Jika user pilih mapel spesifik di dropdown)
    if (mapelFilter) {
        result = result.filter(s => s.mapel === mapelFilter);
    }

    // 3. Filter KELAS & ROMBEL (LOGIKA BARU)
    if (currentUser.jenis === 'kelas') {
        // Guru Kelas: Hanya lihat kelas ampuannya (Misal Kelas 4)
        result = result.filter(s => s.kelas === currentUser.kelas);
    } else {
        // Guru PAI/PJOK: Lihat sesuai Kelas & Rombel yang diinput saat register
        // Data soal diasumsikan ada field 'kelas' (misal "Kelas 4") dan field 'rombel' (misal "A")
        result = result.filter(s => s.kelas === currentUser.kelas && s.rombel === currentUser.rombel);
    }

    // 4. Filter Tipe Soal
    if (typeFilter) {
        result = result.filter(s => s.type === typeFilter);
    }

    return result;
}

        uraian.forEach(function(q, i){
            html += '<div class="soal-item clearfix">';
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+q.text+'</div>';
            if(q.image) html += '<div style="margin-left:35px"><img src="'+q.image+'" class="soal-img-print"></div>';
            html += '<div class="answer-lines"></div></div>';
        });
    }

    html += '<div class="ttd-section"></div>';
    html += '</div></div></div>';
    container.innerHTML = html;
}

// --- FUNGSI CETAK ---
function doPrintSoal(){
    var sheet = document.querySelector('.print-preview-sheet');
    if(!sheet) return alert("Preview kosong");
    
    var iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='0'; iframe.style.width='210mm'; iframe.style.height='297mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head>');
    doc.write('<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght+700&display=swap" rel="stylesheet">');
    doc.write('<style>');
    doc.write('@page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }');
    doc.write('body { margin: 0; padding: 0; font-family: "Times New Roman", Times, serif; font-size: 12pt; line-height: 1.4; color: black; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }');
    doc.write('.print-page { padding: 0; }');
    doc.write('.kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }');
    doc.write('.kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }');
    doc.write('.kop-surat img { height: 75px; width: auto; object-fit: contain; }');
    doc.write('.kop-text { text-align: center; line-height: 1.3; flex: 1; }');
    doc.write('.kop-text h1 { font-family: "Times New Roman", serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }');
    doc.write('.kop-text h2 { font-family: "Times New Roman", serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }');
    doc.write('.kop-text .kop-sub { font-family: "Times New Roman", serif; font-size: 10pt; margin-top: 2px; font-style: normal; }');
    doc.write('.ujian-title { text-align: center; margin-bottom: 20px; }');
    doc.write('.ujian-title h3 { font-family: "Times New Roman", serif; font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }');
    doc.write('.ujian-title p { font-family: "Times New Roman", serif; font-size: 12pt; margin: 4px 0 0 0; font-weight: bold; }');
    doc.write('.soal-header { margin-bottom: 20px; }');
    doc.write('.soal-header table { width: 100%; font-family: "Times New Roman", serif; font-size: 12pt; }');
    doc.write('.soal-header td { padding: 2px 0; vertical-align: bottom; }');
    doc.write('.soal-header td.dot-cell { border-bottom: 1px dotted #000; min-width: 200px; }');
    doc.write('.section-heading { font-family: "Times New Roman", serif; font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }');
    doc.write('.petunjuk-soal { font-size: 11pt; margin-bottom: 12px; font-style: italic; text-align: left; }');
    doc.write('.soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }');
    doc.write('.soal-num { float: left; font-weight: bold; font-family: "Times New Roman", serif; font-size: 12pt; width: 35px; flex-shrink: 0; }');
    doc.write('.soal-text { font-family: "Times New Roman", serif; font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; }');
    doc.write('.soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ccc; background-color: #eee; }');
    doc.write('.opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }');
    doc.write('.opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: "Times New Roman", serif; font-size: 12pt; line-height: 1.4; text-align: left; }');
    doc.write('.opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }');
    doc.write('.opsi-label::after { content: "."; }');
    doc.write('.opsi-img-print { max-width: 60px; max-height: 50px; display: inline-block; vertical-align: middle; margin-left: 8px; object-fit: contain; }');
    doc.write('.answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }');
    doc.write('.clearfix::after { content: ""; display: table; clear: both; }');
    doc.write('.ttd-section { display: none; }'); 

    doc.write('</style></head><body>');
    doc.write(sheet.innerHTML);
    doc.write('</body></html>');
    doc.close();

    setTimeout(function(){
        var imgs = doc.querySelectorAll('img');
        var loaded = 0, total = imgs.length;
        if(total === 0){ iframe.contentWindow.focus(); iframe.contentWindow.print(); setTimeout(function(){ document.body.removeChild(iframe); }, 3000); return; }
        imgs.forEach(function(img){
            if(img.complete){ loaded++; checkAll(); } else { img.onload = function(){ loaded++; checkAll(); }; img.onerror = function(){ loaded++; checkAll(); }; }
        });
        function checkAll(){
            if(loaded >= total){
                setTimeout(function(){ iframe.contentWindow.focus(); iframe.contentWindow.print(); setTimeout(function(){ document.body.removeChild(iframe); }, 3000); }, 500);
            }
        }
        setTimeout(function(){ try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e){} setTimeout(function(){ try{ document.body.removeChild(iframe); }catch(e){} }, 3000); }, 5000);
    }, 300);
}

// --- ATUR UJIAN & TOKEN (PER MAPEL) ---
function renderUjian(c){
    if(!c) c = document.getElementById('contentArea');
    var availableMapels = getTeacherMapels();

    c.innerHTML = '<div class="card fade-in">'+
        '<h3 class="font-bold text-lg mb-4">Atur Ujian</h3>'+
        '<div class="mb-4">'+
            '<label class="text-xs text-muted font-bold mb-1 block">Pilih Mapel untuk Diatur</label>'+
            '<select id="ujianMapelSelect" class="input-field" onchange="renderTokenControls()">'+
                availableMapels.map(m=>'<option value="'+m.id+'">'+m.nama+'</option>').join('')+
            '</select>'+
        '</div>'+
        '<div id="tokenControlsArea"></div>'+
    '</div>';
    renderTokenControls();
}

function renderTokenControls(){
    var mapel = document.getElementById('ujianMapelSelect').value;
    var container = document.getElementById('tokenControlsArea');
    
    // Ambil data token spesifik mapel ini
    var myToken = (tokenData && tokenData[mapel]) ? tokenData[mapel] : { token: '', durasi: 60 };

    container.innerHTML = 
        '<div class="grid grid-cols-1 md:grid-cols-2 gap-6">'+
            '<div>'+
                '<label class="text-xs text-muted font-bold mb-1 block">Set Token Ujian</label>'+
                '<input type="text" id="tokenInput" class="input-field mb-2" value="'+myToken.token+'" placeholder="Masukkan Token">'+
                '<button onclick="setToken(\''+mapel+'\')" class="btn-primary w-full">Simpan Token</button>'+
            '</div>'+
            '<div>'+
                '<label class="text-xs text-muted font-bold mb-1 block">Durasi Ujian (Menit)</label>'+
                '<input type="number" id="durasiInput" class="input-field mb-2" value="'+myToken.durasi+'">'+
                '<button onclick="setDurasi(\''+mapel+'\')" class="btn-secondary w-full">Update Durasi</button>'+
            '</div>'+
        '</div>'+
        '<div class="mt-4 p-4 bg-dark/50 rounded border border-border">'+
            '<h4 class="text-sm font-bold text-warning mb-2">STATUS TOKEN '+getMapelName(mapel).toUpperCase()+':</h4>'+
            '<p class="text-sm">Token Aktif: <span class="font-bold text-kopAccent">'+(myToken.token||'TIDAK ADA')+'</span></p>'+
            '<p class="text-sm">Durasi: <span class="font-bold text-info">'+myToken.durasi+' Menit</span></p>'+
        '</div>';
}

function setToken(mapelId){
    var t = document.getElementById('tokenInput').value;
    db.collection('token_ujian').doc(mapelId).set({
        token: t, 
        durasi: parseInt(document.getElementById('durasiInput').value)||60,
        guruId: currentUser.id,
        mapel: mapelId,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, {merge: true}).then(()=>alert("Token Berhasil Disimpan untuk Mapel: " + getMapelName(mapelId)));
}

function setDurasi(mapelId){
    var d = document.getElementById('durasiInput').value;
    db.collection('token_ujian').doc(mapelId).update({durasi: parseInt(d)});
}

// --- KOREKSI JAWABAN ---
function renderKoreksi(c){
    if(!c) c = document.getElementById('contentArea');
    
    // Filter jawaban hanya dari rombel guru
    var myAnswers = jawabanList.filter(j => j.rombel === currentUser.rombel);
    // Dan filter mapel yang diampu guru
    var myMapels = getTeacherMapels().map(m=>m.id);
    myAnswers = myAnswers.filter(j => myMapels.includes(j.mapel));

    c.innerHTML = '<div class="card fade-in">'+
        '<h3 class="font-bold text-lg mb-4">Koreksi Jawaban Siswa</h3>'+
        '<p class="text-xs text-muted mb-4">Jawaban dari rombel '+currentUser.rombel+'</p>'+
        '<div class="space-y-4" id="koreksiList"></div></div>';

    var list = document.getElementById('koreksiList');
    if(myAnswers.length===0){
        list.innerHTML = '<p class="text-center text-muted">Belum ada jawaban masuk.</p>';
    } else {
        list.innerHTML = myAnswers.map(j=`
            <div class="p-4 bg-dark/30 border border-border rounded-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="font-bold text-kopAccent">${j.namaSiswa}</span>
                        <span class="text-xs text-muted ml-2">(${j.kelasSiswa})</span>
                    </div>
                    <span class="text-xs bg-info/20 text-info px-2 py-1 rounded">${j.waktuKirim?j.waktuKirim.toDate().toLocaleString():''}</span>
                </div>
                
                <!-- Tampilkan Mapel yang sedang dikoreksi -->
                <div class="text-xs font-bold text-muted mb-3 uppercase bg-white/5 inline-block px-2 py-1 rounded">Mapel: ${getMapelName(j.mapel)}</div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <h5 class="text-xs font-bold text-muted uppercase">PG (Auto Score)</h5>
                        <p class="text-sm font-bold text-success">Benar: ${j.pgScore || 0}</p>
                    </div>
                    <div>
                        <h5 class="text-xs font-bold text-muted uppercase">Uraian (Manual)</h5>
                        <textarea id="essayNote-${j.id}" class="input-field text-xs mt-1" rows="2" placeholder="Catatan koreksi...">${j.essayNote||''}</textarea>
                        <div class="mt-2 flex gap-2">
                            <button onclick="saveKoreksi('${j.id}')" class="btn-primary text-xs py-1 px-2">Simpan Nilai</button>
                            <button onclick="viewJawaban('${j.id}')" class="btn-secondary text-xs py-1 px-2">Lihat Detail</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }
}

function saveKoreksi(id){
    var note = document.getElementById('essayNote-'+id).value;
    db.collection('jawaban_siswa').doc(id).update({
        essayNote: note,
        status: 'Dikoreksi',
        dikoreksiOleh: currentUser.nama
    }).then(()=>alert("Data koreksi disimpan."));
}

function viewJawaban(id){
    var j = jawabanList.find(x=>x.id===id);
    if(!j) return;
    var detailHtml = '<h3 class="font-bold mb-2">Jawaban Detail</h3>';
    if(j.jawabanPG) detailHtml += '<p class="text-xs">PG: '+JSON.stringify(j.jawabanPG)+'</p>';
    if(j.jawabanEssay) detailHtml += '<p class="text-xs">Essay: '+JSON.stringify(j.jawabanEssay)+'</p>';
    openModal(detailHtml);
}

// --- MODAL SYSTEM ---
function openModal(html){
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('modalContent').innerHTML = html;
}
function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
}

function doPrintGeneric(containerId){
    var sheet = document.querySelector('#'+containerId+' .print-preview-sheet');
    if(!sheet) return;
    var printContent = sheet.innerHTML;
    
    var iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='0'; iframe.style.width='210mm'; iframe.style.height='297mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><style>@page{size:A4 portrait;margin:1cm}body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}</style></head><body>');
    doc.write(printContent);
    doc.write('</body></html>');
    doc.close();
    setTimeout(function(){
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(function(){document.body.removeChild(iframe);},3000);
    },500);
}
</script>
