<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Guru - Terintegrasi Dinamis</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{kop:'#1a2744',kopAccent:'#c9a84c',dark:'#0f1923',card:'#182538',border:'#2a3f5f',muted:'#7a8ba5',light:'#e8ecf1',success:'#22c55e',danger:'#ef4444',warning:'#f59e0b',info:'#06b6d4'},fontFamily:{display:['Playfair Display','serif'],body:['Source Sans 3','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.glass{background:rgba(24,37,56,0.9);backdrop-filter:blur(12px);border:1px solid rgba(42,63,95,0.5)}
.sidebar{width:260px;min-height:100vh;background:#1a2744;border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:12px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:20px}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:rgba(239,68,68,0.15);border:1px solid #ef4444;color:#ef4444;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.btn-danger:hover{background:#ef4444;color:white}

/* Print Styles (Sama Admin) */
@media print {
    @page { size: A4 portrait; margin: 1cm; }
    body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
    .no-print { display: none !important; }
    .print-area { width: 100%; background: white; color: black; font-family: 'Times New Roman', serif; font-size: 12pt; }
    .kop-surat { text-align: center; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; }
    .kop-text { text-align: center; }
    .kop-text h2 { font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .print-table th, .print-table td { border: 1px solid #000; padding: 8px; text-align: left; }
    .print-table th { background-color: #eee !important; font-weight: bold; }
    .soal-item { margin-bottom: 20px; page-break-inside: avoid; }
    .soal-num { font-weight: bold; margin-right: 8px; }
    .opsi-row { margin-left: 30px; margin-bottom: 4px; }
}
</style>
</head>
<body>

<!-- LOGIN / REGISTER GURU -->
<div id="loginPage" class="login-bg">
    <div class="glass rounded-2xl p-8 w-full max-w-lg fade-in">
        <div class="text-center mb-6">
            <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">GURU PANEL</h1>
            <p class="text-muted text-sm">Terintegrasi Database Pusat (Read-Only)</p>
        </div>

        <!-- FORM DAFTAR GURU BARU -->
        <div id="registerForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">NPSN Sekolah</label>
                    <input type="number" id="regNpsn" class="input-field" placeholder="202xxxx">
                </div>
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">NIP Guru</label>
                    <input type="number" id="regNip" class="input-field" placeholder="NIP Anda">
                </div>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Nama Lengkap</label>
                <input type="text" id="regNama" class="input-field" placeholder="Nama Lengkap + Gelar">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-muted font-semibold uppercase">Jenis Guru</label>
                    <select id="regJenis" class="input-field" onchange="handleJenisChange()">
                        <option value="kelas">Guru Kelas (1-6)</option>
                        <option value="pai">Guru PAI</option>
                        <option value="pjok">Guru PJOK</option>
                    </select>
                </div>
                
                <!-- KHUSUS GURU KELAS: INPUT MAPEL AMPUAN -->
                <div id="wrapperMapelKelas">
                    <label class="text-xs text-muted font-semibold uppercase">Mapel Ampuan</label>
                    <select id="regMapel" class="input-field">
                        <option value="ppkn">Pendidikan Pancasila</option>
                        <option value="mat">Matematika</option>
                        <option value="bin">Bahasa Indonesia</option>
                        <option value="ipas">IPAS</option>
                        <option value="sbd">Seni Budaya</option>
                        <option value="bsd">Bahasa Sunda</option>
                        <option value="bing">Bahasa Inggris</option>
                    </select>
                </div>

                <!-- KHUSUS GURU KELAS: KELAS -->
                <div id="wrapperKelas">
                    <label class="text-xs text-muted font-semibold uppercase">Kelas Wali</label>
                    <select id="regKelas" class="input-field">
                        <option value="Kelas 1">Kelas 1</option>
                        <option value="Kelas 2">Kelas 2</option>
                        <option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option>
                        <option value="Kelas 5">Kelas 5</option>
                        <option value="Kelas 6">Kelas 6</option>
                    </select>
                </div>

                <!-- KHUSUS GURU KELAS -->
                <div id="wrapperRombelKelas">
                    <label class="text-xs text-muted font-semibold uppercase">Rombel</label>
                    <select id="regRombel" class="input-field">
                        <option value="A">Rombel A</option>
                        <option value="B">Rombel B</option>
                        <option value="C">Rombel C</option>
                    </select>
                </div>

                <!-- KHUSUS GURU PAI/PJOK: HANYA ROMBEL -->
                <div id="wrapperRombelPaiPjok" class="hidden">
                    <label class="text-xs text-muted font-semibold uppercase">Rombel Binaan</label>
                    <select id="regRombel2" class="input-field">
                        <option value="A">Rombel A</option>
                        <option value="B">Rombel B</option>
                        <option value="C">Rombel C</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password Baru</label>
                <input type="password" id="regPass" class="input-field" placeholder="Buat password">
            </div>
            <button onclick="doRegister()" class="btn-primary w-full mt-2">Daftar Guru</button>
            <p class="text-center text-xs text-muted mt-2">Sudah punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Login disini</a></p>
        </div>

        <!-- FORM LOGIN GURU -->
        <div id="loginForm" class="space-y-4 hidden">
            <div>
                <label class="text-xs text-muted font-semibold uppercase">NIP / NPSN</label>
                <input type="text" id="logUser" class="input-field" placeholder="Masukkan NIP atau NPSN">
            </div>
            <div>
                <label class="text-xs text-muted font-semibold uppercase">Password</label>
                <input type="password" id="logPass" class="input-field" placeholder="Password">
            </div>
            <button onclick="doLogin()" class="btn-primary w-full mt-2">Masuk Panel</button>
            <button onclick="doResetPassword()" class="btn-secondary w-full text-xs text-danger mt-2">Lupa Password?</button>
            <p class="text-center text-xs text-muted mt-2">Belum punya akun? <a href="#" onclick="toggleLoginMode()" class="text-kopAccent hover:underline">Daftar Guru Baru</a></p>
        </div>
    </div>
</div>

<!-- MAIN APP GURU -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-6 border-b border-border">
        <h2 class="font-display text-xl font-bold text-kopAccent">PANEL GURU</h2>
        <p id="userGreeting" class="text-xs text-muted mt-1">Selamat Datang</p>
    </div>
    <nav class="py-4">
        <div class="nav-item active" onclick="nav('dashboard')"><i class="fas fa-home w-5"></i>Dashboard</div>
        <div class="nav-item" onclick="nav('siswa')"><i class="fas fa-users w-5"></i>Data Siswa</div>
        <div class="nav-item" onclick="nav('soal-view')"><i class="fas fa-file-alt w-5"></i>Bank Soal</div>
        <div class="nav-item" onclick="nav('kisi')"><i class="fas fa-table w-5"></i>Kisi-Kisi</div>
        <div class="nav-item" onclick="nav('kunci')"><i class="fas fa-key w-5"></i>Kunci Jawaban</div>
        <div class="nav-item" onclick="nav('print')"><i class="fas fa-print w-5"></i>Cetak Soal</div>
        <div class="nav-item" onclick="nav('ujian')"><i class="fas fa-clock w-5"></i>Atur Ujian & Token</div>
        <div class="nav-item" onclick="nav('koreksi')"><i class="fas fa-check-double w-5"></i>Koreksi Jawaban</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="logout()" class="btn-danger w-full"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen bg-dark p-6">
    <div id="contentArea"></div>
</div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="fixed inset-0 bg-black/70 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
        <div id="modalContent"></div>
    </div>
</div>

<script>
// --- KONFIGURASI FIREBASE (SAMA PERSIS DENGAN KODE ADMIN) ---
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
var db = firebase.firestore();

// --- DATA MASTER ---
var MAPEL = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},
    {id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},
    {id:'ipas',nama:'IPAS'},
    {id:'sbd',nama:'Seni Budaya'},
    {id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},
    {id:'pai',nama:'PAI'},
    {id:'pjok',nama:'PJOK'}
];
var KELAS = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

// --- STATE ---
var currentUser = null;
var soalList = []; 
var pajSoalList = [];
var siswaList = []; 
var jawabanList = []; 
var tokenData = null;

// --- FUNGSI UTILITAS ---
function getMapelName(id){ 
    var m=MAPEL.find(function(x){return x.id===id;}); 
    return m?m.nama:id; 
}

function toggleLoginMode(){
    document.getElementById('registerForm').classList.toggle('hidden');
    document.getElementById('loginForm').classList.toggle('hidden');
}

function handleJenisChange(){
    var jenis = document.getElementById('regJenis').value;
    var wrapM = document.getElementById('wrapperMapelKelas');
    var wrapK = document.getElementById('wrapperKelas');
    var wrapRK = document.getElementById('wrapperRombelKelas');
    var wrapRP = document.getElementById('wrapperRombelPaiPjok');

    if(jenis === 'kelas'){
        // Guru Kelas: Mapel + Kelas + Rombel
        wrapM.classList.remove('hidden');
        wrapK.classList.remove('hidden');
        wrapRK.classList.remove('hidden');
        wrapRP.classList.add('hidden');
    } else {
        // Guru PAI/PJOK: Hanya Rombel (Kelas & Mapel Otomatis 'All' saat runtime)
        wrapM.classList.add('hidden');
        wrapK.classList.add('hidden');
        wrapRK.classList.add('hidden');
        wrapRP.classList.remove('hidden');
    }
}

// --- AUTH GURU ---
function doRegister(){
    var npsn = document.getElementById('regNpsn').value;
    var nip = document.getElementById('regNip').value;
    var nama = document.getElementById('regNama').value;
    var jenis = document.getElementById('regJenis').value;
    
    var kelas = 'Semua';
    var mapel = 'Semua';
    var rombel = 'A';

    if(jenis === 'kelas'){
        mapel = document.getElementById('regMapel').value;
        kelas = document.getElementById('regKelas').value;
        rombel = document.getElementById('regRombel').value;
    } else {
        // PAI / PJOK
        rombel = document.getElementById('regRombel2').value;
    }

    var pass = document.getElementById('regPass').value;

    if(!npsn || !nip || !nama || !pass) return alert("Mohon lengkapi data!");

    db.collection('users_guru').add({
        npsn: npsn, nip: nip, nama: nama, jenis: jenis, kelas: kelas, mapel: mapel, rombel: rombel, password: pass, role: 'guru', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{
        alert("Registrasi Berhasil!");
        doLoginDirect(nip, pass);
    }).catch(e=>alert("Error: "+e.message));
}

function doLogin(){
    var user = document.getElementById('logUser').value;
    var pass = document.getElementById('logPass').value;
    doLoginDirect(user, pass);
}

function doLoginDirect(user, pass){
    db.collection('users_guru').where('nip', '==', user).where('password','==',pass).get()
    .then(snap=>{
        if(snap.empty) return alert("Login Gagal! Cek NIP/NPSN dan Password.");
        var doc = snap.docs[0];
        currentUser = doc.data();
        currentUser.id = doc.id;
        
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('mainPage').classList.remove('hidden');
        document.getElementById('userGreeting').innerText = currentUser.nama;
        
        initListeners();
        nav('dashboard');
    });
}

function doResetPassword(){
    var nip = prompt("Masukkan NIP untuk reset password:");
    if(!nip) return;
    if(confirm("Set password default menjadi '123456' untuk NIP: " + nip + "?")){
        db.collection('users_guru').where('nip', '==', nip).get().then(snap=>{
            if(!snap.empty){
                snap.docs[0].ref.update({password: '123456'}).then(()=>alert("Password berhasil direset menjadi 123456"));
            } else {
                alert("NIP tidak ditemukan.");
            }
        });
    }
}

function logout(){
    location.reload();
}

// --- INISIALISASI DATA ---
function initListeners(){
    // 1. Ambil Soal Regular
    db.collection('questions').orderBy('createdAt','asc')
    .onSnapshot(function(snap){
        soalList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    // 2. Ambil Soal PAJ (Kelas 6)
    db.collection('questions_paj').orderBy('createdAt','asc')
    .onSnapshot(function(snap){
        pajSoalList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    // 3. Ambil Data Siswa (Filter Rombel)
    db.collection('data_siswa').where('rombel', '==', currentUser.rombel)
    .onSnapshot(function(snap){
        siswaList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.innerText.includes('Data Siswa')) renderSiswa();
    });

    // 4. Ambil Jawaban Masuk
    db.collection('jawaban_siswa').orderBy('waktuKirim', 'desc')
    .onSnapshot(function(snap){
        jawabanList = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        if(document.querySelector('.nav-item.active')?.innerText.includes('Koreksi')) renderKoreksi();
    });

    // 5. Cek Token Aktif
    db.collection('token_ujian').doc('active_token').onSnapshot(doc=>{
        tokenData = doc.exists ? doc.data() : null;
        if(document.querySelector('.nav-item.active')?.innerText.includes('Dashboard')) renderDashboard();
    });
}

function refreshCurrentView(){
    var activeText = document.querySelector('.nav-item.active')?.innerText;
    if(activeText && (activeText.includes('Bank') || activeText.includes('Kisi') || activeText.includes('Kunci') || activeText.includes('Cetak')) refreshCurrentViewContent();
}

function refreshCurrentViewContent(){
    if(document.getElementById('filterMapelSoal')) refreshSoalList(); // Refresh list
    // Logic refresh preview di handle render masing-masing
}

// --- NAVIGASI ---
function nav(page){
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    var c = document.getElementById('contentArea');
    
    if(page==='dashboard') renderDashboard(c);
    else if(page==='siswa') renderSiswa(c);
    else if(page==='soal-view') renderSoalView(c);
    else if(page==='kisi') renderKisi(c);
    else if(page==='kunci') renderKunci(c);
    else if(page==='print') renderPrint(c);
    else if(page==='ujian') renderUjian(c);
    else if(page==='koreksi') renderKoreksi(c);
}

// --- DASHBOARD ---
function renderDashboard(c){
    c.innerHTML = '<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 fade-in">'+
        '<div class="card text-center"><div class="text-3xl font-bold text-kopAccent">'+(soalList.length + pajSoalList.length)+'</div><div class="text-xs text-muted">Total Soal (DB)</div></div>'+
        '<div class="card text-center"><div class="text-3xl font-bold text-info">'+siswaList.length+'</div><div class="text-xs text-muted">Total Siswa</div></div>'+
        '<div class="card text-center"><div class="text-3xl font-bold text-success">'+jawabanList.filter(j=>j.status==='selesai').length+'</div><div class="text-xs text-muted">Siswa Selesai</div></div>'+
        '<div class="card text-center"><div class="text-3xl font-bold text-warning">'+(tokenData?'Aktif':'Nonaktif')+'</div><div class="text-xs text-muted">Status Token</div></div>'+
    '</div>';
}

// --- DATA SISWA ---
function renderSiswa(c){
    if(!c) c = document.getElementById('contentArea');
    c.innerHTML = '<div class="card fade-in">'+
        '<h3 class="font-bold text-lg mb-4 border-b border-border pb-2">Data Siswa (Rombel '+currentUser.rombel+')</h3>'+
        '<div class="flex gap-2 mb-4">'+
            '<button onclick="openAddSiswa()" class="btn-primary"><i class="fas fa-user-plus mr-1"></i>Input Siswa</button>'+
            '<button onclick="printKartu()" class="btn-secondary"><i class="fas fa-id-card mr-1"></i>Cetak Kartu Ujian</button>'+
        '</div>'+
        '<div class="overflow-x-auto"><table class="w-full text-sm text-left">'+
            '<thead class="text-xs text-muted uppercase bg-dark/50"><tr><th class="px-4 py-2">NISN</th><th class="px-4 py-2">Nama</th><th class="px-4 py-2">Kelas</th><th class="px-4 py-2">Rombel</th><th class="px-4 py-2">Aksi</th></tr></thead>'+
            '<tbody id="siswaTableBody"></tbody></table></div></div>';
    
    var tb = document.getElementById('siswaTableBody');
    if(siswaList.length===0){
        tb.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-muted">Belum ada data siswa</td></tr>';
    } else {
        tb.innerHTML = siswaList.map(s=>
            '<tr class="border-b border-border hover:bg-white/5"><td class="px-4 py-3">'+s.nisn+'</td><td class="ppx-4 py-3">'+s.nama+'</td><td class="px-4 py-3">'+s.kelas+'</td><td class="px-4 py-3">'+s.rombel+'</td><td class="px-4 py-3"><button onclick="deleteSiswa(\''+s.id+'\')" class="text-danger hover:text-white"><i class="fas fa-trash"></i></button></td></tr>'
        ).join('');
    }
}

function openAddSiswa(){
    var html = '<h3 class="font-bold mb-4">Tambah Siswa</h3>'+
        '<input id="inNisn" class="input-field mb-2" placeholder="NISN">'+
        '<input id="inNama" class="input-field mb-2" placeholder="Nama Lengkap">'+
        '<select id="inKelas" class="input-field mb-2">'+
            KELAS.map(k=>'<option value="'+k+'">'+k+'</option>').join('')+
        '</select>'+
        '<input id="inRombel" class="input-field mb-2" value="'+currentUser.rombel+'" readonly>'+
        '<button onclick="saveSiswa()" class="btn-primary w-full">Simpan</button>';
    openModal(html);
}

function saveSiswa(){
    var nisn = document.getElementById('inNisn').value;
    var nama = document.getElementById('inNama').value;
    var kelas = document.getElementById('inKelas').value;
    if(!nisn || !nama) return alert("Data tidak lengkap");

    db.collection('data_siswa').add({
        nisn:nisn, nama:nama, kelas:kelas, rombel:currentUser.rombel, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{closeModal(); renderSiswa();});
}

function deleteSiswa(id){

function setToken(){
    var t = document.getElementById('tokenInput').value;
    var d = parseInt(document.getElementById('durasiInput').value);
    
    // Tentukan Kelas Otomatis
    var kelasAuto = '';
    if(currentUser.jenis === 'kelas'){
        kelasAuto = currentUser.kelas;
    } else {
        // Untuk PAI/PJOK, ambil dari dropdown terakhir di bank soal, atau default ke Kelas 1 jika belum pernah dipilih
        // Sederhananya: untuk kode ini, user PAI/PJOK WAJIB memilih kelas di form ini. 
        // Mari kita ambil nilai dropdown select di sini.
        var kelasSelect = document.createElement("select");
        kelasSelect.id = "ujianHiddenKelas";
        // Hanya muncul jika PAI/PJOK
        if(currentUser.jenis !== 'kelas'){
            kelasSelect.innerHTML = KELAS.map(k=>'<option value="'+k+'">'+k+'</option>').join('');
            kelasSelect.style.css="margin-bottom:10px; width:100%; padding:8px; border-radius:6px; background: #f0fdf4; color: #b91c1c; border: 1px solid #d1d5db;";
            // Tambahkan temporary ke form
            var btn = document.getElementById("setToken").parentNode;
            btn.parentNode.insertBefore(kelasSelect, btn);
        }

    if(!t || !d) return alert("Lengkapi Data Token");

    // Ambil kelas
    var k = kelasAuto;
    if(!k && currentUser.jenis !== 'kelas' && document.getElementById('ujianHiddenKelas')){
        k = document.getElementById('ujianHiddenKelas').value;
    }

    if(!k) return alert("Mohon pilih kelas ujian untuk Guru PAI/PJOK");

    db.collection('token_ujian').set({
        token: t.toUpperCase(),
        durasi: d,
        mapel: mapelAuto,
        kelas: k,
        guruId: currentUser.id,
        rombel: currentUser.rombel,
        updatedAt: firebase.firestore.FieldMembers.serverTimestamp()
    }, {merge: true}).then(()=>{
        alert("Token Berhasil Disimpan & Diaktifkan!");
        // Hapus select temporary jika ada
        var el = document.getElementById('ujianHiddenKelas');
        if(el) el.remove();
    }).catch(e=>alert("Gagal: "+e.message));
}
function setDurasi(){
    var d = document.getElementById('durasiInput').value;
    db.collection('token_ujian').doc('active_token').update({durasi: parseInt(d)});
}

// --- KOREKSI JAWABAN ---
function renderKoreksi(c){
    if(!c) c = document.getElementById('contentArea');
    
    var myAnswers = jawabanList.filter(j => j.rombel === currentUser.rombel);

    c.innerHTML = '<div class="card fade-in">'+
        '<h3 class="font-bold text-lg mb-4">Koreksi Jawaban Siswa</h3>'+
        '<p class="text-xs text-muted mb-4">Jawaban dari rombel '+currentUser.rombel+'</p>'+
        '<div class="space-y-4" id="koreksiList"></div></div>';

    var list = document.getElementById('koreksiList');
    if(myAnswers.length===0){
        list.innerHTML = '<p class="text-center text-muted">Belum ada jawaban masuk.</p>';
    } else {
        list.innerHTML = myAnswers.map(j=`
            <div class="p-4 bg-dark/30 border border-border rounded-lg">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="font-bold text-kopAccent">${j.namaSiswa}</span>
                        <span class="text-xs text-muted ml-2">(${j.kelasSiswa})</span>
                    </div>
                    <span class="text-xs bg-info/20 text-info px-2 py-1 rounded">${getMapelName(j.mapel)}</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                    <div>
                        <h5 class="text-xs font-bold text-muted uppercase">PG (Auto Score)</h5>
                        <p class="text-sm font-bold text-success">Benar: ${j.pgScore || 0}</p>
                    </div>
                    <div>
                        <h5 class="text-xs font-bold text-muted uppercase">Uraian (Manual)</h5>
                        <textarea id="essayNote-${j.id}" class="input-field text-xs mt-1" rows="2" placeholder="Catatan koreksi...">${j.essayNote||''}</textarea>
                        <div class="mt-2 flex gap-2">
                            <button onclick="saveKoreksi('${j.id}')" class="btn-primary text-xs py-1 px-2">Simpan Nilai</button>
                            <button onclick="viewJawaban('${j.id}')" class="btn-secondary text-xs py-1 px-2">Lihat Detail</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }
}

function saveKoreksi(id){
    var note = document.getElementById('essayNote-'+id).value;
    db.collection('jawaban_siswa').doc(id).update({
        essayNote: note,
        status: 'Dikoreksi',
        dikoreksiOleh: currentUser.nama
    }).then(()=>alert("Data koreksi disimpan."));
}

function viewJawaban(id){
    var j = jawabanList.find(x=>x.id===id);
    if(!j) return;
    var detailHtml = '<h3 class="font-bold mb-2">Jawaban Detail</h3>';
    if(j.jawabanPG) detailHtml += '<p class="text-xs">PG: '+JSON.stringify(j.jawabanPG)+'</p>';
    if(j.jawabanEssay) detailHtml += '<p class="text-xs">Essay: '+JSON.stringify(j.jawabanEssay)+'</p>';
    openModal(detailHtml);
}

// --- MODAL SYSTEM ---
function openModal(html){
    document.getElementById('modalOverlay').classList.remove('hidden');
    document.getElementById('modalContent').innerHTML = html;
}
function closeModal(){
    document.getElementById('modalOverlay').classList.add('hidden');
}

// --- CETAK UMUM ---
function doPrintGeneric(containerId){
    var sheet = document.querySelector('#'+containerId+' .print-preview-sheet');
    if(!sheet) return;
    var printContent = sheet.innerHTML;
    
    var iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='0'; iframe.style.width='210mm'; iframe.style.height='297mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><style>@page{size:A4 portrait;margin:1cm}body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}</style></head><body>');
    doc.write(printContent);
    doc.write('</body></html>');
    doc.close();
    setTimeout(function(){
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(function(){document.body.removeChild(iframe);},3000);
    },500);
}
</script>
</body>
</html>
