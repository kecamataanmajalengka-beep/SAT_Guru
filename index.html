<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Guru - Sistem Ujian Sekolah</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
tailwind.config={
    theme:{
        extend:{
            fontFamily:{
                display:['Playfair Display','serif'],
                sans:['Inter','sans-serif']
            },
            colors:{
                brand: {
                    50:'#f0fdfa',
                    100:'#ccfbf1',
                    200:'#99f6e4',
                    300:'#5eead4',
                    400:'#2dd4bf',
                    500:'#14b8a6',
                    600:'#0d9488',
                    700:'#0f766e',
                    800:'#115e59',
                    900:'#134e4a',
                },
                dark: '#0f172a',
                card: '#1e293b',
                border: '#334155'
            }
        }
    }
}
</script>

<style>
body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1e293b; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

/* LOGIN / REGISTER WRAPPER */
.login-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: radial-gradient(circle at top right, #0f766e 0%, transparent 40%),
                radial-gradient(circle at bottom left, #1e3a8a 0%, transparent 40%),
                #0f172a;
    padding: 20px;
}
.auth-card {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 440px; /* Lebar Proporsional & Profesional */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    transition: height 0.3s ease;
}
.input-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #94a3b8;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.form-input, .form-select {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    color: white;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: all 0.2s;
}
.form-input:focus, .form-select:focus {
    outline: none;
    border-color: #2dd4bf;
    box-shadow: 0 0 0 2px rgba(45, 212, 191, 0.2);
}
.form-input:disabled {
    background: #1e293b;
    color: #64748b;
    cursor: not-allowed;
}
.btn-auth {
    width: 100%;
    background: linear-gradient(135deg, #0d9488, #0f766e);
    color: white;
    font-weight: 600;
    padding: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
}
.btn-auth:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4);
}
.tab-btn {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    color: #94a3b8;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
}
.tab-btn.active {
    color: #2dd4bf;
    border-bottom-color: #2dd4bf;
}

/* MAIN LAYOUT */
.sidebar { width: 260px; min-height: 100vh; background: #1e293b; border-right: 1px solid #334155; position: fixed; left: 0; top: 0; z-index: 40; transition: transform 0.3s ease; }
.main-content { margin-left: 260px; min-height: 100vh; background: #0f172a; }
.nav-item { padding: 12px 24px; cursor: pointer; color: #94a3b8; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.2s; border-left: 3px solid transparent; }
.nav-item:hover { background: #334155; color: #f1f5f9; }
.nav-item.active { background: rgba(45, 212, 191, 0.1); color: #2dd4bf; border-left-color: #2dd4bf; }
.nav-header { padding: 16px 24px 8px; font-size: 0.7rem; text-transform: uppercase; color: #64748b; font-weight: 700; letter-spacing: 0.05em; }

/* PAJ STYLING */
.paj-text { color: #f43f5e; }
.nav-item.paj-active { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border-left-color: #f43f5e; }

/* COMPONENTS */
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; }
.stat-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; border-radius: 12px; background: #1e293b; border: 1px solid #334155; }
.stat-value { font-size: 2rem; font-weight: 700; color: white; }
.stat-label { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }

.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px; color: #94a3b8; font-weight: 600; font-size: 0.8rem; border-bottom: 1px solid #334155; }
td { padding: 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; font-size: 0.9rem; }
tr:hover td { background: #334155; }

/* TOAST */
.toast { position: fixed; top: 20px; right: 20px; padding: 16px 24px; border-radius: 8px; color: white; font-weight: 500; z-index: 9999; animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* MOBILE */
@media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.mobile-open { transform: translateX(0); }
    .main-content { margin-left: 0; }
}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- ========================= 
     LOGIN & REGISTER PAGE
     ========================= -->
<div id="loginPage" class="login-wrapper">
    <div class="auth-card">
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-12 h-12 mx-auto mb-3 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white shadow-lg shadow-brand-500/30">
                <i class="fas fa-graduation-cap text-xl"></i>
            </div>
            <h1 class="text-xl font-display font-bold text-white">Panel Guru</h1>
            <p class="text-slate-400 text-xs mt-1">Sistem Ujian Sekolah Terintegrasi</p>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-border mb-6">
            <div onclick="switchAuthTab('login')" id="tabLogin" class="tab-btn active">Masuk</div>
            <div onclick="switchAuthTab('register')" id="tabRegister" class="tab-btn">Daftar Akun</div>
        </div>

        <!-- FORM LOGIN -->
        <div id="formLogin" class="space-y-4">
            <div class="input-group">
                <label>NPSN Sekolah</label>
                <div class="relative">
                    <i class="fas fa-school absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="text" id="loginNpsn" class="form-input pl-9" placeholder="Masukkan NPSN" onkeyup="checkSchoolName()">
                </div>
            </div>
            <div class="input-group">
                <label>Nama Sekolah</label>
                <div class="relative">
                    <i class="fas fa-building absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="text" id="loginSchoolName" class="form-input pl-9 bg-slate-800/50 border-slate-700 text-slate-400 cursor-not-allowed" disabled placeholder="Menunggu NPSN...">
                </div>
            </div>
            <div class="input-group">
                <label>NIP / NIK</label>
                <div class="relative">
                    <i class="fas fa-id-card absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="text" id="loginNip" class="form-input pl-9" placeholder="Nomor Induk Pegawai" onkeydown="if(event.key==='Enter')doLogin()">
                </div>
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="password" id="loginPass" class="form-input pl-9" placeholder="Masukkan Password" onkeydown="if(event.key==='Enter')doLogin()">
                </div>
            </div>

            <button onclick="doLogin()" class="btn-auth mt-2">
                <i class="fas fa-sign-in-alt mr-2"></i> Masuk Panel
            </button>
            
            <div class="text-center mt-4 pt-4 border-t border-slate-700">
                <button onclick="openResetModal()" class="text-xs text-brand-400 hover:text-brand-300 font-medium transition-colors">Lupa Password?</button>
            </div>
        </div>

        <!-- FORM REGISTRASI -->
        <div id="formRegister" class="hidden space-y-3">
            <div class="input-group">
                <label>NPSN Sekolah</label>
                <input type="text" id="regNpsn" class="form-input" placeholder="Contoh: 202xxxxx">
            </div>
            <div class="input-group">
                <label>Nama Sekolah</label>
                <input type="text" id="regSchool" class="form-input" placeholder="Nama Lengkap Sekolah">
            </div>
            <div class="input-group">
                <label>Nama Lengkap Guru</label>
                <input type="text" id="regNama" class="form-input" placeholder="Nama & Gelar">
            </div>
            <div class="input-group">
                <label>NIP / NIK</label>
                <input type="text" id="regNip" class="form-input" placeholder="Nomor Induk">
            </div>
            <div class="input-group">
                <label>Jenis Guru</label>
                <select id="regRole" class="form-select" onchange="toggleRegFields()">
                    <option value="kelas">Guru Kelas (Wali Kelas)</option>
                    <option value="pai">Guru PAI</option>
                    <option value="pjok">Guru PJOK</option>
                </select>
            </div>
            
            <!-- DINAMIS: GURU KELAS -->
            <div id="regKelasWrapper">
                <div class="input-group">
                    <label>Pilih Kelas Ampu</label>
                    <select id="regKelas" class="form-select">
                        <option value="Kelas 1">Kelas 1</option>
                        <option value="Kelas 2">Kelas 2</option>
                        <option value="Kelas 3">Kelas 3</option>
                        <option value="Kelas 4">Kelas 4</option>
                        <option value="Kelas 5">Kelas 5</option>
                        <option value="Kelas 6">Kelas 6</option>
                    </select>
                </div>
            </div>

            <div id="regMapelWrapper">
                <div class="input-group">
                    <label>Mapel Diampu (Kecuali PAI/PJOK)</label>
                    <select id="regMapel" class="form-select">
                        <!-- Diisi via JS -->
                    </select>
                </div>
            </div>

            <!-- WAJIB: ROMBEL -->
            <div class="input-group">
                <label>Pilih Rombel</label>
                <select id="regRombel" class="form-select">
                    <option value="A">Rombel A</option>
                    <option value="B">Rombel B</option>
                    <option value="C">Rombel C</option>
                </select>
            </div>

            <div class="input-group">
                <label>Password Baru</label>
                <input type="password" id="regPass" class="form-input" placeholder="Buat Password">
            </div>
            <button onclick="doRegister()" class="btn-auth mt-2">
                <i class="fas fa-user-plus mr-2"></i> Daftar Akun
            </button>
        </div>
    </div>
</div>

<!-- MODAL RESET PASSWORD -->
<div id="modalReset" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center">
    <div class="bg-card border border-border p-8 rounded-xl w-full max-w-md shadow-2xl">
        <h3 class="text-xl font-display font-bold text-white mb-4 text-center">Reset Password</h3>
        <div class="space-y-4">
            <div class="input-group">
                <label>NIP Terdaftar</label>
                <input type="text" id="resetNip" class="form-input">
            </div>
            <div class="input-group">
                <label>Password Baru</label>
                <input type="password" id="resetPass" class="form-input">
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closeModal()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg hover:bg-slate-600">Batal</button>
                <button onclick="doResetPassword()" class="flex-1 bg-brand-600 text-white py-2 rounded-lg hover:bg-brand-700">Reset</button>
            </div>
        </div>
    </div>
</div>

<!-- ========================= 
     MAIN APP 
     ========================= -->
<div id="mainApp" class="hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar flex flex-col">
        <div class="p-6 border-b border-border">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-brand-500 flex items-center justify-center flex-shrink-0 text-white">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <div>
                    <h2 class="font-display font-bold text-brand-400 text-sm">PANEL GURU</h2>
                    <p id="sidebarInfo" class="text-xs text-slate-400 truncate w-32">Loading...</p>
                </div>
            </div>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4" id="sidebarNav">
            <!-- MENU INJECTED BY JS -->
        </nav>

        <div class="p-4 border-t border-border">
            <button onclick="doLogout()" class="w-full bg-slate-800 text-slate-300 py-2 rounded-lg text-sm hover:bg-slate-700 hover:text-white transition-all border border-slate-700">
                <i class="fas fa-sign-out-alt mr-2"></i> Keluar
            </button>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="sticky top-0 z-30 bg-card/80 backdrop-blur-xl border-b border-border px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white lg:hidden"><i class="fas fa-bars text-lg"></i></button>
                <h2 id="pageTitle" class="font-display text-xl font-bold text-white">Dashboard</h2>
            </div>
            <div class="flex items-center gap-2">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-brand-500"></span>
                </span>
                <span class="text-xs text-brand-400 font-medium">Online</span>
            </div>
        </header>

        <!-- PAGE CONTENT -->
        <div class="p-6" id="pageContent"></div>
    </main>
</div>

<script>
// ================================================================
// CONFIG & DATA
// ================================================================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMapelName(id){ 
    if(id === 'pai') return 'Pendidikan Agama Islam (PAI)';
    if(id === 'pjok') return 'PJOK';
    var m=MAPEL_LIST.find(function(x){return x.id===id;}); 
    return m?m.nama:id; 
}
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================================================================
// STATE
// ================================================================
var currentUser = null; 
var questions = []; // From 'questions' (SAT)
var pajQuestions = []; // From 'questions_paj' (PAJ)
var students = []; 
var examTokens = []; 
var results = []; 
var usersCache = []; 

var unsubQ = null, unsubPAJ = null, unsubSiswa = null, unsubToken = null, unsubResult = null, unsubGuru = null;

// ================================================================
// UTILITIES
// ================================================================
function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    t.className = 'toast ' + (type==='error'?'bg-rose-600':'bg-emerald-600');
    t.innerHTML = '<i class="fas fa-'+(type==='error'?'times-circle':'check-circle')+'"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3000);
}

function initRegMapel(){
    var sel = document.getElementById('regMapel');
    var h = '';
    MAPEL_LIST.forEach(function(m){
        h += '<option value="'+m.id+'">'+m.nama+'</option>';
    });
    sel.innerHTML = h;
}

function switchAuthTab(tab){
    document.getElementById('formLogin').classList.add('hidden');
    document.getElementById('formRegister').classList.add('hidden');
    
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('tabRegister').classList.remove('active');

    if(tab === 'login'){
        document.getElementById('formLogin').classList.remove('hidden');
        document.getElementById('tabLogin').classList.add('active');
        // Reset login fields
        document.getElementById('loginSchoolName').value = "";
        document.getElementById('loginSchoolName').classList.remove('text-brand-400');
        document.getElementById('loginSchoolName').classList.add('text-slate-400');
    } else {
        document.getElementById('formRegister').classList.remove('hidden');
        document.getElementById('tabRegister').classList.add('active');
    }
}

function toggleRegFields(){
    var role = document.getElementById('regRole').value;
    var kelasWrap = document.getElementById('regKelasWrapper');
    var mapelWrap = document.getElementById('regMapelWrapper');
    
    if(role === 'kelas'){
        kelasWrap.classList.remove('hidden');
        mapelWrap.classList.remove('hidden');
    } else {
        kelasWrap.classList.add('hidden');
        mapelWrap.classList.add('hidden');
    }
}

function checkSchoolName(){
    var npsn = document.getElementById('loginNpsn').value.trim();
    var schoolInput = document.getElementById('loginSchoolName');
    
    if(npsn.length === 0){
        schoolInput.value = "";
        schoolInput.classList.remove('text-brand-400');
        schoolInput.classList.add('text-slate-400');
        schoolInput.disabled = true;
        return;
    }

    var userFound = usersCache.find(function(u){ return u.npsn === npsn; });
    
    if(userFound){
        schoolInput.value = userFound.sekolah || userFound.nama_sekolah;
        schoolInput.classList.remove('text-slate-400');
        schoolInput.classList.add('text-brand-400');
    } else {
        schoolInput.value = "BELUM TERDAFTAR";
        schoolInput.classList.remove('text-brand-400');
        schoolInput.classList.add('text-rose-400');
    }
}

function openResetModal(){ document.getElementById('modalReset').classList.remove('hidden'); }
function closeModal(){ document.getElementById('modalReset').classList.add('hidden'); }

function toggleSidebar(){
    document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ================================================================
// AUTH LOGIC
// ================================================================
function doRegister(){
    var npsn = document.getElementById('regNpsn').value.trim();
    var sekolah = document.getElementById('regSchool').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    var nip = document.getElementById('regNip').value.trim();
    var role = document.getElementById('regRole').value;
    var rombel = document.getElementById('regRombel').value;
    var pass = document.getElementById('regPass').value;

    if(!npsn || !sekolah || !nama || !nip || !rombel || !pass){ showToast('Lengkapi semua data!','error'); return; }

    var data = {
        nip: nip,
        nama: nama,
        npsn: npsn,
        sekolah: sekolah,
        role: role, 
        rombel: rombel,
        password: pass,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if(role === 'kelas'){
        var kelas = document.getElementById('regKelas').value;
        var mapel = document.getElementById('regMapel').value;
        if(!kelas || !mapel){ showToast('Guru Kelas wajib pilih kelas dan mapel!','error'); return; }
        data.kelas = kelas;
        data.mapel = mapel;
    } else {
        data.mapel = role; 
        data.kelas = 'ALL'; 
    }

    db.collection('users_guru').doc(nip).set(data).then(function(){
        showToast('Registrasi Berhasil! Silakan Login.');
        switchAuthTab('login');
        document.getElementById('loginNip').value = nip;
        // Update cache agar checkSchoolName langsung jalan
        usersCache.push(data);
    }).catch(function(e){
        showToast('Gagal: '+(e.message||'NIP sudah terdaftar'),'error');
    });
}

function doLogin(){
    var npsn = document.getElementById('loginNpsn').value.trim();
    var nip = document.getElementById('loginNip').value.trim();
    var pass = document.getElementById('loginPass').value.trim();
    
    if(!nip || !pass){ showToast('Isi NIP dan Password','error'); return; }

    var schoolInputVal = document.getElementById('loginSchoolName').value;
    if(schoolInputVal === "BELUM TERDAFTAR"){
        showToast('NPSN ini belum terdaftar. Silakan hubungi Admin.','error');
        return;
    }

    db.collection('users_guru').doc(nip).get().then(function(doc){
        if(!doc.exists){ showToast('NIP tidak ditemukan','error'); return; }
        var data = doc.data();
        if(data.password !== pass){ showToast('Password Salah','error'); return; }
        
        currentUser = data;
        enterMainApp();
    }).catch(function(){ showToast('Terjadi kesalahan sistem','error'); });
}

function doResetPassword(){
    var nip = document.getElementById('resetNip').value.trim();
    var pass = document.getElementById('resetPass').value.trim();
    if(!nip || !pass){ showToast('Lengkapi data','error'); return; }
    
    db.collection('users_guru').doc(nip).update({password: pass}).then(function(){
        showToast('Password berhasil direset');
        closeModal();
    }).catch(function(){ showToast('NIP tidak ditemukan','error'); });
}

function doLogout(){
    currentUser = null;
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    if(unsubQ) unsubQ();
    if(unsubPAJ) unsubPAJ();
    if(unsubSiswa) unsubSiswa();
    if(unsubToken) unsubToken();
    if(unsubResult) unsubResult();
    if(unsubGuru) unsubGuru();
}

// ================================================================
// FIREBASE LISTENERS (INTEGRATED)
// ================================================================
function initFirebaseListeners(){
    unsubGuru = db.collection('users_guru').onSnapshot(function(snap){
        usersCache = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        var npsn = document.getElementById('loginNpsn')?.value;
        if(npsn && document.getElementById('loginNpsn').offsetParent !== null) checkSchoolName();
    });

    // 1. SAT QUESTIONS
    var qRef = db.collection('questions');
    if(currentUser.role === 'kelas'){
        qRef = qRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    } else if (currentUser.role === 'pai' || currentUser.role === 'pjok') {
        qRef = qRef.where('mapel','==',currentUser.mapel);
    }
    
    unsubQ = qRef.orderBy('createdAt','asc').onSnapshot(function(snap){
        questions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    // 2. PAJ QUESTIONS
    var pajRef = db.collection('questions_paj');
    if(currentUser.role === 'kelas' && currentUser.kelas === 'Kelas 6'){
        pajRef = pajRef.where('kelas','==','Kelas 6'); 
    } else if (currentUser.role === 'pai' || currentUser.role === 'pjok') {
        pajRef = pajRef.where('mapel','==',currentUser.mapel).where('kelas','==','Kelas 6');
    } else {
        pajRef = pajRef.where('kelas','==','null_impossible'); 
    }
    
    unsubPAJ = pajRef.orderBy('createdAt','asc').onSnapshot(function(snap){
        pajQuestions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubSiswa = db.collection('students').orderBy('nama','asc').onSnapshot(function(snap){
        students = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubToken = db.collection('exam_tokens').onSnapshot(function(snap){
        examTokens = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubResult = db.collection('exam_results').onSnapshot(function(snap){
        results = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });
}

function refreshCurrentView(){
    var activePage = document.querySelector('.nav-item.active')?.dataset.page;
    if(!activePage) return;
    var c = document.getElementById('pageContent');
    switch(activePage){
        case 'dashboard': renderDashboard(c); break;
        case 'data-siswa': renderDataSiswa(c); break;
        case 'bank-soal': renderBankSoal(c, false); break;
        case 'bank-soal-paj': renderBankSoal(c, true); break;
        case 'token': renderToken(c, false); break;
        case 'token-paj': renderToken(c, true); break;
        case 'koreksi': renderKoreksi(c, false); break;
        case 'koreksi-paj': renderKoreksi(c, true); break;
        case 'print': renderPrint(c, false); break;
        case 'print-paj': renderPrint(c, true); break;
    }
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');
    
    var titles = {
        dashboard:'Dashboard', data_siswa:'Data Siswa', 
        bank_soal:'Bank Soal SAT', bank_soal_paj:'Bank Soal PAJ',
        token:'Token Ujian', token_paj:'Token PAJ',
        koreksi:'Nilai & Koreksi', koreksi_paj:'Nilai PAJ',
        print:'Cetak Naskah', print_paj:'Cetak PAJ'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    refreshCurrentView();
}

function renderTokenList(isPAJ){
    var list = examTokens.filter(t=>t.isPAJ===isPAJ && t.mapel===(isPAJ?'pai':currentUser.mapel) && t.kelas===(isPAJ?'Kelas 6':currentUser.kelas));
    list = list.filter(t=>t.rombel === currentUser.rombel);
    var container = document.getElementById('tokenList');
    if(!list.length){ container.innerHTML='<div class="text-center py-8 text-slate-500">Belum ada token ujian aktif.</div>'; return; }
    container.innerHTML = list.map(t=>
        '<div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-lg border border-slate-700">' +

            '<button onclick="delToken(\''+t.id+'\')" class="text-rose-500 hover:text-rose-400 px-3 py-1 border border-rose-500/50 rounded hover:bg-rose-500/10 transition-colors"><i class="fas fa-trash mr-1"></i>Hapus</button>' +
        '</div>'
    ).join('');

function genToken(isPAJ){
    var durasi = document.getElementById('tokDurasi').value;
    var token = Math.floor(100000 + Math.random() * 900000).toString();
    var data = {
        token: token, mapel: isPAJ ? 'pai' : currentUser.mapel, kelas: isPAJ ? 'Kelas 6' : currentUser.kelas, durasi: parseInt(durasi), isPAJ: isPAJ, rombel: currentUser.rombel, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('exam_tokens').add(data).then(function(){ showToast('Token Berhasil: '+token); }).catch();
}
function delToken(id){ if(confirm('Hapus token ini?')) db.collection('exam_tokens').doc(id).delete().then(()=>showToast('Token Dihapus')).catch(); }

    c.innerHTML = '<div class="grid md:grid-cols-3 gap-6">' +

            '<button onclick="printNilai('+isPAJ+')" class="w-full btn-auth"><i class="fas fa-print mr-2"></i>Laporan Nilai</button>' +
        '</div>' +

    '</div>';

function loadKorData(isPAJ){
    var container = document.getElementById('korSiswaList');
    var mapelFilter = isPAJ ? 'pai' : currentUser.mapel;
    var kelasFilter = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelasFilter && s.rombel===currentUser.rombel);
    var qList = isPAJ ? pajQuestions : questions; 
    var maxScore = qList.reduce((a,b)=>a+(b.score||0),0);
    if(!stList.length){ container.innerHTML='<p class="text-slate-500">Tidak ada siswa.</p>'; return; }
    container.innerHTML = stList.map(function(s){
        var r = results.find(x=>x.siswaId===s.id && x.mapel===mapelFilter && x.isPAJ===isPAJ);
        var status = r ? '<span class="text-emerald-400 font-bold">Selesai ('+r.score+'/'+maxScore+')</span>' : '<span class="text-slate-500">Belum Ujian</span>';
        return '<div class="flex justify-between items-center p-3 bg-slate-800/50 rounded border border-slate-700"><span class="text-slate-200">'+s.nama+'</span><span>'+status+'</span></div>';
    }).join('');
}
function printLoginCards(isPAJ){
    var mapel = isPAJ ? 'pai' : currentUser.mapel;
    var kelas = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelas && s.rombel===currentUser.rombel);
    var tokens = examTokens.filter(t=>t.mapel===mapel && t.kelas===kelas && t.isPAJ===isPAJ && t.rombel===currentUser.rombel);
    var tokenStr = tokens.length ? tokens[0].token : 'N/A';
    var html = '<div style="font-family:sans-serif;display:grid;grid-template-columns:1fr 1fr;gap:30px;">';
    stList.forEach(function(s){
        html += '<div style="border:2px solid #000;padding:25px;text-align:center;border-radius:8px;page-break-inside:avoid;">' +
            '<h3 style="margin:0 0 15px 0;font-size:18px;font-weight:bold;border-bottom:2px solid #000;padding-bottom:10px;">KARTU PESERTA</h3>' +
            '<div style="text-align:left;margin-bottom:10px;"><strong>Nama:</strong> '+s.nama+'</div>' +
            '<div style="text-align:left;margin-bottom:10px;"><strong>NISN:</strong> '+s.nisn+'</div>' +
            '<div style="text-align:left;margin-bottom:10px;"><strong>Mapel:</strong> '+getMapelName(mapel)+'</div>' +
            '<div style="text-align:left;margin-bottom:10px;"><strong>Kelas:</strong> '+kelas+'</div>' +
            '<div style="background:#eee;padding:10px;margin:15px 0;font-family:Courier New,monospace;font-weight:bold;letter-spacing:2px;font-size:20px;border:1px solid #000;">TOKEN: '+tokenStr+'</div>' +
            '<svg id="barcode-'+s.nisn+'"></svg>' +
        '</div>';
    });
    html += '</div>';
    var w = window.open('','','width=1000,height=800');
    w.document.write('<html><head><title>Kartu Login</title><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script><style>@page{margin:0.5cm}body{font-family:sans-serif}</style></head><body onload="window.print();window.close();">');
    w.document.write(html);
    stList.forEach(function(s){ try { w.JsBarcode("#barcode-"+s.nisn, s.nisn); } catch(e){} });
    w.document.write('</body></html>');
    w.document.close();
}
function printNilai(isPAJ){
    var mapel = isPAJ ? 'pai' : currentUser.mapel;
    var kelas = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelas && s.rombel===currentUser.rombel);
    var resList = results.filter(r=>r.mapel===mapel && r.kelas===kelas && r.isPAJ===isPAJ);
    var html = '<div style="font-family:Times New Roman;padding:20px;">' +
        '<h2 style="text-align:center;text-decoration:underline;margin-bottom:5px;">LAPORAN HASIL UJIAN</h2>' +
        '<p style="text-align:center;margin-bottom:20px;">'+getMapelName(mapel)+' - '+kelas+'</p>' +
        '<table style="width:100%;border-collapse:collapse"><thead><tr><th style="border:1px solid #000;padding:5px;text-align:center">No</th><th style="border:1px solid #000;padding:5px">Nama</th><th style="border:1px solid #000;padding:5px;text-align:center">Nilai</th><th style="border:1px solid #000;padding:5px;text-align:center">Ket</th></tr></thead><tbody>';
    stList.forEach(function(s,i){
        var r = resList.find(x=>x.siswaId===s.id);
        var score = r ? r.score : 0;
        var ket = score >= 70 ? '<span style="color:green;font-weight:bold">TUNTAS</span>' : '<span style="color:red;font-weight:bold">REMEDIAL</span>';
        html += '<tr><td style="text-align:center;border:1px solid #000;padding:5px">'+(i+1)+'</td><td style="border:1px solid #000;padding:5px">'+s.nama+'</td><td style="text-align:center;border:1px solid #000;padding:5px;font-weight:bold">'+score+'</td><td style="text-align:center;border:1px solid #000;padding:5px">'+ket+'</td></tr>';
    });
    html += '</tbody></table></div>';
    var w = window.open('','','width=1000,height=800');
    w.document.write('<html><head><title>Laporan</title><style>@page{margin:1cm}body{font-family:sans-serif} table{width:100%;border-collapse:collapse} th,td{border:1px solid #000;padding:5px}</style></head><body onload="window.print();window.close();">');
    w.document.write(html);
    w.document.write('</body></html>');
    w.document.close();
}

function refreshPrintPreview(isPAJ){

    var logo = 'https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';
    var tp = document.getElementById('prTP').value;

    var html = '<div class="font-serif text-sm leading-relaxed">' +
        '<div class="text-center border-b-4 border-double border-black pb-4 mb-6">' +
            '<img src="'+logo+'" alt="Logo" style="height:60px;margin:0 auto 10px;">' +
            '<h1 class="text-lg font-bold uppercase">Pemerintah Kabupaten Majalengka</h1>' +
            '<h2 class="text-xl font-bold uppercase">Korek Api Kecamatan Majalengka</h2>' +
        '</div>' +
        '<div class="text-center mb-6"><h3 class="font-bold underline uppercase text-base">'+(isPAJ?'Penilaian Akhir Jenjang (PAJ)':'Sumatif Akhir Tahun')+'</h3><p class="font-bold text-sm mt-1">'+getMapelName(isPAJ?'pai':currentUser.mapel)+'</p></div>' +
        '<div class="mb-4 text-sm"><table style="width:100%"><tr><td width="100">Nama</td><td width="10">:</td><td style="border-bottom:1px dotted #000"></td></tr><tr><td>Kelas</td><td>:</td><td>'+(isPAJ?'Kelas 6':currentUser.kelas)+'</td></tr></table></div>';
    if(tp) html += '<div class="mb-4 p-3 border-l-4 border-black bg-gray-100 italic text-sm"><strong>TP:</strong> '+escHtml(tp)+'</div>';

    if(pg.length){
        html += '<div class="font-bold border-b-2 border-black pb-1 mb-4 mt-6">I. Pilihan Ganda</div>';
        pg.forEach(function(q,i){
            html += '<div class="mb-4"><div class="font-bold float-left w-6">'+(i+1)+'.</div><div class="ml-6">'+escHtml(q.text)+'</div>';
            html += '<div class="ml-6 mt-2 grid grid-cols-2 gap-4">';
            var letters = ['a','b','c','d','e'];
            (q.options||[]).forEach(function(opt,oi){ html += '<div><strong>'+letters[oi]+'.</strong> '+escHtml(opt)+'</div>'; });
            html += '</div><div class="clear-both"></div></div>';
        });
    }
    if(uraian.length){
        html += '<div class="font-bold border-b-2 border-black pb-1 mb-4 mt-8">II. Uraian</div>';
        uraian.forEach(function(q,i){
            html += '<div class="mb-4"><div class="font-bold float-left w-6">'+(i+1)+'.</div><div class="ml-6">'+escHtml(q.text)+'</div><div class="ml-6 mt-2 border border-dashed border-gray-400 h-20 bg-gray-50"></div></div>';
        });
    }
    html += '</div>';
    container.innerHTML = html;
}
function doPrintSoal(isPAJ){
    var sheet = document.getElementById('printPreviewContainer');
    if(!sheet) return;
    var w = window.open('','','width=1000,height=800');
    w.document.write('<html><head><title>Cetak</title>');
    w.document.write('<style>@page{size:A4;margin:1.5cm}body{font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4}</style>');
    w.document.write('</head><body onload="window.print();window.close();">');
    w.document.write(sheet.innerHTML);
    w.document.write('</body></html>');
    w.document.close();
}
