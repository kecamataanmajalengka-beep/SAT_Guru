<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

.sidebar{width:260px;height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;display:flex;flex-direction:column;transition:transform .3s ease}
.main-content{margin-left:260px;transition:margin-left .3s ease}

.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-item.paj-item.active{background:rgba(239,68,68,0.08);border-left-color:#ef4444;color:#ef4444}

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 24px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;font-family:'Source Sans 3',sans-serif;display:inline-flex;align-items:center;justify-content:center}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:13px;font-family:'Source Sans 3',sans-serif}
.btn-danger:hover{background:#ef4444;color:white}

.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s;font-family:'Source Sans 3',sans-serif}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.input-field:disabled{opacity:0.5;cursor:not-allowed}
.input-field option{background:#182538;color:#e8ecf1}
textarea.input-field{resize:vertical;min-height:40px}

.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:420px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white;border:1px solid #22c55e}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white;border:1px solid #ef4444}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;animation:fadeIn .3s ease;max-height:90vh;overflow-y:auto}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
.img-preview{max-width:100%;max-height:180px;object-fit:contain;border-radius:6px;margin-top:8px;border:1px solid #2a3f5f;background:#0f1923}
.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.print-preview-wrap{background:#e5e7eb;padding:40px;border-radius:8px;display:flex;justify-content:center;overflow-x:auto}
.print-preview-sheet{background:white;color:black;width:210mm;max-width:100%;min-height:297mm;padding:1.5cm 2cm 2cm 2cm;box-shadow:0 4px 20px rgba(0,0,0,0.2);font-family:'Times New Roman',Times,serif;font-size:12pt;line-height:1.4}
.print-preview-sheet .kop-surat{text-align:center;padding-bottom:12px;margin-bottom:24px;border-bottom:3px double #000;display:flex;flex-direction:column;align-items:center;gap:8px}
.print-preview-sheet .kop-surat-row{display:flex;align-items:center;justify-content:center;gap:16px;width:100%}
.print-preview-sheet .kop-surat img{height:75px;width:auto;object-fit:contain}
.print-preview-sheet .kop-text{text-align:center;line-height:1.3;flex:1}
.print-preview-sheet .kop-text h1{font-size:13pt;font-weight:bold;text-transform:uppercase;margin:0}
.print-preview-sheet .kop-text h2{font-size:16pt;font-weight:bold;text-transform:uppercase;margin:0}
.print-preview-sheet .section-heading{font-weight:bold;font-size:12pt;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:15px;margin-top:10px;text-align:left}
.print-preview-sheet .print-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:10pt;table-layout:fixed}
.print-preview-sheet .print-table th,.print-preview-sheet .print-table td{border:1px solid #000;padding:6px 8px;text-align:left;vertical-align:top;overflow:hidden}
.print-preview-sheet .print-table th{background-color:#eee;text-align:center;font-weight:bold;font-size:9pt;text-transform:uppercase}
.print-preview-sheet .print-table td.center{text-align:center;vertical-align:middle}
.print-preview-sheet .print-table td.wrap-text{word-wrap:break-word;white-space:pre-wrap;word-break:break-word}

@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
</style>
</head>
<body>

<!-- MAIN APP -->
<div id="mainPage">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-fire text-kop text-lg"></i></div>
            <div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Admin Mode</p></div>
        </div>
    </div>
    <nav class="py-4 flex-1 overflow-y-auto" id="sidebarNav">
        <div class="px-5 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Menu Utama</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="tp"><i class="fas fa-bullseye w-5 text-center"></i>Kelola TP</div>
        <div class="nav-item" data-page="create"><i class="fas fa-plus-circle w-5 text-center"></i>Buat Soal SAT</div>
        <div class="nav-item" data-page="questions"><i class="fas fa-list w-5 text-center"></i>Bank Soal SAT</div>
        <div class="nav-item" data-page="print"><i class="fas fa-print w-5 text-center"></i>Cetak Soal SAT</div>
        <div class="nav-item" data-page="kisi"><i class="fas fa-table w-5 text-center"></i>Kisi-Kisi SAT</div>
        <div class="nav-item" data-page="scoring"><i class="fas fa-key w-5 text-center"></i>Kunci & Skor SAT</div>
        
        <div class="mt-4 border-t border-border">
            <div class="px-5 mb-2"><span class="text-xs text-danger font-semibold uppercase tracking-wider"><i class="fas fa-graduation-cap mr-1"></i>Kelas 6 (PAJ)</span></div>
            <div class="nav-item paj-item" data-page="create-paj"><i class="fas fa-plus-square w-5 text-center"></i>Buat Soal PAJ</div>
            <div class="nav-item paj-item" data-page="questions-paj"><i class="fas fa-folder-open w-5 text-center"></i>Bank Soal PAJ</div>
            <div class="nav-item paj-item" data-page="print-paj"><i class="fas fa-print w-5 text-center"></i>Cetak Soal PAJ</div>
            <div class="nav-item paj-item" data-page="kisi-paj"><i class="fas fa-table w-5 text-center"></i>Kisi-Kisi PAJ</div>
            <div class="nav-item paj-item" data-page="scoring-paj"><i class="fas fa-key w-5 text-center"></i>Kunci & Skor PAJ</div>
        </div>

        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Pelaksanaan Ujian</span></div>
        <div class="nav-item" data-page="token"><i class="fas fa-key w-5 text-center"></i>Token & Durasi Ujian</div>
        <div class="nav-item" data-page="koreksi"><i class="fas fa-clipboard-check w-5 text-center"></i>Koreksi Jawaban</div>
    </nav>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/80 backdrop-blur-xl border-b border-border px-4 md:px-6 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-muted hover:text-light transition-colors" type="button"><i class="fas fa-bars text-lg"></i></button>
            <h2 id="pageTitle" class="font-display text-base md:text-lg font-bold text-light">Dashboard</h2>
        </div>
        <div class="flex items-center gap-3">
            <span class="text-sm text-kopAccent font-bold"><i class="fas fa-crown mr-1"></i>Super Admin</span>
            <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
        </div>
    </header>
    <div class="p-4 md:p-6" id="pageContent"></div>
</div>

<div id="modalOverlay" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMaxOpt(k){ var n=parseInt((k||'').replace('Kelas ',''))||0; return n<=2?3:4; }
function getOptLetters(k){ return ['a','b','c','d','e'].slice(0,getMaxOpt(k)); }
function getMapelName(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.nama:id; }
function getMapelSingkat(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.singkat:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

var questions = [];
var pajQuestions = []; 
var tujuanPembelajaran = [];
var currentEditType = 'sat';
var unsubQ = null, unsubPAJ = null, unsubTP = null;

function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':'times-circle';
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas fa-'+icon+' flex-shrink-0"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('modalBody').innerHTML = ''; }
function openModal(html){ document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('modalBody').innerHTML = '<div class="modal-body-content" style="max-height:60vh;overflow-y:auto">'+html+'</div>'; }
function toggleSidebar(){ var sb=document.getElementById('sidebar'),ov=document.getElementById('sidebarOverlay');sb.classList.toggle('mobile-open');ov.classList.toggle('active',sb.classList.contains('mobile-open'));}
function closeSidebar(){ document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('sidebarOverlay').classList.remove('active'); }

function makeMapelOpt(sel){ var h = '<option value="">-- Pilih --</option>'; MAPEL_LIST.forEach(function(m){ h += '<option value="'+m.id+'"'+(m.id===sel?' selected':'')+'>'+m.nama+'</option>'; }); return h; }
function makeKelasOpt(sel){ var h = '<option value="">-- Pilih --</option>'; KELAS_LIST.forEach(function(k){ h += '<option value="'+k+'"'+(k===sel?' selected':'')+'>'+k+'</option>'; }); return h; }

function initApp(){
    unsubTP = db.collection('tps').orderBy('createdAt','asc').onSnapshot(function(snap){ tujuanPembelajaran = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); }); });
    unsubQ = db.collection('questions').orderBy('createdAt','asc').onSnapshot(function(snap){ questions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); }); if(document.querySelector('.nav-item.active')?.dataset.page === 'dashboard') renderDashboard(document.getElementById('pageContent')); });
    unsubPAJ = db.collection('questions_paj').orderBy('createdAt','asc').onSnapshot(function(snap){ pajQuestions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); }); if(document.querySelector('.nav-item.active')?.dataset.page === 'dashboard') renderDashboard(document.getElementById('pageContent')); });
    
    navigateTo('dashboard');
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');
    var titles = {
        dashboard:'Dashboard', tp:'Kelola Tujuan Pembelajaran', create:'Buat Soal SAT', questions:'Bank Soal SAT',
        print:'Cetak Soal SAT', kisi:'Kisi-Kisi SAT', scoring:'Kunci & Skor SAT',
        'create-paj':'Buat Soal PAJ', 'questions-paj':'Bank Soal PAJ', 'print-paj':'Cetak Soal PAJ', 'kisi-paj':'Kisi-Kisi PAJ', 'scoring-paj':'Kunci & Skor PAJ',
        token:'Token & Durasi Ujian', koreksi:'Koreksi Jawaban'
    };
    document.getElementById('pageTitle').textContent = titles[page] || page;
    closeSidebar();
    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(c); break;
        case 'tp': renderTP(c); break;
        case 'create': renderCreate(c, 'sat'); break;
        case 'questions': renderQuestions(c, 'sat'); break;
        case 'print': renderPrint(c, 'sat'); break;
        case 'kisi': renderKisi(c, 'sat'); break;
        case 'scoring': renderScoring(c, 'sat'); break;
        case 'create-paj': renderCreate(c, 'paj'); break;
        case 'questions-paj': renderQuestions(c, 'paj'); break;
        case 'print-paj': renderPrint(c, 'paj'); break;
        case 'kisi-paj': renderKisi(c, 'paj'); break;
        case 'scoring-paj': renderScoring(c, 'paj'); break;
        case 'token': renderToken(c); break;
        case 'koreksi': renderKoreksi(c); break;
    }
}

document.getElementById('sidebarNav').addEventListener('click', function(e){
    var item = e.target.closest('.nav-item');
    if(item) navigateTo(item.dataset.page);
});

function renderDashboard(c){
    var totalSAT=questions.length, pgSAT=questions.filter(q=>q.type==='pg').length, uraianSAT=questions.filter(q=>q.type==='uraian').length;
    var totalPAJ=pajQuestions.length, pgPAJ=pajQuestions.filter(q=>q.type==='pg').length, uraianPAJ=pajQuestions.filter(q=>q.type==='uraian').length;
    c.innerHTML = '<div class="fade-in grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">' +
        '<div class="card text-center border-l-4 border-kopAccent"><div class="text-3xl font-bold text-kopAccent">'+totalSAT+'</div><div class="text-xs text-muted mt-1">Total Soal SAT</div></div>' +
        '<div class="card text-center border-l-4 border-info"><div class="text-3xl font-bold text-info">'+pgSAT+'</div><div class="text-xs text-muted mt-1">PG SAT</div></div>' +
        '<div class="card text-center border-l-4 border-warning"><div class="text-3xl font-bold text-warning">'+uraianSAT+'</div><div class="text-xs text-muted mt-1">Uraian SAT</div></div>' +
        '<div class="card text-center border-l-4 border-success"><div class="text-3xl font-bold text-success">'+totalPAJ+'</div><div class="text-xs text-muted mt-1">Total Soal PAJ</div></div>' +
    '</div>';
}

function renderTP(c){
    c.innerHTML = '<div class="fade-in card"><div class="flex flex-wrap justify-between items-center mb-4 gap-3"><h3 class="font-display text-lg font-bold text-light">Tujuan Pembelajaran</h3><button onclick="openAddTPModal()" class="btn-primary text-sm"><i class="fas fa-plus mr-1"></i>Tambah TP</button></div><div id="tpListContainer" class="space-y-2 max-h-[70vh] overflow-y-auto pr-2"></div></div>';
    renderTPList();
}

function renderTPList(){
    var container = document.getElementById('tpListContainer'); if(!container) return;
    if(tujuanPembelajaran.length===0){ container.innerHTML = '<p class="text-center text-muted py-10"><i class="fas fa-inbox text-3xl mb-3 block opacity-30"></i>Belum ada data TP</p>'; return; }
    container.innerHTML = tujuanPembelajaran.map(function(t){
        return '<div class="p-3 bg-dark/30 rounded-lg flex justify-between items-start border-l-4 border-kopAccent hover:bg-dark/50 transition-colors"><div class="flex-1 pr-4"><div class="flex gap-2 mb-1 flex-wrap"><span class="text-xs px-2 py-0.5 rounded bg-kopAccent/20 text-kopAccent font-semibold">'+getMapelSingkat(t.mapel)+'</span><span class="text-xs text-muted">'+t.kelas+'</span></div><p class="text-sm leading-relaxed">'+escHtml(t.text)+'</p></div><div class="flex gap-2 flex-shrink-0"><button onclick="deleteTP(\''+t.id+'\')" class="text-danger/60 hover:text-danger p-1"><i class="fas fa-trash text-xs"></i></button></div></div>';
    }).join('');
}

function openAddTPModal(){
    openModal('<h3 class="font-display text-lg font-bold text-light mb-4">Tambah Tujuan Pembelajaran</h3><div class="space-y-4"><div class="grid grid-cols-2 gap-4"><div><label class="text-xs text-muted mb-1 block">Mapel</label><select id="mTPMapel" class="input-field">'+makeMapelOpt('')+'</select></div><div><label class="text-xs text-muted mb-1 block">Kelas</label><select id="mTPKelas" class="input-field">'+makeKelasOpt('')+'</select></div></div><div><label class="text-xs text-muted mb-1 block">Isi TP</label><textarea id="mTPText" class="input-field" rows="4"></textarea></div><div class="flex justify-end gap-3 pt-2"><button onclick="closeModal()" class="btn-secondary">Batal</button><button onclick="saveTP()" class="btn-primary">Simpan</button></div></div>');
}

function saveTP(){
    var text = document.getElementById('mTPText').value.trim();
    if(!text){ showToast('Isi TP tidak boleh kosong','error'); return; }
    db.collection('tps').add({ mapel:document.getElementById('mTPMapel').value, kelas:document.getElementById('mTPKelas').value, text:text, createdAt:firebase.firestore.FieldValue.serverTimestamp() }).then(function(){ showToast('TP berhasil disimpan!'); closeModal(); }).catch(function(){ showToast('Gagal menyimpan TP','error'); });
}

function deleteTP(id){ if(!confirm('Hapus TP ini?')) return; db.collection('tps').doc(id).delete().then(function(){ showToast('TP dihapus'); }).catch(function(){ showToast('Gagal menghapus','error'); }); }

function updateTPDropdown(){
    var mapelEl = document.getElementById('cMapel'), kelasEl = document.getElementById('cKelas');
    if(!mapelEl || !kelasEl) return;
    var mapel = mapelEl.value, kelas = kelasEl.value;
    if(!mapel || !kelas) return;
    var relevant = tujuanPembelajaran.filter(function(t){ return t.mapel===mapel && t.kelas===kelas; });
    var sel = document.getElementById('cTPSelect'); if(!sel) return;
    sel.innerHTML = '<option value="">-- Pilih TP --</option>';
    relevant.forEach(function(t){ sel.innerHTML += '<option value="'+escHtml(t.text)+'">'+escHtml(t.text.length>80?t.text.substring(0,80)+'...':t.text)+'</option>'; });
}

    var doc=iframe.contentDocument||iframe.contentWindow.document; doc.open(); doc.write('<!DOCTYPE html><html><head><style>@page{size:A4;margin:1.5cm 2cm 2cm 2cm}body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}.kop-surat{text-align:center;padding-bottom:12px;margin-bottom:24px;border-bottom:3px double #000}.kop-surat h1{font-size:13pt;font-weight:bold;text-transform:uppercase;margin:0}.kop-surat h2{font-size:15pt;font-weight:bold;text-transform:uppercase;margin:0}.section-heading{font-weight:bold;font-size:12pt;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:12px;margin-top:10px}.print-table{width:100%;border-collapse:collapse;margin-top:12pt;font-size:10pt;table-layout:fixed}.print-table th,.print-table td{border:1px solid #000;padding:6px 8px;text-align:left;vertical-align:top}.print-table th{background-color:#eee!important;text-align:center;font-weight:bold;font-size:9pt;text-transform:uppercase}.print-table td.center{text-align:center;vertical-align:middle}.print-table td.wrap-text{word-wrap:break-word;white-space:pre-wrap;word-break:break-word}</style></head><body>'); doc.write(sheet.innerHTML); doc.write('</body></html>'); doc.close();
    setTimeout(function(){ iframe.contentWindow.focus(); iframe.contentWindow.print(); setTimeout(function(){document.body.removeChild(iframe);},3000); },500);
}

function renderToken(c){
    c.innerHTML = '<div class="fade-in grid md:grid-cols-2 gap-6"><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Generate Token Ujian</h3><div class="space-y-4"><div><label class="text-xs text-muted mb-1 block">Mapel</label><select id="tMapel" class="input-field">'+makeMapelOpt('')+'</select></div><div><label class="text-xs text-muted mb-1 block">Kelas</label><select id="tKelas" class="input-field">'+makeKelasOpt('')+'</select></div><div><label class="text-xs text-muted mb-1 block">Durasi Ujian (Menit)</label><input type="number" id="tDurasi" class="input-field" value="60" min="10"></div><button onclick="generateToken()" class="btn-primary w-full"><i class="fas fa-key mr-2"></i>Generate Token</button></div></div><div class="card"><h3 class="font-display text-lg font-bold text-light mb-4">Token Aktif</h3><div id="activeTokenContainer" class="flex flex-col gap-3 max-h-[60vh] overflow-y-auto pr-2"></div></div></div>';
    loadActiveTokens();
}

function generateToken(){
    var mapel=document.getElementById('tMapel').value, kelas=document.getElementById('tKelas').value, durasi=parseInt(document.getElementById('tDurasi').value)||60;
    if(!mapel||!kelas){ showToast('Pilih mapel dan kelas','error'); return; }
    var token = Math.floor(100000 + Math.random() * 900000);
    db.collection('exam_tokens').add({ code:token.toString(), mapel:mapel, kelas:kelas, duration:durasi, createdAt:firebase.firestore.FieldValue.serverTimestamp(), status:'active' }).then(function(){ showToast('Token '+token+' ('+durasi+' menit) berhasil dibuat!'); loadActiveTokens(); });
}

function loadActiveTokens(){
    var container = document.getElementById('activeTokenContainer'); if(!container) return;
    db.collection('exam_tokens').where('status','==','active').orderBy('createdAt','desc').limit(20).get().then(snap=>{
        if(snap.empty){ container.innerHTML = '<p class="text-sm text-muted text-center py-4">Tidak ada token aktif</p>'; return; }
        var html = '';
        snap.forEach(doc=>{
            var t=doc.data();
            html += '<div class="p-3 bg-success/10 border border-success/30 rounded hover:bg-success/20 transition"><div class="flex justify-between items-center mb-2"><div class="text-2xl font-bold text-success tracking-widest">'+t.code+'</div><button onclick="deactivateToken(\''+doc.id+'\')" class="text-danger hover:bg-danger/20 p-2 rounded" title="Nonaktifkan"><i class="fas fa-times"></i></button></div><div class="flex gap-4 text-xs text-muted"><span><i class="fas fa-book mr-1"></i>'+getMapelSingkat(t.mapel)+'</span><span><i class="fas fa-graduation-cap mr-1"></i>'+t.kelas+'</span><span><i class="fas fa-clock mr-1"></i>'+t.duration+' Menit</span></div><div class="text-[10px] text-muted mt-1 opacity-60">'+(t.createdAt?new Date(t.createdAt.toDate()).toLocaleString():'-')+'</div></div>';
        });
        container.innerHTML = html;
    });
}

function deactivateToken(id){ db.collection('exam_tokens').doc(id).update({status:'inactive'}).then(function(){ showToast('Token dinonaktifkan'); loadActiveTokens(); }); }

function renderKoreksi(c){
    c.innerHTML = '<div class="fade-in card"><h3 class="font-display text-lg font-bold text-light mb-4"><i class="fas fa-clipboard-check mr-2 text-kopAccent"></i>Koreksi Jawaban</h3><div class="flex flex-wrap gap-4 mb-6 p-4 bg-dark/30 rounded-lg"><div class="w-44"><label class="text-xs text-muted mb-1 block">Filter Mapel</label><select id="kMapel" class="input-field" onchange="loadKoreksiData()">'+makeMapelOpt('')+'</select></div><div class="w-44"><label class="text-xs text-muted mb-1 block">Filter Kelas</label><select id="kKelas" class="input-field" onchange="loadKoreksiData()">'+makeKelasOpt('')+'</select></div></div><div class="overflow-x-auto border border-border rounded-lg"><table class="w-full text-sm text-left"><thead class="bg-dark/50 text-muted text-xs uppercase"><tr><th class="px-3 py-2">Nama</th><th class="px-3 py-2">Kelas</th><th class="px-3 py-2 text-center">PG Benar</th><th class="px-3 py-2 text-center">Skor Uraian</th><th class="px-3 py-2 text-center">Total Skor</th><th class="px-3 py-2 text-center">Aksi</th></tr></thead><tbody id="koreksiTableBody"><tr><td colspan="6" class="text-center py-4 text-muted">Pilih filter untuk memuat data siswa</td></tr></tbody></table></div></div>';
}

function loadKoreksiData(){
    var mapel=document.getElementById('kMapel').value, kelas=document.getElementById('kKelas').value, tbody=document.getElementById('koreksiTableBody');
    if(!mapel||!kelas){ tbody.innerHTML='<tr><td colspan="6" class="text-center py-4 text-muted">Pilih mapel dan kelas</td></tr>'; return; }
    db.collection('students').where('kelas','==',kelas).get().then(snap=>{
        if(snap.empty){ tbody.innerHTML='<tr><td colspan="6" class="text-center py-4 text-muted">Tidak ada siswa di kelas ini</td></tr>'; return; }
        tbody.innerHTML = snap.docs.map(doc=>{
            var s=doc.data();
            return '<tr class="border-b border-border hover:bg-dark/20"><td class="px-3 py-2 font-semibold text-light">'+s.nama+'</td><td class="px-3 py-2">'+s.kelas+'</td><td class="px-3 py-2 text-center"><input type="number" class="input-field w-16 text-center py-1" value="0" min="0" id="pg_'+doc.id+'"></td><td class="px-3 py-2 text-center"><input type="number" class="input-field w-16 text-center py-1" value="0" min="0" id="uraian_'+doc.id+'"></td><td class="px-3 py-2 text-center font-bold text-kopAccent" id="total_'+doc.id+'">0</td><td class="px-3 py-2 text-center"><button onclick="saveKoreksi(\''+doc.id+'\')" class="btn-primary text-xs py-1 px-2">Simpan</button></td></tr>';
        }).join('');
        snap.docs.forEach(doc=>{
            document.getElementById('pg_'+doc.id).addEventListener('input', function(){ updateTotalScore(doc.id); });
            document.getElementById('uraian_'+doc.id).addEventListener('input', function(){ updateTotalScore(doc.id); });
        });
    });
}

function updateTotalScore(id){
    var pg=parseInt(document.getElementById('pg_'+id).value)||0;
    var uraian=parseInt(document.getElementById('uraian_'+id).value)||0;
    document.getElementById('total_'+id).innerText = pg + uraian;
}

function saveKoreksi(studentId){
    var pg=parseInt(document.getElementById('pg_'+studentId).value)||0;
    var uraian=parseInt(document.getElementById('uraian_'+studentId).value)||0;
    var mapel=document.getElementById('kMapel').value;
    db.collection('scores').doc(studentId+'_'+mapel).set({ studentId:studentId, mapel:mapel, scorePG:pg, scoreUraian:uraian, totalScore:pg+uraian, createdAt:firebase.firestore.FieldValue.serverTimestamp() }).then(function(){ showToast('Nilai berhasil disimpan!'); }).catch(function(){ showToast('Gagal menyimpan nilai','error'); });
}

window.onload = initApp;
</script>
</body>
</html>
