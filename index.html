<style>
/* BASE STYLE */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

/* LOGIN BG */
.login-bg{background:linear-gradient(135deg,#0f1923 0%,#1a2744 40%,#182538 100%);position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);top:-150px;right:-150px;border-radius:50%;animation:floatBlob 8s ease-in-out infinite}
@keyframes floatBlob{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.1)}}

.glass{background:rgba(24,37,56,0.9);backdrop-filter:blur(12px);border:1px solid rgba(42,63,95,0.5)}

/* SIDEBAR */
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease;overflow-y:auto}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}

/* COMPONENTS */
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c}
.input-field option{background:#182538;color:#e8ecf1}
.input-field:disabled{background:#2a3f5f;color:#7a8ba5;cursor:not-allowed}

.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:24px}

.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:linear-gradient(135deg,#166534,#15803d);color:white}
.toast-error{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:white}
.toast-info{background:linear-gradient(135deg,#164e63,#155e75);color:white}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#182538;border:1px solid #2a3f5f;border-radius:16px;padding:32px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto}

.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}
@media(max-width:1023px){.sidebar{transform:translateX(-260px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
.fade-in{animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Custom Checkbox for Class Selection */
.class-checkbox-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.class-checkbox-item { 
    display: flex; align-items: center; gap: 6px; 
    background: rgba(255,255,255,0.05); padding: 8px; 
    border-radius: 6px; border: 1px solid transparent; cursor: pointer; 
    font-size: 13px; transition: all 0.2s;
}
.class-checkbox-item:hover { background: rgba(255,255,255,0.1); }
.class-checkbox-item input:checked + span { color: #c9a84c; font-weight: bold; }

/* ================= PRINT STYLES ================= */
@media print {
    @page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }
    body { background: white !important; color: black !important; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
    #sidebar, #mainArea > header, .no-print, #toastContainer, #modalOverlay, #loginPage, .card { display: none !important; }
    #mainArea { margin: 0 !important; padding: 0 !important; width: 100% !important; height: auto !important; background: white !important; overflow: visible !important; }
    #pageContent { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; color: black !important; overflow: visible !important; }
    .print-page { width: 100%; padding: 0; background: white; color: black; }
    
    /* KOP SURAT */
    .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .kop-surat-row { display: flex; align-items: center; justify-content: center; gap: 16px; width: 100%; }
    .kop-surat img { height: 75px; width: auto; object-fit: contain; }
    .kop-text { text-align: center; line-height: 1.3; flex: 1; }
    .kop-text h1 { font-family: 'Times New Roman', serif; font-size: 13pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .kop-text h2 { font-family: 'Times New Roman', serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    
    .ujian-title { text-align: center; margin-bottom: 20px; }
    .ujian-title h3 { font-family: 'Times New Roman', serif; font-size: 14pt; font-weight: bold; text-decoration: underline; text-transform: uppercase; margin: 0; }
    
    /* LAYOUT SOAL */
    .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
    .soal-num { float: left; font-weight: bold; font-family: 'Times New Roman', serif; font-size: 12pt; width: 35px; flex-shrink: 0; }
    .soal-text { font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; }
    .soal-img-print { display: block; max-width: 100%; height: auto; max-height: 200px; object-fit: contain; margin: 8px 0; border: 1px solid #ccc; background-color: #eee; }
    .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
    .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.4; text-align: left; }
    .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
    .opsi-label::after { content: "."; }
    .opsi-img-print { max-width: 60px; max-height: 50px; display: inline-block; vertical-align: middle; margin-left: 8px; object-fit: contain; }
    .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; border-radius: 4px; background-color: #fafafa; }
    .clearfix::after { content: ""; display: table; clear: both; }
}

/* PREVIEW STYLES */
.print-preview-wrap { background: #e5e7eb; padding: 40px; border-radius: 8px; display: flex; justify-content: center; overflow-x: auto; }
.print-preview-sheet { background: white; color: black; width: 210mm; max-width: 100%; min-height: 297mm; padding: 1.5cm 2cm 2cm 2cm; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Times New Roman', Times, serif; font-size: 12pt; line-height: 1.4; }
.print-preview-sheet .kop-surat { display: flex; flex-direction: column; align-items: center; text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; }
.print-preview-sheet .soal-item { margin-bottom: 24px; page-break-inside: avoid; width: 100%; display: block; overflow: hidden; }
.print-preview-sheet .soal-num { float: left; font-weight: bold; font-size: 12pt; width: 35px; flex-shrink: 0; }
.print-preview-sheet .soal-text { font-size: 12pt; line-height: 1.5; text-align: left; display: block; margin-left: 35px; margin-bottom: 8px; }
.print-preview-sheet .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; column-gap: 24px; row-gap: 6px; margin-left: 35px; }
.print-preview-sheet .opsi-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12pt; line-height: 1.4; text-align: left; }
.print-preview-sheet .opsi-label { font-weight: bold; min-width: 20px; flex-shrink: 0; }
.print-preview-sheet .opsi-label::after { content: '.'; } 
.print-preview-sheet .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #ccc; height: 80px; border-radius: 4px; background-color: #fafafa; }
</style>
</head>
<body>

<div id="toastContainer"></div>
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ================= LOGIN / REGISTER PAGE ================= -->
<div id="loginPage" class="login-bg">
<div class="glass rounded-2xl p-8 w-full max-w-md relative z-10 fade-in">
    <div class="text-center mb-6">
        <div class="w-16 h-16 mx-auto mb-3 rounded-full overflow-hidden border-4 border-kopAccent flex items-center justify-center bg-white">
            <img src="https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg" alt="Logo" class="w-full h-full object-cover">
        </div>
        <h1 class="font-display text-2xl font-bold text-kopAccent tracking-wide">KOREK API</h1>
        <p class="text-muted text-sm">Sistem Ujian Digital Sekolah</p>
    </div>

    <div class="flex mb-6 border-b border-border">
        <button onclick="switchAuthTab('login')" id="tabLogin" class="flex-1 pb-2 text-center text-sm font-bold text-kopAccent border-b-2 border-kopAccent">MASUK</button>
        <button onclick="switchAuthTab('register')" id="tabRegister" class="flex-1 pb-2 text-center text-sm text-muted hover:text-light">REGISTRASI</button>
    </div>

    <!-- FORM LOGIN -->
    <div id="formLogin" class="space-y-4">
        <div><label class="text-xs text-muted font-semibold uppercase mb-1 block">NIP</label><input type="text" id="loginNip" class="input-field" placeholder="Nomor Induk Pegawai"></div>
        <div><label class="text-xs text-muted font-semibold uppercase mb-1 block">Password</label><input type="password" id="loginPass" class="input-field" placeholder="******"></div>
        <p id="loginError" class="text-danger text-xs hidden"></p>
        <div class="flex justify-between items-center text-xs">
            <a href="#" onclick="showForgotPassword()" class="text-info hover:underline">Lupa Password?</a>
        </div>
        <button onclick="doLogin()" class="btn-primary w-full mt-2"><i class="fas fa-sign-in-alt mr-2"></i>Masuk</button>
    </div>

    <!-- FORM REGISTRASI -->
    <div id="formRegister" class="hidden space-y-3">
        <div class="grid grid-cols-2 gap-3">
            <div><label class="text-xs text-muted">NPSN Sekolah</label><input type="text" id="regNpsn" class="input-field" placeholder="202xxx"></div>
            <div><label class="text-xs text-muted">NIP Guru</label><input type="text" id="regNip" class="input-field" placeholder="NIP Anda"></div>
        </div>
        <div><label class="text-xs text-muted">Nama Lengkap</label><input type="text" id="regNama" class="input-field" placeholder="Nama Guru"></div>
        
        <div><label class="text-xs text-muted">Jenis Guru</label>
            <select id="regJenis" class="input-field" onchange="handleJenisChange()">
                <option value="">-- Pilih Jenis Guru --</option>
                <option value="Kelas">Guru Kelas</option>
                <option value="PAI">Guru PAI</option>
                <option value="PJOK">Guru PJOK</option>
            </select>
        </div>

        <!-- AREA KELAS (Dinamis) -->
        <div id="kelasContainer">
            <label class="text-xs text-muted">Kelas Ampu</label>
            <!-- Checkbox untuk Guru Kelas (Default) -->
            <div id="kelasCheckboxes" class="class-checkbox-group mt-1">
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 1"> <span>Kelas 1</span></label>
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 2"> <span>Kelas 2</span></label>
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 3"> <span>Kelas 3</span></label>
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 4"> <span>Kelas 4</span></label>
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 5"> <span>Kelas 5</span></label>
                <label class="class-checkbox-item"><input type="checkbox" name="regKelas" value="Kelas 6"> <span>Kelas 6</span></label>
            </div>
            <!-- Input Text Read-only untuk Guru PAI/PJOK -->
            <div id="kelasAutoText" class="hidden">
                <input type="text" id="regKelasAuto" class="input-field" value="Semua Kelas (1-6)" disabled>
                <p class="text-[10px] text-info mt-1">Otomatis mengajar semua kelas</p>
            </div>
        </div>

        <div><label class="text-xs text-muted">Rombel</label>
            <select id="regRombel" class="input-field">
                <option value="">-- Pilih Rombel --</option>
                <option value="A">Rombel A</option>
                <option value="B">Rombel B</option>
                <option value="C">Rombel C</option>
            </select>
        </div>

        <div><label class="text-xs text-muted">Password</label><input type="password" id="regPass" class="input-field"></div>
        <div><label class="text-xs text-muted">Konfirmasi</label><input type="password" id="regPassConfirm" class="input-field"></div>
        <button onclick="doRegister()" class="btn-primary w-full mt-2"><i class="fas fa-user-plus mr-2"></i>Daftar</button>
    </div>
</div>
</div>

<!-- ================= MAIN APP ================= -->
<div id="mainPage" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center"><i class="fas fa-fire text-kop text-lg"></i></div>
        <div><h2 class="font-display text-kopAccent font-bold text-sm leading-tight">KOREK API</h2><p class="text-muted text-xs">Full Integrated</p></div>
    </div>
    <nav class="py-4" id="sidebarNav">
        <div class="px-5 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Menu Utama</span></div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-home w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="students"><i class="fas fa-user-graduate w-5 text-center"></i>Data Siswa</div>
        
        <div class="px-5 mt-4 mb-2"><span class="text-xs text-muted uppercase tracking-wider font-semibold">Ujian SAT (1-6)</span></div>
        <div class="nav-item" data-page="exam-sat"><i class="fas fa-laptop-code w-5 text-center"></i>Ujian SAT</div>

        </div>
    </nav>
</aside>

    <header class="sticky top-0 z-30 bg-dark/90 backdrop-blur border-b border-border px-4 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3"><button onclick="toggleSidebar()" class="text-muted hover:text-light"><i class="fas fa-bars"></i></button><h2 id="pageTitle" class="font-display font-bold text-light">Dashboard</h2></div>

    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// ================= FIREBASE & DATA =================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var storage = firebase.storage();

var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila'},{id:'mat',nama:'Matematika'},
    {id:'bin',nama:'Bahasa Indonesia'},{id:'sbd',nama:'Seni Budaya'},
    {id:'ipas',nama:'IPAS'},{id:'bsd',nama:'Bahasa Sunda'},
    {id:'bing',nama:'Bahasa Inggris'},{id:'pai',nama:'PAI'},{id:'pjok',nama:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMapelName(id){ var m=MAPEL_LIST.find(x=>x.id===id); return m?m.nama:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================= STATE GLOBAL =================
var currentUser = null;
var questions = [];
var questionsPAJ = [];
var students = [];
var unsubQ = null, unsubPAJ = null, unsubS = null;

// ================= UI HELPERS =================
function showToast(msg, type){
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    t.className = 'toast toast-'+(type||'success');
    t.innerHTML = '<i class="fas fa-info-circle"></i><span>'+msg+'</span>';
    c.appendChild(t);
    setTimeout(()=>t.remove(), 3000);
}
function closeModal(){ document.getElementById('modalOverlay').classList.add('hidden'); document.getElementById('modalBody').innerHTML=''; }
function openModal(html){ document.getElementById('modalOverlay').classList.remove('hidden'); document.getElementById('modalBody').innerHTML=html; }
function toggleSidebar(){ 
    var sb = document.getElementById('sidebar');
    sb.classList.toggle('mobile-open');
    document.getElementById('sidebarOverlay').classList.toggle('active', sb.classList.contains('mobile-open'));
}
function switchAuthTab(tab){
    document.getElementById('formLogin').classList.toggle('hidden', tab!=='login');
    document.getElementById('formRegister').classList.toggle('hidden', tab!=='register');
    document.getElementById('tabLogin').className = tab==='login' ? 'flex-1 pb-2 text-center text-sm font-bold text-kopAccent border-b-2 border-kopAccent' : 'flex-1 pb-2 text-center text-sm text-muted hover:text-light';
    document.getElementById('tabRegister').className = tab==='register' ? 'flex-1 pb-2 text-center text-sm font-bold text-kopAccent border-b-2 border-kopAccent' : 'flex-1 pb-2 text-center text-sm text-muted hover:text-light';
}

// ================= REGISTRASI LOGIC BARU =================
function handleJenisChange(){
    var jenis = document.getElementById('regJenis').value;
    var checkboxArea = document.getElementById('kelasCheckboxes');
    var autoArea = document.getElementById('kelasAutoText');
    
    // Reset tampilan
    if(jenis === 'PAI' || jenis === 'PJOK'){
        // Sembunyikan checkbox, tampilkan text otomatis
        checkboxArea.classList.add('hidden');
        autoArea.classList.remove('hidden');
        
        // Uncheck semua checkbox untuk keamanan data
        document.querySelectorAll('input[name="regKelas"]').forEach(cb => cb.checked = false);
    } else {
        // Tampilkan checkbox, sembunyikan text otomatis
        checkboxArea.classList.remove('hidden');
        autoArea.classList.add('hidden');

// ================= AUTH: REGISTER =================
function doRegister(){
    var npsn = document.getElementById('regNpsn').value.trim();
    var nip = document.getElementById('regNip').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    var jenis = document.getElementById('regJenis').value;
    var pass = document.getElementById('regPass').value;
    var conf = document.getElementById('regPassConfirm').value;
    var rombel = document.getElementById('regRombel').value;

    // Validasi Dasar
    if(!npsn || !nip || !nama || !jenis || !pass) return showToast('Lengkapi semua data','error');
    if(pass !== conf) return showToast('Password tidak cocok','error');
    if(!rombel) return showToast('Pilih Rombel','error');

    // Logika Penentuan Kelas
    var selectedKelas = [];
    if(jenis === 'PAI' || jenis === 'PJOK'){
        // Otomatis Kelas 1-6
        selectedKelas = ['Kelas 1', 'Kelas 2', 'Kelas 3', 'Kelas 4', 'Kelas 5', 'Kelas 6'];
    } else {
        // Ambil dari Checkbox (Guru Kelas)
        var checkedBoxes = document.querySelectorAll('input[name="regKelas"]:checked');
        if(checkedBoxes.length === 0) return showToast('Pilih minimal satu kelas','error');
        checkedBoxes.forEach(cb => selectedKelas.push(cb.value));
    }

    db.collection('teachers').where('nip','==',nip).get().then(snap=>{
        if(!snap.empty) return showToast('NIP sudah terdaftar','error');
        db.collection('teachers').add({
            npsn, nip, nama, jenis, kelas: selectedKelas, rombel, password: pass, role: 'teacher',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(()=>{
            showToast('Registrasi Berhasil!','success');
            switchAuthTab('login');
            // Reset Form
            document.getElementById('regPass').value=''; document.getElementById('regPassConfirm').value='';
            document.getElementById('regJenis').value='';
            document.querySelectorAll('input[name="regKelas"]').forEach(cb=>cb.checked=false);
            handleJenisChange(); // Reset UI
        });
    });
}

// ================= AUTH: LOGIN =================
function doLogin(){
    var nip = document.getElementById('loginNip').value.trim();
    var pass = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginError');
    if(!nip || !pass){ errEl.textContent='Isi NIP & Password'; errEl.classList.remove('hidden'); return; }

    // ADMIN HARDCODE
    if(nip === 'admin' && pass === 'admin123'){
        currentUser = { nip: 'admin', nama: 'Super Admin', role: 'admin', kelas: [], isAdmin: true };
        enterMainApp();
        return;
    }

    db.collection('teachers').where('nip','==',nip).where('password','==',pass).limit(1).get().then(snap=>{
        if(snap.empty){ errEl.textContent='Data salah'; errEl.classList.remove('hidden'); return; }
        var d = snap.docs[0].data();
        currentUser = Object.assign({id: snap.docs[0].id}, d);
        currentUser.isAdmin = false;
        enterMainApp();
    });
}

function enterMainApp(){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainPage').classList.remove('hidden');
    document.getElementById('userName').textContent = currentUser.nama;
    
    // Toggle Admin Menu
    document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !currentUser.isAdmin));

    initMainApp();
}

function doLogout(){
    currentUser = null;
    if(unsubQ) unsubQ(); if(unsubPAJ) unsubPAJ(); if(unsubS) unsubS();
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('loginPage').style.display='flex';
    document.getElementById('loginPass').value='';
}

// ================= MAIN INIT & NAVIGATION =================
function initMainApp(){
    // Load Questions SAT
    unsubQ = db.collection('questions').orderBy('createdAt','asc').onSnapshot(snap=>{
        questions = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        if(document.getElementById('dashboard')) renderDashboard();
    });
    // Load Questions PAJ
    unsubPAJ = db.collection('questions_paj').orderBy('createdAt','asc').onSnapshot(snap=>{
        questionsPAJ = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        if(document.getElementById('dashboard')) renderDashboard();
    });
    // Load Students
    unsubS = db.collection('students').orderBy('nama','asc').onSnapshot(snap=>{
        students = snap.docs.map(d=>Object.assign({id:d.id}, d.data()));
        if(document.getElementById('studentsListContainer')) renderStudentList();
    });
    navigateTo('dashboard');
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelector('.nav-item[data-page="'+page+'"]')?.classList.add('active');
    document.getElementById('pageTitle').textContent = page.replace('-',' ').toUpperCase();
    closeSidebar();
    var c = document.getElementById('pageContent');
    switch(page){
        case 'dashboard': renderDashboard(); break;
        case 'students': renderStudents(); break;
        case 'manage-users': renderManageUsers(); break;
        case 'exam-sat': renderExamSetup('sat'); break;
        case 'exam-paj': renderExamSetup('paj'); break;
        case 'results-sat': renderResults('sat'); break;
        case 'results-paj': renderResults('paj'); break;
        case 'print-docs': renderPrintDocs(); break;
        default: c.innerHTML='<p class="text-muted">Loading...</p>';
    }
}

document.getElementById('sidebarNav').addEventListener('click', e=>{
    var item = e.target.closest('.nav-item');
    if(item) navigateTo(item.dataset.page);
});

function saveStudent(){

function loadExamSettings(type){
    var mapel = document.getElementById('examMapel').value; var kelas = document.getElementById('examKelas').value; if(!mapel||!kelas) return;
    var id = type+'_'+mapel+'_'+kelas; db.collection('settings').doc(id).get().then(doc=>{
        if(doc.exists){ document.getElementById('examToken').value = doc.data().token||''; document.getElementById('examTime').value = doc.data().duration||60; }
        else{ document.getElementById('examToken').value=''; document.getElementById('examTime').value=60; }
        var list = students.filter(s=>s.kelas===kelas);

function saveExamSettings(type){
    var mapel = document.getElementById('examMapel').value; var kelas = document.getElementById('examKelas').value; var token = document.getElementById('examToken').value.trim(); var time = parseInt(document.getElementById('examTime').value)||60;

function doPrintSoal(){

    doc.open();
    doc.write('<!DOCTYPE html><html><head><style>');
    doc.write('@page{size:A4 portrait;margin:1.5cm 2cm 2cm 2cm}');
    doc.write('body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact}');

    doc.write('.kop-surat img{height:75px;width:auto}');
    doc.write('.ujian-title{text-align:center;margin-bottom:20px}');
    doc.write('.ujian-title h3{font-size:14pt;font-weight:bold;text-decoration:underline;text-transform:uppercase}');
    doc.write('.soal-item{margin-bottom:24px;page-break-inside:avoid;width:100%;display:block;overflow:hidden}');
    doc.write('.soal-num{float:left;font-weight:bold;font-size:12pt;width:35px}');
    doc.write('.soal-text{font-size:12pt;line-height:1.5;text-align:left;display:block;margin-left:35px}');
    doc.write('.opsi-wrapper{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;column-gap:24px;margin-left:35px}');
    doc.write('.opsi-row{display:flex;align-items:flex-start;gap:8px;font-size:12pt}');
    doc.write('.opsi-label{font-weight:bold;min-width:20px}');
    doc.write('.opsi-label::after{content:"."}');
    doc.write('.answer-lines{margin-top:8px;margin-left:35px;border:1px dashed #bbb;height:80px;background:#fafafa}');
    doc.write('.clearfix::after{content:"";display:table;clear:both}');
    doc.write('</style></head><body>');
    doc.write(sheet.innerHTML);
    doc.write('</body></html>');
    doc.close();
    setTimeout(function(){
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(function(){document.body.removeChild(iframe);},3000);
    },500);
}

function refreshPrintPreview(){
    var mapelEl = document.getElementById('pMapelPrint');
    var kelasEl = document.getElementById('pKelasPrint');
    var typeEl = document.getElementById('pTypePrint');
    if(!mapelEl || !kelasEl) return;
    
    var mapel = mapelEl.value;
    var kelas = kelasEl.value;
    var type = typeEl ? typeEl.value : 'sat';
    var container = document.getElementById('printPreviewContainer');
    
    if(!mapel || !kelas){ container.innerHTML='<p class="text-center text-muted py-20">Pilih Mapel & Kelas</p>'; return; }
    
    var globalTP = (document.getElementById('printTPGlobal').value || '').trim();
    var dataSource = type==='paj' ? questionsPAJ : questions;
    var data = dataSource.filter(q=>q.mapel===mapel && q.kelas===kelas);
    var pg = data.filter(q=>q.type==='pg');
    var uraian = data.filter(q=>q.type==='uraian');
    var logoUrl = 'https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';
    
    var html = '<div class="print-preview-wrap"><div class="print-preview-sheet"><div class="print-page">';
    html += '<div class="kop-surat"><div class="kop-surat-row"><img src="'+logoUrl+'" alt="Logo"><div class="kop-text"><h1>Pemerintah Kabupaten Majalengka</h1><h2>Korek Api Kecamatan Majalengka</h2></div></div></div>';
    
    var examTitle = type==='paj' ? 'Penilaian Akhir Jenjang (PAJ)' : 'Sumatif Akhir Tahun (SAT)';
    html += '<div class="ujian-title"><h3>'+examTitle+'</h3><p>'+getMapelName(mapel)+' — '+kelas+'</p></div>';

    if(globalTP){
        html += '<div style="margin-bottom:20px;padding:10px;border-left:4px solid #000;background:#f9f9f9"><strong>Tujuan Pembelajaran:</strong><br><i>'+escHtml(globalTP)+'</i></div>';
    }
    
    if(pg.length > 0){
        html += '<div style="font-weight:bold;margin-bottom:15px;border-bottom:2px solid #000;">I. Pilihan Ganda</div>';
        html += '<p style="font-style:italic;margin-bottom:12px;">Pilihlah satu jawaban yang paling tepat!</p>';
        pg.forEach(function(q, i){
            html += '<div class="soal-item clearfix">';
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+escHtml(q.text)+'</div>';
            if(q.image) html += '<div style="margin-left:35px"><img src="'+q.image+'" class="soal-img-print"></div>';
            html += '<div class="opsi-wrapper">';
            (q.options||[]).forEach(function(opt, oi){
                var letter = String.fromCharCode(97+oi);
                var optImg = (q.optionImages && q.optionImages[oi]) ? '<img src="'+q.optionImages[oi]+'" class="opsi-img-print">' : '';
                html += '<div class="opsi-row"><span class="opsi-label">'+letter+'</span><span>'+escHtml(opt)+'</span>'+optImg+'</div>';
            });
            html += '</div>';
            html += '</div>';
        });
    }
    
    if(uraian.length > 0){
        html += '<div style="font-weight:bold;margin-bottom:15px;margin-top:30px;border-bottom:2px solid #000;">II. Uraian</div>';
        html += '<p style="font-style:italic;margin-bottom:12px;">Jawablah pertanyaan berikut dengan jelas dan benar!</p>';
        uraian.forEach(function(q, i){
            html += '<div class="soal-item clearfix">';
            html += '<div class="soal-num">'+(i+1)+'.</div>';
            html += '<div class="soal-text">'+escHtml(q.text)+'</div>';
            if(q.image) html += '<div style="margin-left:35px"><img src="'+q.image+'" class="soal-img-print"></div>';
            html += '<div class="answer-lines"></div></div>';
        });
    }
    html += '</div></div></div>';
    container.innerHTML = html;
}
</script>
</body>
</html>
