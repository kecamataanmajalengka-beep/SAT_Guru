<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel Siswa - KOREK API Majalengka</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
tailwind.config={theme:{extend:{colors:{primary:'#6366f1',secondary:'#f472b6',accent:'#22d3ee',success:'#4ade80',warning:'#fbbf24',danger:'#f87171',dark:'#1e1b4b',card:'#312e81',light:'#f5f3ff'},fontFamily:{display:['Fredoka One','cursive'],body:['Nunito','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;overflow-x:hidden;font-family:'Nunito',sans-serif}
body{background:linear-gradient(135deg,#1e1b4b 0%,#312e81 50%,#4c1d95 100%);color:#f5f3ff;min-height:100vh;min-height:100dvh}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100vh) rotate(720deg);opacity:0}}
@keyframes heartbeat{0%,100%{transform:scale(1)}25%{transform:scale(1.1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,45%,55%,100%{transform:scaleY(1)}50%{transform:scaleY(0.1)}}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.7)}50%{box-shadow:0 0 0 12px rgba(248,113,113,0)}}
.float{animation:float 3s ease-in-out infinite}
.bounce{animation:bounce 2s ease-in-out infinite}
.wiggle{animation:wiggle 1s ease-in-out infinite}
.pulse{animation:pulse 2s ease-in-out infinite}
.pop{animation:pop 0.4s cubic-bezier(0.68,-0.55,0.265,1.55)}
.slide-up{animation:slideUp 0.5s ease-out forwards}
.fade-in{animation:fadeIn 0.3s ease-out}
.floating-shapes{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.shape{position:absolute;border-radius:50%;opacity:0.12}
.shape-1{width:300px;height:300px;background:linear-gradient(135deg,#6366f1,#a855f7);top:-100px;right:-100px;animation:float 8s ease-in-out infinite}
.shape-2{width:200px;height:200px;background:linear-gradient(135deg,#22d3ee,#06b6d4);bottom:10%;left:-50px;animation:float 10s ease-in-out infinite reverse}
.shape-3{width:150px;height:150px;background:linear-gradient(135deg,#f472b6,#ec4899);top:40%;right:-30px;animation:bounce 6s ease-in-out infinite}
.shape-4{width:100px;height:100px;background:linear-gradient(135deg,#4ade80,#22c55e);bottom:20%;right:10%;animation:wiggle 5s ease-in-out infinite}
.stars{position:fixed;inset:0;pointer-events:none;z-index:1}
.star{position:absolute;width:4px;height:4px;background:#fbbf24;border-radius:50%;animation:sparkle 2s ease-in-out infinite}
.star:nth-child(odd){animation-delay:0.5s}
.glass{background:rgba(49,46,129,0.75);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,0.3);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-weight:700;padding:13px 24px;border-radius:14px;border:none;cursor:pointer;font-size:15px;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.3s;box-shadow:0 8px 25px rgba(99,102,241,0.4);position:relative;overflow:hidden;width:100%}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent);opacity:0;transition:opacity 0.3s}
.btn-primary:hover::before{opacity:1}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(99,102,241,0.2);border:2px solid rgba(99,102,241,0.5);color:#f5f3ff;padding:11px 20px;border-radius:14px;cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;transition:all 0.3s;width:100%;text-align:center}
.btn-secondary:hover{background:rgba(99,102,241,0.3);border-color:#6366f1}
.input-field{background:rgba(30,27,75,0.8);border:2px solid rgba(99,102,241,0.3);color:#f5f3ff;padding:13px 16px;border-radius:12px;width:100%;font-size:15px;font-family:'Nunito',sans-serif;transition:all 0.3s}
.input-field:focus{outline:none;border-color:#6366f1;box-shadow:0 0 20px rgba(99,102,241,0.3)}
.input-field::placeholder{color:#a5b4fc}
.step-bar{display:flex;align-items:center;gap:0;margin-bottom:6px;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.step-bar::-webkit-scrollbar{display:none}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;transition:all 0.4s}
.step-dot.inactive{background:rgba(99,102,241,0.15);color:#6366f1}
.step-dot.active{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;box-shadow:0 0 18px rgba(99,102,241,0.5);animation:pulse 2s ease-in-out infinite}
.step-dot.done{background:linear-gradient(135deg,#4ade80,#22c55e);color:white}
.step-connector{width:16px;height:2px;background:rgba(99,102,241,0.2);flex-shrink:0;border-radius:1px;transition:background 0.4s}
.step-connector.done{background:linear-gradient(90deg,#4ade80,#22c55e)}
.step-label-row{display:flex;align-items:flex-start;gap:0;margin-bottom:16px;overflow-x:auto;padding:0 2px;scrollbar-width:none}
.step-label-row::-webkit-scrollbar{display:none}
.step-lbl{flex-shrink:0;text-align:center;font-size:8px;font-weight:700;color:#4c4678;transition:color 0.3s;text-transform:uppercase;letter-spacing:0.3px}
.step-lbl.active{color:#a5b4fc}
.step-lbl.done{color:#4ade80}
.step-lbl-spacer{width:16px;flex-shrink:0}
.mascot{width:72px;height:72px;margin:0 auto;position:relative}
.mascot-body{width:60px;height:60px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:50%;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);box-shadow:0 8px 24px rgba(251,191,36,0.4)}
.mascot-face{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);width:44px}
.mascot-eye{width:8px;height:11px;background:#1e1b4b;border-radius:50%;position:absolute;top:0;animation:blink 4s ease-in-out infinite}
.mascot-eye.left{left:7px}
.mascot-eye.right{right:7px}
.mascot-mouth{width:18px;height:9px;border-bottom:3px solid #1e1b4b;border-radius:0 0 18px 18px;position:absolute;top:16px;left:50%;transform:translateX(-50%)}
.mascot-cheek{width:10px;height:6px;background:#f472b6;opacity:0.6;border-radius:50%;position:absolute;top:10px}
.mascot-cheek.left{left:1px}
.mascot-cheek.right{right:1px}
.mascot.happy .mascot-body{animation:bounce 1s ease-in-out infinite}
.mascot.sad .mascot-mouth{border-radius:18px 18px 0 0;border-bottom:none;border-top:3px solid #1e1b4b}
.mascot.celebrate .mascot-body{animation:wiggle 0.5s ease-in-out infinite}
.select-card{padding:12px;border-radius:14px;cursor:pointer;transition:all 0.3s;border:2px solid rgba(99,102,241,0.2);background:rgba(49,46,129,0.4);text-align:center}
.select-card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,0.5);box-shadow:0 6px 16px rgba(99,102,241,0.2)}
.select-card:active{transform:scale(0.98)}
.select-card.selected{border-color:#4ade80;background:rgba(74,222,128,0.1);box-shadow:0 0 18px rgba(74,222,128,0.15)}
.mapel-card{padding:10px;border-radius:12px;cursor:pointer;transition:all 0.3s;border:2px solid rgba(99,102,241,0.2);background:rgba(49,46,129,0.4);display:flex;align-items:center;gap:8px}
.mapel-card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,0.4)}
.mapel-card:active{transform:scale(0.98)}
.mapel-card.selected{border-color:#4ade80;background:rgba(74,222,128,0.1)}
.mapel-card.selected .mapel-icon{animation:heartbeat 0.8s ease-in-out}
.mapel-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.token-input{letter-spacing:5px;font-size:20px;font-weight:800;text-align:center;font-family:'Fredoka One',cursive;padding:13px;text-transform:uppercase}
.npsn-input{letter-spacing:3px;font-size:18px;font-weight:800;text-align:center;font-family:'Fredoka One',cursive;padding:13px}
.question-card{background:rgba(49,46,129,0.5);border-radius:16px;border:2px solid rgba(99,102,241,0.2);padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.question-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,#6366f1,#a855f7);border-radius:4px 0 0 4px}
.question-number{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:7px;font-weight:800;font-size:12px;margin-right:6px}
.option-item{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all 0.2s;border:2px solid rgba(99,102,241,0.15);background:rgba(30,27,75,0.4)}
.option-item:hover{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.3)}
.option-item:active{transform:scale(0.99)}
.option-item.selected{background:rgba(74,222,128,0.1);border-color:#4ade80}
.option-item.selected .option-letter{background:linear-gradient(135deg,#4ade80,#22c55e);color:white}
.option-letter{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;background:rgba(99,102,241,0.3);flex-shrink:0;transition:all 0.3s}
.essay-input{background:rgba(30,27,75,0.6);border:2px solid rgba(99,102,241,0.2);color:#f5f3ff;padding:12px;border-radius:10px;width:100%;font-size:13px;font-family:'Nunito',sans-serif;resize:vertical;min-height:80px;transition:border-color 0.3s}
.essay-input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 12px rgba(99,102,241,0.2)}
.result-card{background:rgba(49,46,129,0.7);border-radius:20px;border:2px solid rgba(99,102,241,0.3);padding:20px;text-align:center}
.score-display{font-family:'Fredoka One',cursive;font-size:64px;line-height:1;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-display.pass{background:linear-gradient(135deg,#4ade80,#22c55e);-webkit-background-clip:text;background-clip:text}
.score-display.fail{background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;background-clip:text}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:100}
.confetti{position:absolute;width:10px;height:10px;animation:confetti 3s ease-out forwards}
.confetti:nth-child(odd){border-radius:50%}
.confetti:nth-child(3n){width:8px;height:16px;border-radius:4px}
.toast{position:fixed;top:12px;left:12px;right:12px;z-index:1000;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;animation:slideUp 0.3s ease;max-width:380px;margin:0 auto}
.toast-success{background:linear-gradient(135deg,#059669,#047857);border:2px solid #4ade80}
.toast-error{background:linear-gradient(135deg,#dc2626,#b91c1c);border:2px solid #f87171}
.toast-warning{background:linear-gradient(135deg,#d97706,#b45309);border:2px solid #fbbf24}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-primary{background:rgba(99,102,241,0.3);color:#a5b4fc}
.badge-success{background:rgba(74,222,128,0.3);color:#4ade80}
.badge-warning{background:rgba(251,191,36,0.3);color:#fbbf24}
.badge-danger{background:rgba(248,113,113,0.3);color:#f87171}
.badge-info{background:rgba(34,211,238,0.3);color:#22d3ee}
.info-box{padding:12px;border-radius:12px;display:flex;align-items:center;gap:10px}
.info-box.success{background:rgba(74,222,128,0.1);border:2px solid rgba(74,222,128,0.3)}
.info-box.warning{background:rgba(251,191,36,0.1);border:2px solid rgba(251,191,36,0.3)}
.info-box.info{background:rgba(99,102,241,0.1);border:2px solid rgba(99,102,241,0.3)}
.info-box.danger{background:rgba(248,113,113,0.1);border:2px solid rgba(248,113,113,0.3)}
.info-box-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-card{background:rgba(49,46,129,0.5);border-radius:12px;padding:12px;text-align:center;border:2px solid rgba(99,102,241,0.2)}
.stat-value{font-family:'Fredoka One',cursive;font-size:24px}
.stat-label{font-size:9px;color:#a5b4fc;margin-top:2px}
.dropdown{background:rgba(30,27,75,0.98);border:2px solid rgba(99,102,241,0.3);border-radius:12px;max-height:160px;overflow-y:auto;position:absolute;left:0;right:0;top:100%;margin-top:6px;z-index:20}
.dropdown-item{padding:10px 12px;border-bottom:1px solid rgba(99,102,241,0.1);cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.dropdown-item:last-child{border-bottom:none}
.dropdown-item:hover{background:rgba(99,102,241,0.2)}
.topbar{background:rgba(30,27,75,0.9);backdrop-filter:blur(15px);border-bottom:1px solid rgba(99,102,241,0.2);position:sticky;top:0;z-index:50;padding:10px 14px}
.timer-bar{background:rgba(30,27,75,0.95);backdrop-filter:blur(15px);border-bottom:2px solid rgba(99,102,241,0.3);padding:8px 14px;display:flex;align-items:center;justify-content:center;gap:10px;position:sticky;top:0;z-index:60}
.timer-display{font-family:'Fredoka One',cursive;font-size:24px;letter-spacing:2px}
.timer-display.safe{color:#4ade80}
.timer-display.warm{color:#fbbf24}
.timer-display.danger{color:#f87171;animation:urgentPulse 1s infinite}
.timer-label{font-size:10px;color:#a5b4fc;font-weight:600}
.timer-progress{height:4px;background:rgba(99,102,241,0.2);border-radius:2px;flex:1;overflow:hidden}
.timer-progress-fill{height:100%;border-radius:2px;transition:width 1s linear}
.lock-overlay{position:fixed;inset:0;z-index:9999;background:rgba(30,27,75,0.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px}
.lock-overlay.hidden{display:none}
.form-label{font-size:12px;color:#a5b4fc;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.form-label i{font-size:11px;color:#6366f1}
.input-status{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;transition:all 0.3s}
.input-status.loading{color:#fbbf24;animation:pulse 1s infinite}
.input-status.valid{color:#4ade80}
.input-status.invalid{color:#f87171}
.no-soal-card{background:rgba(49,46,129,0.5);border-radius:16px;border:2px dashed rgba(251,191,36,0.4);padding:20px;text-align:center;margin-bottom:12px}
.no-soal-icon{width:52px;height:52px;border-radius:50%;background:rgba(251,191,36,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(30,27,75,0.95);backdrop-filter:blur(15px);border-top:1px solid rgba(99,102,241,0.2);padding:8px 14px;z-index:50;display:flex}
.nav-jump{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;padding:4px 0;scrollbar-width:none}
.nav-jump::-webkit-scrollbar{display:none}
.nav-jump-btn{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:9px;cursor:pointer;flex-shrink:0;transition:all 0.2s;border:2px solid rgba(99,102,241,0.3);background:rgba(49,46,129,0.5);color:#a5b4fc}
.nav-jump-btn.answered{background:rgba(74,222,128,0.2);border-color:#4ade80;color:#4ade80}
.nav-jump-btn.current{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:#6366f1;color:white;box-shadow:0 0 10px rgba(99,102,241,0.4)}
.debug-box{background:rgba(251,191,36,0.1);border:1px dashed rgba(251,191,36,0.4);border-radius:10px;padding:10px;margin-bottom:12px;font-size:10px;color:#fbbf24;max-height:120px;overflow-y:auto;word-break:break-all}
@media(max-width:380px){.step-dot{width:24px;height:24px;font-size:9px}.step-connector{width:10px}.step-lbl{font-size:7px}.step-lbl-spacer{width:10px}.score-display{font-size:52px}.mascot{width:60px;height:60px}.mascot-body{width:50px;height:50px}.mascot-face{width:38px}}
</style>
</head>
<body>
<div class="floating-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div><div class="shape shape-4"></div></div>
<div class="stars" id="starsContainer"></div>
<div class="confetti-container" id="confettiContainer"></div>
<div id="toastContainer"></div>

<div id="lockOverlay" class="lock-overlay hidden">
  <div style="width:100px;height:100px;border-radius:50%;background:rgba(248,113,113,0.15);display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite"><i class="fas fa-lock" style="font-size:40px;color:#f87171"></i></div>
  <h2 style="font-family:'Fredoka One',cursive;font-size:22px;color:#f87171;text-align:center">UJIAN BERLANGSUNG</h2>
  <p style="color:#a5b4fc;font-size:13px;text-align:center;max-width:280px">Jangan keluar dari halaman ini.</p>
  <button onclick="cancelLock()" style="margin-top:8px;padding:11px 28px;border-radius:12px;background:rgba(248,113,113,0.2);border:2px solid #f87171;color:#f87171;font-weight:700;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif"><i class="fas fa-arrow-left" style="margin-right:5px"></i>Kembali ke Ujian</button>
</div>

<!-- ====== LOGIN ====== -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-3 relative z-10">
  <div class="glass p-4 w-full max-w-sm slide-up" style="max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch">
    <div class="mascot happy"><div class="mascot-body"><div class="mascot-face"><div class="mascot-eye left"></div><div class="mascot-eye right"></div><div class="mascot-mouth"></div><div class="mascot-cheek left"></div><div class="mascot-cheek right"></div></div></div></div>
    <div class="text-center mb-3"><h1 class="font-display text-lg text-light mb-0.5">Halo Teman</h1><p class="text-xs" style="color:#a5b4fc">Siap mengerjakan ujian hari ini?</p></div>
    <div class="step-bar" id="stepBar"></div>
    <div class="step-label-row" id="stepLabelRow"></div>

    <!-- STEP 1: NPSN -->
    <div id="step1Content">
      <div class="form-label"><i class="fas fa-school"></i>Ketik NPSN Sekolahmu</div>
      <div class="mb-2 relative"><div class="relative"><i class="fas fa-hashtag absolute left-3 top-1/2 -translate-y-1/2 text-primary" style="font-size:14px"></i><input type="text" id="npsnInput" class="input-field npsn-input" style="padding-left:36px;padding-right:40px" placeholder="Contoh: 20200001" maxlength="10" inputmode="numeric" oninput="onNpsnInput()" onkeydown="if(event.key==='Enter')goToStep2()"><span class="input-status" id="npsnStatus"></span></div></div>
      <div id="npsnResult" class="hidden mb-3"></div>
      <!-- DEBUG: hapus setelah fix -->
      <div id="debugBox1" class="debug-box hidden"></div>
      <button onclick="goToStep2()" id="btnStep1" class="btn-primary" disabled><span>Lanjut</span><i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- STEP 2: Jenis Ujian -->
    <div id="step2Content" class="hidden">
      <div class="form-label"><i class="fas fa-file-alt"></i>Pilih Jenis Ujian</div>
      <div id="examTypeContainer" class="space-y-2 mb-3"></div>
      <button onclick="goToStep3()" id="btnStep2" class="btn-primary" disabled><span>Lanjut</span><i class="fas fa-arrow-right"></i></button>
      <button onclick="backToStep(1)" class="btn-secondary mt-2"><i class="fas fa-arrow-left mr-1"></i>Kembali</button>
    </div>

    <!-- STEP 3: Kelas -->

/* ================================================================

var STEPS=[{id:1,lbl:'Sekolah'},{id:2,lbl:'Ujian'},{id:3,lbl:'Kelas'},{id:4,lbl:'Rombel'},{id:5,lbl:'Mapel'},{id:6,lbl:'Nama'},{id:7,lbl:'Token'}];

/* Data dari Firebase */
var foundGurus=[];   // dokumen guru_panel yang NPSN-nya cocok
var foundSiswa=[];   // dokumen siswa_panel untuk kelas+rombel yang dipilih

var timerInt=null,timeLeft=0,totalTime=0,isExamActive=false;
var userAns={},qData=[];

/* ================================================================
   UTILITAS
   ================================================================ */
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showT(m,t){
  t=t||'warning';
  var c=document.getElementById('toastContainer'),d=document.createElement('div');
  var cls=t==='success'?'success':t==='error'?'error':'warning';
  d.className='toast toast-'+cls;
  var ic=t==='success'?'check-circle':t==='error'?'times-circle':'exclamation-triangle';
  d.innerHTML='<i class="fas fa-'+ic+'"></i><span>'+m+'</span>';
  c.appendChild(d);
  setTimeout(function(){d.style.opacity='0';d.style.transform='translateY(-20px)';d.style.transition='all 0.3s';setTimeout(function(){if(d.parentNode)c.removeChild(d)},300)},3500);
}

/* ================================================================
   PARSING kelasRombel — format dari Guru:
   Key: "Kelas4_A", "Kelas 4_A", "Kelas6_B" (bergantung cara Guru simpan)
   
   CONTOH:
   Guru Kelas menyimpan: kelasRombel["Kelas4_A"] = true
   Guru PAI menyimpan: kelasRombel["Kelas 4_A"] = true  (ada spasi)
   
   Parse selalu ambil bagian SEBELUM underscore terakhir = kelasRaw
   Bagian SETELAH underscore terakhir = rombel
   ================================================================ */
function parseKey(k){
  var i=k.lastIndexOf('_');
  if(i===-1)return{kelasRaw:k,rombel:''};
  return{kelasRaw:k.substring(0,i),rombel:k.substring(i+1)};
}

/* Ekstrak angka dari kelasRaw: "Kelas4" → "4", "Kelas 4" → "4" */
function extractNum(kelasRaw){
  var m=kelasRaw.match(/\d+/);
  return m?m[0]:'';
}

/* ================================================================
   STEP BAR UI
   ================================================================ */
function initSteps(){
  var b=document.getElementById('stepBar'),l=document.getElementById('stepLabelRow');
  b.innerHTML='';l.innerHTML='';
  STEPS.forEach(function(s,i){
    var d=document.createElement('div');d.id='dot'+s.id;d.className='step-dot '+(s.id===1?'active':'inactive');d.innerText=s.id;b.appendChild(d);
    if(i<STEPS.length-1){var c=document.createElement('div');c.id='conn'+s.id;c.className='step-connector';b.appendChild(c);}
    var lb=document.createElement('div');lb.id='lbl'+s.id;lb.className='step-lbl '+(s.id===1?'active':'');lb.innerText=s.lbl;l.appendChild(lb);
    if(i<STEPS.length-1){var sp=document.createElement('div');sp.className='step-lbl-spacer';l.appendChild(sp);}
  });
  /* Bintang latar */
  for(var i=0;i<40;i++){
    var st=document.createElement('div');st.className='star';
    st.style.left=Math.random()*100+'%';st.style.top=Math.random()*100+'%';
    st.style.animationDelay=Math.random()*2+'s';
    document.getElementById('starsContainer').appendChild(st);
  }
}

function upUI(s){
  STEPS.forEach(function(st){
    var d=document.getElementById('dot'+st.id),c=document.getElementById('conn'+st.id),lb=document.getElementById('lbl'+st.id);
    d.className='step-dot '+(st.id<s?'done':(st.id===s?'active':'inactive'));
    d.innerHTML=st.id<s?'<i class="fas fa-check" style="font-size:9px"></i>':st.id;
    if(c)c.className='step-connector '+(st.id<s?'done':'');
    lb.className='step-lbl '+(st.id<s?'done':(st.id===s?'active':''));
  });
  for(var i=1;i<=7;i++)document.getElementById('step'+i+'Content').classList.toggle('hidden',i!==s);
  curStep=s;
}

function backToStep(s){upUI(s);}

/* ================================================================
   STEP 1: NPSN → cari guru_panel.where('npsn','==',npsn)
   Sekolah muncul dari field guru.sekolah
   ================================================================ */
var _nt=null;

function onNpsnInput(){
  var v=document.getElementById('npsnInput').value.trim();
  var st=document.getElementById('npsnStatus'),res=document.getElementById('npsnResult'),btn=document.getElementById('btnStep1');
  var dbg=document.getElementById('debugBox1');
  st.innerHTML='';res.className='hidden';btn.disabled=true;foundGurus=[];
  if(_nt)clearTimeout(_nt);
  if(v.length<8)return;
  st.className='input-status loading';st.innerHTML='<i class="fas fa-circle-notch fa-spin"></i>';
  dbg.classList.add('hidden');

  _nt=setTimeout(function(){
    db.collection('guru_panel').where('npsn','==',v).get().then(function(snap){
      if(!snap.empty){
        foundGurus=[];
        snap.forEach(function(doc){var d=doc.data();d._id=doc.id;foundGurus.push(d);});
        sel.npsn=v;
        sel.sekolah=foundGurus[0].sekolah||'';

        st.className='input-status valid';st.innerHTML='<i class="fas fa-check-circle"></i>';

        /* Hitung mapel aktif */
        var mc=0;foundGurus.forEach(function(g){var tm=g.tokenMapel||{};Object.keys(tm).forEach(function(k){if(tm[k])mc++;});});

        res.className='info-box success mt-2 fade-in';
        res.innerHTML='<div class="info-box-icon" style="background:rgba(74,222,128,0.15);color:#4ade80"><i class="fas fa-school"></i></div><div class="text-left"><p class="text-[10px] font-bold uppercase opacity-60">Sekolah Ditemukan</p><p class="text-xs font-black">'+esc(sel.sekolah)+'</p><p class="text-[9px] opacity-50 mt-0.5">'+foundGurus.length+' guru &bull; '+mc+' mapel aktif</p></div>';
        btn.disabled=false;
      }else{
        st.className='input-status invalid';st.innerHTML='<i class="fas fa-times-circle"></i>';
        res.className='info-box danger mt-2 fade-in';
        res.innerHTML='<div class="info-box-icon" style="background:rgba(248,113,113,0.15);color:#f87171"><i class="fas fa-times"></i></div><div class="text-left"><p class="text-xs font-bold" style="color:#f87171">NPSN tidak ditemukan</p></div>';
      }
    }).catch(function(e){
      st.className='input-status invalid';st.innerHTML='<i class="fas fa-times-circle"></i>';
      showT('Error: '+e.message,'error');
    });

/* ================================================================
   STEP 2: Jenis Ujian
   SAT = semua tokenMapel kecuali 'paj'
   PAJ = hanya jika ada token 'paj'
   ================================================================ */
function goToStep2(){
  var cont=document.getElementById('examTypeContainer');
  cont.innerHTML='<div class="text-center p-4 opacity-50"><i class="fas fa-circle-notch fa-spin mb-2"></i><p class="text-[10px] font-bold">MENGECEK...</p></div>';

  var hasSAT=false,hasPAJ=false;
  foundGurus.forEach(function(g){
    var tm=g.tokenMapel||{};
    Object.keys(tm).forEach(function(k){
      if(!tm[k])return; // token kosong, skip
      if(k==='paj')hasPAJ=true; else hasSAT=true;
    });
  });

  cont.innerHTML='';
  if(!hasSAT&&!hasPAJ){
    cont.innerHTML='<div class="no-soal-card"><div class="no-soal-icon"><i class="fas fa-calendar-times text-warning"></i></div><p class="text-xs font-bold text-warning">Belum Ada Ujian Aktif</p><p class="text-[9px] opacity-50 mt-1">Guru belum mengatur token ujian</p></div>';
    upUI(2);return;
  }
  if(hasSAT){
    var d=document.createElement('div');d.className='select-card';

    d.onclick=function(){sel.tipeUjian='SAT';document.querySelectorAll('#examTypeContainer .select-card').forEach(function(c){c.classList.remove('selected')});d.classList.add('selected');document.getElementById('btnStep2').disabled=false;};
    cont.appendChild(d);
  }
  if(hasPAJ){
    var d=document.createElement('div');d.className='select-card';
    d.innerHTML='<i class="fas fa-graduation-cap mb-1" style="font-size:18px;color:#fbbf24"></i><p class="text-xs font-black">PAJ</p><p class="text-[9px] opacity-50">Penilaian Akhir Jenjang (Kelas 6)</p>';
    d.onclick=function(){sel.tipeUjian='PAJ';document.querySelectorAll('#examTypeContainer .select-card').forEach(function(c){c.classList.remove('selected')});d.classList.add('selected');document.getElementById('btnStep2').disabled=false;};
    cont.appendChild(d);
  }
  upUI(2);
}

/* ================================================================
   STEP 3: Kelas — parse SEMUA kelasRombel dari semua guru
   Ambil kelasRaw unik, sort berdasarkan angka
   
   CONTOH data:
   Guru Kelas 4: kelasRombel = {"Kelas4_A": true}
   Guru PAI:     kelasRombel = {"Kelas 4_A": true, "Kelas 5_A": true}
   
   Keduanya menghasilkan kelas yang sama untuk siswa, tapi key berbeda.
   Kita grouping berdasarkan angka kelas, lalu simpan SEMUA variant key-nya.
   ================================================================ */
function goToStep3(){
  var grid=document.getElementById('kelasGrid');grid.innerHTML='';

  /* Kumpulkan semua kelasRombel keys dari semua guru */
  var kelasMap={}; // num -> [kelasRaw1, kelasRaw2, ...]
  foundGurus.forEach(function(g){
    var kr=g.kelasRombel||{};
    Object.keys(kr).forEach(function(k){
      if(!kr[k])return;
      var p=parseKey(k);
      var num=extractNum(p.kelasRaw);
      if(!num)return;
      if(!kelasMap[num])kelasMap[num]=[];
      /* Simpan semua variant key (dengan/space tanpa spasi) */
      if(kelasMap[num].indexOf(p.kelasRaw)===-1)kelasMap[num].push(p.kelasRaw);
    });
  });

  /* Sort berdasarkan angka */
  var nums=Object.keys(kelasMap).sort(function(a,b){return parseInt(a)-parseInt(b);});

  if(!nums.length){
    grid.innerHTML='<div class="no-soal-card col-span-3"><p class="text-xs font-bold text-warning">Tidak ada kelas</p></div>';
    upUI(3);return;
  }

  nums.forEach(function(num){
    var d=document.createElement('div');d.className='select-card';
    d.innerHTML='<span class="text-lg font-black">'+num+'</span><p class="text-[9px] font-bold opacity-50">Kelas '+num+'</p>';
    d.onclick=function(){
      sel.kelasNum=num;
      /* Simpan semua variant key untuk matching nanti */
      sel._kelasVariants=kelasMap[num];
      document.querySelectorAll('#kelasGrid .select-card').forEach(function(c){c.classList.remove('selected')});
      d.classList.add('selected');
      document.getElementById('btnStep3').disabled=false;
    };
    grid.appendChild(d);
  });
  upUI(3);
}

/* ================================================================
   STEP 4: Rombel — filter kelasRombel yang kelas-nya cocok
   (cek SEMUA variant key yang tersimpan di sel._kelasVariants)
   
   FIX UTAMA: Di sini kita mencocokkan dengan FLEKSIBEL.
   "Kelas4_A" dan "Kelas 4_A" keduanya dianggap kelas 4 rombel A.
   ================================================================ */
function goToStep4(){
  var grid=document.getElementById('rombelGrid');grid.innerHTML='';
  document.getElementById('rombelInfo').className='hidden';

  var rombelSet={};
  foundGurus.forEach(function(g){
    var kr=g.kelasRombel||{};
    Object.keys(kr).forEach(function(k){
      if(!kr[k])return;
      var p=parseKey(k);

      /* Cek: apakah kelasRaw ini cocok dengan kelas yang dipilih? */
      var num=extractNum(p.kelasRaw);
      if(num!==sel.kelasNum)return;

      /* Cocok! Tambahkan rombel */
      rombelSet[p.rombel]=true;
    });
  });

  var arr=Object.keys(rombelSet).sort();

  if(!arr.length){
    grid.innerHTML='<div class="no-soal-card col-span-3"><p class="text-xs font-bold text-warning">Tidak ada rombel untuk Kelas '+sel.kelasNum+'</p></div>';
    upUI(4);return;
  }

  arr.forEach(function(r){
    var d=document.createElement('div');d.className='select-card';
    d.innerHTML='<span class="text-lg font-black">'+r+'</span><p class="text-[9px] font-bold opacity-50">Rombel '+r+'</p>';
    d.onclick=function(){
      sel.rombel=r;
      document.querySelectorAll('#rombelGrid .select-card').forEach(function(c){c.classList.remove('selected')});
      d.classList.add('selected');
      document.getElementById('btnStep4').disabled=false;
      var info=document.getElementById('rombelInfo');info.className='info-box info mt-2 fade-in';
      info.innerHTML='<i class="fas fa-info-circle text-primary"></i><span class="text-[10px] font-bold">Kelas '+sel.kelasNum+' '+r+'</span>';
    };
    grid.appendChild(d);
  });
  upUI(4);
}

/* ================================================================
   STEP 5: Mapel — dari tokenMapel guru yang kelasRombel-nya cocok
   SAT: semua token kecuali 'paj'
   PAJ: hanya token 'paj'
   
   FIX UTAMA: Matching kelasRombel pakai ANGKA + ROMBEL,
   bukan exact string match. Jadi "Kelas4_A" dan "Kelas 4_A"
   keduanya dianggap cocok untuk kelas 4 rombel A.
   ================================================================ */
function goToStep5(){
  var cont=document.getElementById('mapelContainer');cont.innerHTML='';
  var isPAJ=sel.tipeUjian==='PAJ';
  var mapelFound=[];

  foundGurus.forEach(function(g){
    var kr=g.kelasRombel||{};

    /* Cek: apakah guru ini ampu kelas+rombel yang dipilih siswa? */
    var guruAmpu=false;
    Object.keys(kr).forEach(function(k){
      if(!kr[k])return;
      var p=parseKey(k);
      var num=extractNum(p.kelasRaw);
      if(num===sel.kelasNum && p.rombel===sel.rombel)guruAmpu=true;
    });
    if(!guruAmpu)return;

    var tm=g.tokenMapel||{};
    Object.keys(tm).forEach(function(mid){
      if(!tm[mid])return; // token kosong, skip
      if(isPAJ){
        if(mid==='paj')mapelFound.push({guruId:g._id,guruNama:g.nama,mapelId:mid,token:tm[mid],durasi:(g.durasiMapel||{})[mid]||0});
      }else{
        if(mid!=='paj')mapelFound.push({guruId:g._id,guruNama:g.nama,mapelId:mid,token:tm[mid],durasi:(g.durasiMapel||{})[mid]||0});
      }
    });
  });

  /* Dedup mapel */
  var seen={};
  mapelFound=mapelFound.filter(function(m){if(seen[m.mapelId])return false;seen[m.mapelId]=true;return true;});

  /* Sort urutan MAPEL_LIST */
  var ord={};MAPEL_LIST.forEach(function(m,i){ord[m.id]=i;});
  mapelFound.sort(function(a,b){return(ord[a.mapelId]!==undefined?ord[a.mapelId]:999)-(ord[b.mapelId]!==undefined?ord[b.mapelId]:999);});

  if(!mapelFound.length){
    cont.innerHTML='<div class="no-soal-card"><div class="no-soal-icon"><i class="fas fa-book-open text-warning"></i></div><p class="text-xs font-bold text-warning">Tidak Ada Mapel</p><p class="text-[9px] opacity-50 mt-1">Tidak ada guru dengan token aktif untuk Kelas '+sel.kelasNum+' '+sel.rombel+'</p></div>';
    upUI(5);return;
  }

  mapelFound.forEach(function(m){
    var mi=getMI(m.mapelId);
    var d=document.createElement('div');d.className='mapel-card pop';
    d.innerHTML='<div class="mapel-icon" style="background:'+mi.color+'20;color:'+mi.color+'"><i class="fas '+mi.icon+'"></i></div><div class="flex-1 text-left"><p class="text-xs font-black">'+mi.nama+'</p><p class="text-[9px] font-bold opacity-50 uppercase">'+esc(m.guruNama)+'</p>'+(m.durasi?'<p class="text-[8px] opacity-40 mt-0.5"><i class="fas fa-clock mr-1"></i>'+m.durasi+' menit</p>':'')+'</div>';
    d.onclick=function(){
      sel.mapelId=m.mapelId;sel.mapelInfo=mi;
      sel.guruId=m.guruId;sel.guruNama=m.guruNama;
      sel._token=m.token;sel._durasi=m.durasi;
      document.querySelectorAll('#mapelContainer .mapel-card').forEach(function(c){c.classList.remove('selected')});
      d.classList.add('selected');
      document.getElementById('btnStep5').disabled=false;
    };
    cont.appendChild(d);
  });
  upUI(5);
}

/* ================================================================
   STEP 6: Identitas — cari siswa_panel
   FIX UTAMA: guruKey di Panel Guru bisa "npsnKelas4A" atau "npsn_Kelas4A"
   Kita coba KEDUA format untuk backward compatibility.
   
   Format lama (sebelum fix): npsn + kelasRaw + rombel = "20200001Kelas4A"
   Format baru (setelah fix): npsn + "_" + kelasRaw + "_" + rombel = "20200001_Kelas4_A"
   
   Karena kita punya sel._kelasVariants (berisi semua variant key kelasRombel),
   kita bisa generate semua kemungkinan guruKey.
   ================================================================ */
function goToStep6(){
  var sum=document.getElementById('summaryInfo');
  var tl=sel.tipeUjian==='PAJ'?'Penilaian Akhir Jenjang':'Sumatif Akhir Tahun';
  sum.innerHTML='<div class="text-left w-full"><div class="flex justify-between items-center mb-1"><span class="badge badge-primary">'+esc(sel.mapelInfo.nama)+'</span><span class="text-[9px] font-bold opacity-60">Kelas '+sel.kelasNum+' '+sel.rombel+'</span></div><p class="text-[10px] font-bold opacity-80 truncate">'+esc(sel.sekolah)+'</p><p class="text-[9px] opacity-50">'+tl+' &bull; '+esc(sel.guruNama)+'</p></div>';

  document.getElementById('namaInput').value='';
  document.getElementById('btnStep6').disabled=true;
  foundSiswa=[];

  /* Bangun SEMUA kemungkinan guruKey */
  var guruKeys=[];
  var variants=sel._kelasVariants||[];
  variants.forEach(function(kelasRaw){
    /* Format tanpa underscore: npsn + kelasRaw + rombel */
    guruKeys.push(sel.npsn + kelasRaw + sel.rombel);
    /* Format dengan underscore: npsn + "_" + kelasRaw + "_" + rombel */
    guruKeys.push(sel.npsn + '_' + kelasRaw + '_' + sel.rombel);
    /* Format campuran: npsn + "_" + kelasRaw + rombel */
    guruKeys.push(sel.npsn + '_' + kelasRaw + sel.rombel);
  });

  /* DEBUG: tampilkan semua guruKey yang dicoba */
  var dbg=document.getElementById('debugBox6');
  dbg.classList.remove('hidden');
  dbg.innerHTML='<strong>DEBUG guruKey dicoba:</strong><br>'+guruKeys.join('<br>');

  /* Query: filter by guruId, lalu client-side filter guruKey */
  db.collection('siswa_panel').where('guruId','==',sel.guruId).orderBy('absen','asc').get().then(function(snap){
    foundSiswa=[];
    if(!snap.empty){
      snap.forEach(function(doc){
        var d=doc.data();d._id=doc.id;
        /* Cek apakah guruKey siswa ada di daftar guruKeys */
        if(guruKeys.indexOf(d.guruKey)!==-1){
          foundSiswa.push(d);
        }
      });
    }

    /* Update debug */
    dbg.innerHTML+='<br><br><strong>siswa ditemukan: '+foundSiswa.length+'</strong>';
    foundSiswa.forEach(function(s){
      dbg.innerHTML+='<br>- '+s.nama+' | guruKey: '+s.guruKey;
    });

    upUI(6);
  }).catch(function(e){
    showT('Gagal memuat siswa: '+e.message,'error');
    foundSiswa=[];upUI(6);
  });
}

function onNamaInput(){
  var v=document.getElementById('namaInput').value.trim();
  var drop=document.getElementById('siswaDropdown'),btn=document.getElementById('btnStep6');
  drop.innerHTML='';sel.siswaNama='';btn.disabled=true;
  if(v.length>=1){
    var mt=foundSiswa.filter(function(x){return x.nama.toLowerCase().indexOf(v.toLowerCase())!==-1;});
    if(mt.length>0){
      drop.classList.remove('hidden');
      mt.forEach(function(s){
        var d=document.createElement('div');d.className='dropdown-item';
        d.innerHTML='<i class="fas fa-user-circle text-primary opacity-50"></i><span class="text-xs font-bold">'+esc(s.nama)+'</span><span class="text-[9px] opacity-40 ml-auto">No.'+(s.absen||'-')+'</span>';
        d.onclick=function(){document.getElementById('namaInput').value=s.nama;sel.siswaNama=s.nama;drop.classList.add('hidden');btn.disabled=false;};
        drop.appendChild(d);
      });
    }else drop.classList.add('hidden');
  }else drop.classList.add('hidden');
}

function showSiswaDropdown(){
  var drop=document.getElementById('siswaDropdown');
  if(!drop.classList.contains('hidden')){drop.classList.add('hidden');return;}
  drop.innerHTML='';
  if(!foundSiswa.length){drop.innerHTML='<div class="dropdown-item"><span class="text-xs opacity-50">Belum ada siswa terdaftar</span></div>';drop.classList.remove('hidden');return;}
  foundSiswa.forEach(function(s){
    var d=document.createElement('div');d.className='dropdown-item';
    d.innerHTML='<i class="fas fa-user-circle text-primary opacity-50"></i><span class="text-xs font-bold">'+esc(s.nama)+'</span><span class="text-[9px] opacity-40 ml-auto">No.'+(s.absen||'-')+'</span>';
    d.onclick=function(){document.getElementById('namaInput').value=s.nama;sel.siswaNama=s.nama;drop.classList.add('hidden');document.getElementById('btnStep6').disabled=false;};
    drop.appendChild(d);
  });
  drop.classList.remove('hidden');
}

/* ================================================================
   STEP 7: Token
   ================================================================ */
function goToStep7(){
  var inf=document.getElementById('tokenInfo');
  var tl=sel.tipeUjian==='PAJ'?'Penilaian Akhir Jenjang':'Sumatif Akhir Tahun';
  inf.innerHTML='<div class="text-left w-full"><p class="text-[9px] font-black uppercase tracking-widest opacity-50 mb-1">Konfirmasi</p><p class="text-xs font-black text-primary mb-0.5">'+esc(sel.siswaNama)+'</p><p class="text-[10px] font-bold opacity-70">'+esc(sel.sekolah)+'</p><p class="text-[9px] opacity-50 mt-0.5">'+tl+' &bull; '+esc(sel.mapelInfo.nama)+' &bull; Kelas '+sel.kelasNum+' '+sel.rombel+'</p></div>';
  document.getElementById('tokenInput').value='';
  document.getElementById('btnStep7').disabled=true;
  upUI(7);
}

function onTokenInput(){document.getElementById('btnStep7').disabled=document.getElementById('tokenInput').value.length<4;}

/* ================================================================
   MULAI UJIAN — ambil soal dari questions (SAT) / questions_paj (PAJ)
   ================================================================ */
function startExam(){
  var tok=document.getElementById('tokenInput').value.trim().toUpperCase();
  var st=document.getElementById('tokenStatus'),btn=document.getElementById('btnStep7');

  if(tok!==sel._token.toUpperCase()){
    st.className='info-box danger mt-2 fade-in';st.classList.remove('hidden');
    st.innerHTML='<i class="fas fa-times-circle"></i><span class="text-xs font-bold">Token Salah! Cek lagi sama guru.</span>';
    return;
  }
  st.className='info-box success mt-2 fade-in';st.classList.remove('hidden');
  st.innerHTML='<i class="fas fa-check-circle"></i><span class="text-xs font-bold">Token Benar! Memuat soal...</span>';
  btn.disabled=true;

  var isPAJ=sel.mapelId==='paj';
  var colRef=isPAJ?db.collection('questions_paj'):db.collection('questions');

  colRef.orderBy('createdAt','asc').get().then(function(snap){
    var allQ=[];
    snap.forEach(function(doc){var d=doc.data();d._id=doc.id;allQ.push(d);});

    var filtered=[];
    if(isPAJ){
      /* PAJ: filter mapel yang diampu guru */
      var g0=null;
      for(var i=0;i<foundGurus.length;i++){if(foundGurus[i]._id===sel.guruId){g0=foundGurus[i];break;}}
      var allowed=[];
      if(g0&&g0.isGuruKelas){
        MAPEL_LIST.forEach(function(m){if(m.id!=='pai'&&m.id!=='pjok')allowed.push(m.id);});
      }else if(g0&&g0.guruMapelId){
        allowed.push(g0.guruMapelId);
      }
      filtered=allQ.filter(function(q){return q.type&&allowed.indexOf(q.mapel)!==-1;});
    }else{
      /* SAT: filter mapel + kelas */
      /* Coba semua variant kelasRaw untuk matching */
      var variants=sel._kelasVariants||[];
      filtered=allQ.filter(function(q){
        if(q.mapel!==sel.mapelId)return false;
        /* Cek apakah q.kelas cocok dengan salah satu variant */
        for(var v=0;v<variants.length;v++){
          if(q.kelas===variants[v])return true;
          /* Juga cek tanpa spasi */
          if(q.kelas&&q.kelas.replace(/\s+/g,' ')===variants[v].replace(/\s+/g,' '))return true;
        }
        return false;
      });
    }

    if(!filtered.length){
      st.className='info-box warning mt-2';st.classList.remove('hidden');
      st.innerHTML='<i class="fas fa-exclamation-triangle"></i><span class="text-xs font-bold">Belum ada soal untuk ujian ini</span>';
      btn.disabled=false;return;
    }

    /* Acak soal */
    for(var i=filtered.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=filtered[i];filtered[i]=filtered[j];filtered[j]=t;}

    /* Acak opsi PG */
    filtered.forEach(function(q){
      if(q.type==='pg'&&q.options&&q.options.length){
        var ct=q.answer,idx=[];
        for(var k=0;k<q.options.length;k++)idx.push(k);
        for(var k=idx.length-1;k>0;k--){var jj=Math.floor(Math.random()*(k+1));var t=idx[k];idx[k]=idx[jj];idx[jj]=t;}
        var no=[],nc=-1;
        idx.forEach(function(oi,ii){no.push(q.options[oi]);if(q.options[oi]===ct)nc=ii;});
        q.options=no;q.answer=String.fromCharCode(65+nc);
      }
    });

    qData=filtered;userAns={};
    /* Sembunyikan debug sebelum ujian */
    document.getElementById('debugBox1').classList.add('hidden');
    document.getElementById('debugBox6').classList.add('hidden');
    renderExam();
  }).catch(function(e){
    st.className='info-box danger mt-2';st.classList.remove('hidden');
    st.innerHTML='<i class="fas fa-times-circle"></i><span class="text-xs font-bold">Gagal: '+e.message+'</span>';
    btn.disabled=false;
  });
}

/* ================================================================
   RENDER UJIAN
   ================================================================ */
function renderExam(){
  isExamActive=true;
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('examPage').classList.remove('hidden');
  document.getElementById('topNama').innerText=sel.siswaNama;
  document.getElementById('topSekolah').innerText=sel.sekolah;
  document.getElementById('topMapel').innerText=sel.mapelInfo.singkat;

  var cont=document.getElementById('examContent');cont.innerHTML='';
  var pgC=0,urC=0;
  qData.forEach(function(q){if(q.type==='uraian')urC++;else pgC++;});

  if(urC>0){
    var hd=document.createElement('div');hd.className='info-box info mb-3 fade-in';
    hd.innerHTML='<i class="fas fa-info-circle text-primary"></i><div class="text-left"><p class="text-xs font-bold">'+qData.length+' soal: '+pgC+' PG + '+urC+' Uraian</p></div>';
    cont.appendChild(hd);
  }

  qData.forEach(function(q,i){
    var card=document.createElement('div');card.className='question-card slide-up';card.style.animationDelay=(i*0.04)+'s';card.id='qcard'+i;
    var isUr=q.type==='uraian';
    var tb=isUr?'<span class="badge badge-info" style="margin-left:6px">Uraian</span>':'<span class="badge badge-primary" style="margin-left:6px">PG</span>';
    var sb=q.score?'<span class="badge badge-warning" style="margin-left:4px">'+q.score+' pt</span>':'';
    var mb=(sel.mapelId==='paj')?'<span class="badge" style="background:'+getMI(q.mapel).color+'20;color:'+getMI(q.mapel).color+';margin-left:4px">'+getMI(q.mapel).singkat+'</span>':'';
    var h='<div class="flex items-start gap-2 mb-3"><div class="question-number">'+(i+1)+'</div><div class="flex-1"><div class="flex flex-wrap items-center gap-1 mb-1">'+tb+sb+mb+'</div><p class="text-sm font-bold leading-relaxed text-light">'+esc(q.text)+'</p></div></div>';
    if(q.image)h+='<div class="mb-3 rounded-lg overflow-hidden border border-white/10 ml-9"><img src="'+q.image+'" class="w-full object-contain" style="max-height:200px;background:#1e1b4b" onerror="this.parentElement.style.display=\'none\'"></div>';
    if(isUr){
      h+='<div class="ml-9"><textarea class="essay-input" id="ans_'+i+'" placeholder="Ketik jawabanmu..." oninput="userAns['+i+']=this.value"></textarea></div>';
    }else{
      var ol=['A','B','C','D','E'];
      h+='<div class="space-y-2 ml-9">';
      if(q.options){
        q.options.forEach(function(op,oi){
          var l=ol[oi]||String.fromCharCode(65+oi);
          h+='<div class="option-item" id="opt_'+i+'_'+l+'" onclick="selAns('+i+',\''+l+'\')"><div class="option-letter">'+l+'</div><div class="text-xs font-semibold flex-1">'+esc(op)+'</div></div>';
        });
      }
      h+='</div>';
    }
    card.innerHTML=h;cont.appendChild(card);
  });

  var fb=document.createElement('div');fb.style.paddingTop='8px';
  fb.innerHTML='<button class="btn-primary" onclick="confirmFin()"><i class="fas fa-paper-plane"></i><span>Selesai & Kirim Jawaban</span></button>';
  cont.appendChild(fb);

  renderNav();
  window.scrollTo(0,0);
  if(sel._durasi>0)startTimer(sel._durasi*60);
}

function renderNav(){
  var nav=document.getElementById('navBottom'),j=document.getElementById('navJump');
  j.innerHTML='';nav.style.display='flex';
  qData.forEach(function(q,i){
    var b=document.createElement('div');b.className='nav-jump-btn';b.id='nj'+i;b.innerText=i+1;
    b.onclick=function(){var el=document.getElementById('qcard'+i);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});hlNav(i);};
    j.appendChild(b);
  });
}

function hlNav(idx){
  qData.forEach(function(q,i){
    var b=document.getElementById('nj'+i);if(!b)return;
    b.className='nav-jump-btn';
    if(i===idx)b.classList.add('current');
    else if(userAns[i]!==undefined&&userAns[i]!=='')b.classList.add('answered');
  });
}

function selAns(qi,l){
  userAns[qi]=l;
  var ol=['A','B','C','D','E'];
  ol.forEach(function(ll){var el=document.getElementById('opt_'+qi+'_'+ll);if(!el)return;if(ll===l)el.classList.add('selected');else el.classList.remove('selected');});
  hlNav(qi);
}

/* ================================================================
   TIMER
   ================================================================ */
function startTimer(sec){
  totalTime=sec;timeLeft=sec;
  var bc=document.getElementById('timerBarContainer');bc.classList.remove('hidden');
  bc.innerHTML='<div class="timer-bar"><div class="timer-label"><i class="fas fa-clock mr-1"></i>SISA WAKTU</div><div class="timer-progress"><div id="tFill" class="timer-progress-fill" style="width:100%;background:#4ade80"></div></div><div id="tTxt" class="timer-display safe">00:00:00</div></div>';
  timerInt=setInterval(function(){
    timeLeft--;if(timeLeft<=0){clearInterval(timerInt);finExam();return;}
    var h=Math.floor(timeLeft/3600),m=Math.floor((timeLeft%3600)/60),s=timeLeft%60;
    var ts=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
    var tx=document.getElementById('tTxt'),fl=document.getElementById('tFill');
    if(tx)tx.innerText=ts;
    var p=(timeLeft/totalTime)*100;
    if(fl){fl.style.width=p+'%';if(p<=20){fl.style.background='#f87171';if(tx)tx.className='timer-display danger';}else if(p<=50){fl.style.background='#fbbf24';if(tx)tx.className='timer-display warm';}else{fl.style.background='#4ade80';if(tx)tx.className='timer-display safe';}}
  },1000);
}

/* ================================================================
   SELESAI — simpan ke nilai_panel
   ================================================================ */
function confirmFin(){
  var a=0;qData.forEach(function(q,i){if(userAns[i]!==undefined&&userAns[i]!=='')a++;});
  if(!confirm('Jawab '+a+'/'+qData.length+'. Yakin selesai?'))return;
  finExam();
}

function finExam(){
  isExamActive=false;if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timerBarContainer').classList.add('hidden');
  document.getElementById('navBottom').style.display='none';
  var cont=document.getElementById('examContent');
  cont.innerHTML='<div class="flex flex-col items-center justify-center p-10"><i class="fas fa-circle-notch fa-spin text-4xl text-primary mb-4"></i><p class="font-bold">MENGIRIM...</p></div>';

  var pgB=0,pgT=0,urT=0,pgS=0;
  qData.forEach(function(q,i){
    if(q.type==='uraian')urT+=(q.score||1);
    else{pgT+=(q.score||1);if(userAns[i]===q.answer){pgB++;pgS+=(q.score||1);}}
  });

  var na;
  if(pgT>0&&urT>0)na=Math.round((pgS/pgT*40)+(0/urT*60));
  else if(pgT>0)na=Math.round(pgS/pgT*100);
  else na=0;

  /* kelas untuk disimpan: gunakan format standar "Kelas X" */
  var kelasSimpan='Kelas '+sel.kelasNum;

  var doc={
    guruId:sel.guruId,npsn:sel.npsn,sekolah:sel.sekolah,
    kelas:kelasSimpan,rombel:sel.rombel,mapel:sel.mapelId,
    siswaNama:sel.siswaNama,jawaban:userAns,
    pgSkor:pgS,pgMax:pgT,urSkor:0,urMax:urT,
    nilaiAkhir:na,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('nilai_panel').add(doc).then(function(){showRes(na,pgB,pgT,urT);}).catch(function(e){showT('Gagal: '+e.message,'error');showRes(na,pgB,pgT,urT);});
}

function showRes(na,pgB,pgT,urT){
  var cont=document.getElementById('examContent');cont.innerHTML='';
  document.getElementById('examTopbar').classList.add('hidden');
  var l=na>=70,cls=l?'pass':'fail',msg=l?'Hebat!':'Jangan menyerah!';
  if(urT>0)msg+=' Jawaban uraian akan dikoreksi guru.';
  var en='';
  if(urT>0)en='<div class="info-box warning mb-4"><div class="info-box-icon" style="background:rgba(251,191,36,0.15);color:#fbbf24"><i class="fas fa-pen"></i></div><div class="text-left"><p class="text-xs font-bold text-warning">Uraian</p><p class="text-[10px] opacity-70">Akan dikoreksi guru</p></div></div>';
  var cols=urT>0?'3':'2';
  var h='<div class="result-card pop"><div class="mascot '+(l?'celebrate':'sad')+' mb-4"><div class="mascot-body"><div class="mascot-face"><div class="mascot-eye left"></div><div class="mascot-eye right"></div><div class="mascot-mouth"></div></div></div></div><h2 class="font-display text-xl mb-1">Ujian Selesai</h2><p class="text-xs opacity-70 mb-4">Terima kasih!</p><div class="score-display '+cls+'">'+na+'</div><p class="text-[10px] font-black uppercase tracking-widest mt-1 mb-4" style="color:'+(l?'#4ade80':'#f87171')+'">'+(l?'TUNTAS':'BELUM TUNTAS')+'</p>'+en+'<div class="grid grid-cols-'+cols+' gap-3 mb-4"><div class="stat-card"><div class="stat-value" style="color:#4ade80">'+pgB+'/'+pgT+'</div><div class="stat-label">PG BENAR</div></div>'+(urT>0?'<div class="stat-card"><div class="stat-value" style="color:#22d3ee">0/'+urT+'</div><div class="stat-label">ESSAY</div></div>':'')+'<div class="stat-card"><div class="stat-value" style="color:#fbbf24">'+(pgT+urT)+'</div><div class="stat-label">TOTAL</div></div></div><div class="info-box info mb-6"><p class="text-xs italic font-medium">"'+msg+'"</p></div><button onclick="location.reload()" class="btn-primary"><span>Kembali</span><i class="fas fa-home"></i></button></div>';
  cont.innerHTML=h;
  if(l)mkConf();
}

function mkConf(){
  var c=document.getElementById('confettiContainer'),cs=['#6366f1','#f472b6','#22d3ee','#4ade80','#fbbf24','#f87171'];
  for(var i=0;i<80;i++){
    var d=document.createElement('div');d.className='confetti';
    d.style.left=Math.random()*100+'%';d.style.top='100%';
    d.style.backgroundColor=cs[Math.floor(Math.random()*cs.length)];
    d.style.animationDelay=Math.random()*2+'s';
    c.appendChild(d);
  }
}

/* Lock overlay */
window.addEventListener('blur',function(){if(isExamActive)document.getElementById('lockOverlay').classList.remove('hidden');});
window.addEventListener('focus',function(){if(isExamActive)document.getElementById('lockOverlay').classList.add('hidden');});
function cancelLock(){document.getElementById('lockOverlay').classList.add('hidden');}

/* Scroll tracking untuk nav jump highlight */
window.addEventListener('scroll',function(){
  if(!isExamActive||!qData.length)return;
  var mid=window.innerHeight/2,cl=0,cd=Infinity;
  qData.forEach(function(q,i){
    var el=document.getElementById('qcard'+i);if(!el)return;
    var r=el.getBoundingClientRect();var d=Math.abs(r.top+r.height/2-mid);
    if(d<cd){cd=d;cl=i;}
  });
  hlNav(cl);
},{passive:true});

/* ================================================================
   INIT
   ================================================================ */
window.onload=function(){initSteps();};
