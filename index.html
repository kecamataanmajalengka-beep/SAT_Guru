<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Ujian Sekolah - Panel Guru</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>
tailwind.config={
    theme:{
        extend:{
            colors:{
                kop:'#1a2744',
                kopAccent:'#c9a84c',
                dark:'#0f1923',
                card:'#182538',
                cardHover:'#1f3350',
                border:'#2a3f5f',
                muted:'#7a8ba5',
                light:'#e8ecf1',
                success:'#22c55e',
                danger:'#ef4444',
                warning:'#f59e0b',
                info:'#06b6d4'
            },
            fontFamily:{
                display:['Playfair Display','serif'],
                body:['Source Sans 3','sans-serif']
            }
        }
    }
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}

/* Login Layout */
.login-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1923 0%,#1a2744 100%);position:relative;overflow:hidden}
.login-bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4}
.blob-1{width:400px;height:400px;background:#c9a84c;top:-100px;left:-100px}
.blob-2{width:300px;height:300px;background:#06b6d4;bottom:-50px;right:-50px}
.login-card{background:rgba(24,37,56,0.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);padding:2.5rem;border-radius:1.5rem;width:100%;max-w-md;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);position:relative;z-index:10}

/* Main Layout */
.sidebar{width:260px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s ease;overflow-y:auto}
.main-content{margin-left:260px;transition:margin-left .3s ease}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:35;display:none}
.sidebar-overlay.active{display:block}

/* Nav Items */
.nav-header{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#4b5563;font-weight:700;margin:16px 20px 8px 20px}
.nav-item{padding:11px 20px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:12px;font-size:14px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,0.3);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,0.08);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-item.paj-item { border-left-color: #ef4444; color: #ef4444; font-weight: 600; }
.nav-item.paj-item:hover { background: rgba(239, 68, 68, 0.1); color: #f87171; }

/* Buttons & Inputs */
.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:10px 24px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(201,168,76,0.3)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px;display:inline-flex;align-items:center;justify-content:center}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.btn-danger:hover{background:#ef4444;color:white}
.btn-link{background:transparent;color:#9ca3af;padding:0;text-decoration:underline;cursor:pointer;font-size:12px}
.btn-link:hover{color:#e5e7eb}

.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:10px 14px;border-radius:8px;width:100%;font-size:14px;transition:border-color .2s}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,0.15)}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:20px}
.loading-spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#c9a84c;animation:spin 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:10px;font-size:14px;font-weight:600;animation:slideIn .3s ease;max-width:400px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast-success{background:#166534;color:white;border:1px solid #22c55e}
.toast-error{background:#7f1d1d;color:white;border:1px solid #ef4444}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Print Styles */
@media print {
    @page { size: A4 portrait; margin: 1.5cm 2cm 2cm 2cm; }
    body { background: white !important; color: black !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-family: 'Times New Roman', Times, serif !important; font-size: 12pt; line-height: 1.4; }
    #sidebar, #mainArea > header, .sidebar-overlay, .no-print, #toastContainer, .login-container, .card { display: none !important; }
    #mainArea { margin: 0 !important; padding: 0 !important; width: 100% !important; background: white !important; height: auto !important; overflow: visible !important; }
    #pageContent { padding: 0 !important; margin: 0 !important; width: 100% !important; background: white !important; color: black !important; overflow: visible !important; }
    .print-preview-wrap { display: none !important; }
    .print-only { display: block !important; }
    
    .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; }
    .kop-text h1 { font-family: 'Times New Roman', serif; font-size: 16pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .kop-text h2 { font-family: 'Times New Roman', serif; font-size: 18pt; font-weight: bold; text-transform: uppercase; margin: 0; }
    .kop-sub { font-size: 10pt; font-style: normal; }
    
    .section-heading { font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
    .soal-item { margin-bottom: 24px; page-break-inside: avoid; }
    .soal-num { float: left; font-weight: bold; width: 35px; }
    .soal-text { margin-left: 35px; display: block; }
    
    .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-left: 35px; }
    .opsi-row { display: flex; align-items: flex-start; gap: 5px; font-size: 12pt; }
    .opsi-label { font-weight: bold; min-width: 20px; }
    .opsi-label::after { content: "."; }
    
    .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #bbb; height: 80px; background-color: #fafafa; }
    .clearfix::after { content: ""; display: table; clear: both; }

    .login-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .login-card-item { border: 2px solid #000; padding: 15px; text-align: center; page-break-inside: avoid; }
    .lc-header { font-weight: bold; font-size: 14pt; margin-bottom: 10px; border-bottom: 2px solid #000; padding-bottom: 5px; font-family: 'Times New Roman', serif; }
    .lc-body { font-size: 12pt; margin-bottom: 5px; font-family: 'Times New Roman', serif; text-align: left; }
    .lc-token { font-size: 18pt; font-weight: bold; letter-spacing: 2px; margin: 10px 0; background: #eee; padding: 8px; border: 1px solid #000; font-family: 'Courier New', monospace; }
}

/* Print Preview */
.print-preview-wrap { background: #e5e7eb; padding: 40px; border-radius: 8px; display: flex; justify-content: center; overflow-x: auto; margin-top: 20px; }
.print-preview-sheet { background: white; color: black; width: 210mm; min-height: 297mm; padding: 1.5cm 2cm 2cm 2cm; box-shadow: 0 4px 20px rgba(0,0,0,0.2); font-family: 'Times New Roman', serif; font-size: 12pt; line-height: 1.4; }
.print-preview-sheet .kop-surat { text-align: center; padding-bottom: 12px; margin-bottom: 24px; border-bottom: 3px double #000; }
.print-preview-sheet .section-heading { font-weight: bold; font-size: 12pt; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 15px; margin-top: 10px; text-align: left; }
.print-preview-sheet .soal-item { margin-bottom: 24px; page-break-inside: avoid; }
.print-preview-sheet .soal-num { float: left; font-weight: bold; width: 35px; }
.print-preview-sheet .soal-text { margin-left: 35px; display: block; }
.print-preview-sheet .opsi-wrapper { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-left: 35px; }
.print-preview-sheet .opsi-row { display: flex; align-items: flex-start; gap: 5px; font-size: 12pt; }
.print-preview-sheet .opsi-label { font-weight: bold; min-width: 20px; }
.print-preview-sheet .opsi-label::after { content: '.'; }
.print-preview-sheet .answer-lines { margin-top: 8px; margin-left: 35px; border: 1px dashed #ccc; height: 80px; background-color: #fafafa; }
.print-preview-sheet .login-card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
.print-preview-sheet .login-card-item { border: 2px solid #000; padding: 20px; border-radius: 8px; text-align: center; background: white; color: black; margin-bottom: 0; }
.print-preview-sheet .lc-header { font-weight: bold; font-size: 16pt; margin-bottom: 15px; border-bottom: 3px double #000; padding-bottom: 10px; font-family: 'Times New Roman', serif; }
.print-preview-sheet .lc-body { font-size: 14pt; margin: 8px 0; font-family: 'Times New Roman', serif; text-align: left; }
.print-preview-sheet .lc-token { font-size: 20pt; font-weight: bold; letter-spacing: 3px; margin: 15px 0; padding: 10px; border: 2px dashed #000; font-family: 'Courier New', monospace; }

/* Mobile */
@media(max-width:1023px){
    .sidebar{transform:translateX(-260px)}
    .sidebar.mobile-open{transform:translateX(0)}
    .main-content{margin-left:0!important}
}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- =========================
     LOGIN & REGISTRASI PAGE
     ========================= -->
<div id="loginPage" class="login-container">
    <div class="login-bg-blob blob-1"></div>
    <div class="login-bg-blob blob-2"></div>
    
    <div class="login-card fade-in">
        <div class="text-center mb-6">
            <div class="w-16 h-16 mx-auto mb-3 rounded-full bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center text-kop text-2xl shadow-lg">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1 class="font-display text-2xl font-bold text-light">Panel Guru</h1>
            <p class="text-muted text-sm">Sistem Ujian Sekolah</p>
        </div>

        <!-- Tab Navigasi -->
        <div class="flex mb-6 bg-dark/50 p-1 rounded-lg">
            <button onclick="switchAuthTab('login')" id="tabLogin" class="flex-1 py-2 text-sm font-bold rounded-md transition-all bg-kopAccent text-kop">Login</button>
            <button onclick="switchAuthTab('register')" id="tabRegister" class="flex-1 py-2 text-sm font-bold rounded-md transition-all text-muted hover:text-light">Registrasi</button>
        </div>

        <!-- Form Login -->
        <div id="formLogin" class="space-y-4">
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">NPSN Sekolah</label>
                <input type="text" id="loginNpsn" class="input-field" placeholder="Masukkan NPSN" onkeyup="checkSchoolName()">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Nama Sekolah</label>
                <input type="text" id="loginSchoolName" class="input-field" value="" disabled placeholder="Menunggu NPSN..." style="background:#1a2744; opacity:0.7">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">NIP / NIK</label>
                <input type="text" id="loginNip" class="input-field" placeholder="Masukkan NIP / NIK">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Password</label>
                <input type="password" id="loginPass" class="input-field" placeholder="Masukkan Password">
            </div>
            <button onclick="doLogin()" class="btn-primary w-full mt-2">Masuk</button>
            <div class="text-center mt-3">
                <button onclick="openResetModal()" class="btn-link">Lupa Password?</button>
            </div>
        </div>

        <!-- Form Registrasi -->
        <div id="formRegister" class="hidden space-y-3">
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">NPSN Sekolah</label>
                <input type="text" id="regNpsn" class="input-field" placeholder="Contoh: 202xxxxx">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Nama Sekolah</label>
                <input type="text" id="regSchool" class="input-field" placeholder="Nama Lengkap Sekolah">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Nama Lengkap</label>
                <input type="text" id="regNama" class="input-field" placeholder="Nama Lengkap & Gelar">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">NIP / NIK</label>
                <input type="text" id="regNip" class="input-field" placeholder="Nomor Induk Pegawai">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Jenis Guru</label>
                <select id="regRole" class="input-field" onchange="toggleRegFields()">
                    <option value="kelas">Guru Kelas (Wali Kelas)</option>
                    <option value="pai">Guru PAI</option>
                    <option value="pjok">Guru PJOK</option>
                </select>
            </div>
            
            <!-- Dinamis: Kelas untuk Guru Kelas -->
            <div id="regKelasWrapper">
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Pilih Kelas Ampu</label>
                <select id="regKelas" class="input-field">
                    <option value="Kelas 1">Kelas 1</option>
                    <option value="Kelas 2">Kelas 2</option>
                    <option value="Kelas 3">Kelas 3</option>
                    <option value="Kelas 4">Kelas 4</option>
                    <option value="Kelas 5">Kelas 5</option>
                    <option value="Kelas 6">Kelas 6</option>
                </select>
            </div>

            <!-- Dinamis: Mapel untuk Guru Kelas -->
            <div id="regMapelWrapper">
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Mapel Diampu (Kecuali PAI/PJOK)</label>
                <select id="regMapel" class="input-field">
                    <!-- Diisi via JS -->
                </select>
            </div>

            <!-- Wajib: Rombel -->
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Pilih Rombel</label>
                <select id="regRombel" class="input-field">
                    <option value="A">Rombel A</option>
                    <option value="B">Rombel B</option>
                    <option value="C">Rombel C</option>
                </select>
            </div>

            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Password</label>
                <input type="password" id="regPass" class="input-field" placeholder="Buat Password Baru">
            </div>
            <button onclick="doRegister()" class="btn-primary w-full mt-2">Daftar Akun</button>
        </div>
    </div>
</div>

<!-- =========================
     MODAL RESET PASSWORD
     ========================= -->
<div id="modalReset" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 class="font-display text-lg font-bold text-light mb-4 text-center">Reset Password</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">NIP / NIK Terdaftar</label>
                <input type="text" id="resetNip" class="input-field" placeholder="Masukkan NIP / NIK Anda">
            </div>
            <div>
                <label class="text-xs text-muted font-bold uppercase mb-1 block">Password Baru</label>
                <input type="password" id="resetPass" class="input-field" placeholder="Masukkan Password Baru">
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="closeModal()" class="btn-secondary flex-1">Batal</button>
                <button onclick="doResetPassword()" class="btn-primary flex-1">Reset</button>
            </div>
        </div>
    </div>
</div>

<!-- =========================
     MAIN APP (HIDDEN UNTIL LOGIN)
     ========================= -->
<div id="mainApp" class="hidden">
<aside id="sidebar" class="sidebar">
    <div class="p-5 border-b border-border">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-chalkboard-teacher text-kop text-lg"></i></div>
            <div>
                <h2 class="font-display text-kopAccent font-bold text-sm leading-tight">PANEL GURU</h2>
                <p id="sidebarInfo" class="text-muted text-xs truncate w-32">Loading...</p>
            </div>
        </div>
    </div>
    <nav class="py-4" id="sidebarNav">
        <!-- MENU DINAMIS DIBUAT OLEH JS SESUAI HAK AKSES -->
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="doLogout()" class="btn-secondary w-full text-xs py-2" type="button"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/80 backdrop-blur-xl border-b border-border px-4 md:px-6 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-muted hover:text-light transition-colors" type="button"><i class="fas fa-bars text-lg"></i></button>
            <h2 id="pageTitle" class="font-display text-base md:text-lg font-bold text-light">Dashboard</h2>
        </div>
        <div class="flex items-center gap-3"><span id="syncStatus" class="text-xs text-kopAccent"><i class="fas fa-wifi mr-1"></i>Online</span></div>
    </header>
    <div class="p-4 md:p-6" id="pageContent"></div>
</div>
</div>

<script>
// ================================================================
// CONFIG & DATA
// ================================================================
var firebaseConfig = {
    apiKey: "AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",
    authDomain: "pembuatan-soal.firebaseapp.com",
    projectId: "pembuatan-soal",
    storageBucket: "pembuatan-soal.firebasestorage.app",
    messagingSenderId: "56200686194",
    appId: "1:56200686194:web:eb2de00c9d152d87bcf0eb"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var MAPEL_LIST = [
    {id:'ppkn',nama:'Pendidikan Pancasila',singkat:'PPKn'},
    {id:'mat',nama:'Matematika',singkat:'Mat'},
    {id:'bin',nama:'Bahasa Indonesia',singkat:'B.Indo'},
    {id:'sbd',nama:'Seni Budaya',singkat:'Seni'},
    {id:'ipas',nama:'IPAS',singkat:'IPAS'},
    {id:'bsd',nama:'Bahasa Sunda',singkat:'B.Sunda'},
    {id:'bing',nama:'Bahasa Inggris',singkat:'B.Inggris'},
    {id:'pai',nama:'PAI',singkat:'PAI'},
    {id:'pjok',nama:'PJOK',singkat:'PJOK'}
];
var KELAS_LIST = ['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];

function getMapelName(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.nama:id; }
function getMapelSingkat(id){ var m=MAPEL_LIST.find(function(x){return x.id===id;}); return m?m.singkat:id; }
function escHtml(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ================================================================
// STATE & AUTH
// ================================================================
var currentUser = null; // { nip, nama, role, kelas, mapel, rombel, npsn, sekolah }
var questions = [];
var pajQuestions = []; 
var students = []; 
var examTokens = []; 
var results = []; 
var usersCache = []; // Cache data user untuk cek login cepat

var unsubQ = null, unsubPAJ = null, unsubSiswa = null, unsubToken = null, unsubResult = null, unsubGuru = null;

// ================================================================
// MODAL UTILS
// ================================================================
function openResetModal(){
    document.getElementById('modalReset').classList.remove('hidden');
}
function closeModal(){
    document.getElementById('modalReset').classList.add('hidden');
}

// ================================================================
// UTILS
// ================================================================
function showToast(msg, type){
    type = type || 'success';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    var icon = type==='success'?'check-circle':type==='error'?'times-circle':'info-circle';
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas fa-' + icon + ' flex-shrink-0"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3500);
}

function switchAuthTab(tab){
    document.getElementById('formLogin').classList.add('hidden');
    document.getElementById('formRegister').classList.add('hidden');
    
    document.getElementById('tabLogin').className = 'flex-1 py-2 text-sm font-bold rounded-md transition-all text-muted hover:text-light';
    document.getElementById('tabRegister').className = 'flex-1 py-2 text-sm font-bold rounded-md transition-all text-muted hover:text-light';
    
    if(tab==='login'){
        document.getElementById('formLogin').classList.remove('hidden');
        document.getElementById('tabLogin').className = 'flex-1 py-2 text-sm font-bold rounded-md transition-all bg-kopAccent text-kop';
        // Reset field sekolah saat pindah tab

// ================================================================
// FITUR CEK NAMA SEKOLAH SAAT LOGIN
// ================================================================
function checkSchoolName(){
    var npsn = document.getElementById('loginNpsn').value.trim();
    var schoolInput = document.getElementById('loginSchoolName');
    
    if(npsn.length === 0){
        schoolInput.value = "";
        schoolInput.style.color = "#e8ecf1";
        schoolInput.disabled = true;
        schoolInput.placeholder = "Menunggu NPSN...";
        return;
    }

    // Cari user dengan NPSN tersebut di cache lokal (usersCache)
    var userFound = usersCache.find(function(u){ return u.npsn === npsn; });
    
    if(userFound){
        // Jika ditemukan, tampilkan nama sekolah
        schoolInput.value = userFound.sekolah || userFound.nama_sekolah; // Support backward compatible field
        schoolInput.style.color = "#c9a84c"; // Warna emas (Sudah Terdaftar)
    } else {
        // Jika tidak ditemukan, tampilkan status belum terdaftar
        schoolInput.value = "BELUM TERDAFTAR";
        schoolInput.style.color = "#ef4444"; // Warna merah
    }
}

// ================================================================
// AUTH LOGIC
// ================================================================
function doRegister(){
    var npsn = document.getElementById('regNpsn').value.trim();
    var sekolah = document.getElementById('regSchool').value.trim();
    var nama = document.getElementById('regNama').value.trim();
    var nip = document.getElementById('regNip').value.trim();
    var role = document.getElementById('regRole').value;
    var rombel = document.getElementById('regRombel').value;
    var pass = document.getElementById('regPass').value;

    // Validasi: Tidak validasi NPSN, wajib isi sekolah
    if(!npsn || !sekolah || !nama || !nip || !rombel || !pass){ showToast('Lengkapi semua data!','error'); return; }

    var data = {
        nip: nip,
        nama: nama,
        npsn: npsn,
        sekolah: sekolah, // Menyimpan nama sekolah
        role: role, 
        rombel: rombel,
        password: pass,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if(role === 'kelas'){
        var kelas = document.getElementById('regKelas').value;
        var mapel = document.getElementById('regMapel').value;
        if(!kelas || !mapel){ showToast('Guru Kelas wajib pilih kelas dan mapel!','error'); return; }
        data.kelas = kelas;
        data.mapel = mapel;
    } else {
        data.mapel = role; 
        data.kelas = 'ALL'; 
    }

    db.collection('users_guru').doc(nip).set(data).then(function(){
        showToast('Registrasi Berhasil! Silakan Login.');
        switchAuthTab('login');
        document.getElementById('loginNip').value = nip;
        // Refresh cache user agar cek login langsung update
        usersCache.push(data); 
    }).catch(function(e){
        showToast('Gagal: '+(e.message||'NIP sudah terdaftar'),'error');
    });
}

function doLogin(){
    var npsn = document.getElementById('loginNpsn').value.trim();
    var nip = document.getElementById('loginNip').value.trim();
    var pass = document.getElementById('loginPass').value.trim();
    
    if(!nip || !pass){ showToast('Isi NIP dan Password','error'); return; }

    // Validasi NPSN: Jika user ketik NPSN, kita cek apakah ada user dengan NPSN tersebut
    // Jika field sekolah sudah tertulis "BELUM TERDAFTAR" (merah), berarti NPSN belum pernah dipakai registrasi
    var schoolInputVal = document.getElementById('loginSchoolName').value;
    if(schoolInputVal === "BELUM TERDAFTAR"){
        showToast('NPSN ini belum terdaftar di sistem. Silakan Registrasi terlebih dahulu.','error');
        return;
    }

    // Lanjut cek NIP & Password
    db.collection('users_guru').doc(nip).get().then(function(doc){
        if(!doc.exists){ showToast('NIP tidak ditemukan','error'); return; }
        var data = doc.data();
        // Opsional: Validasi NPSN di sisi server juga untuk keamanan ekstra
        // if(data.npsn !== npsn) { showToast('NPSN tidak sesuai dengan akun','error'); return; }
        
        if(data.password !== pass){ showToast('Password Salah','error'); return; }
        
        // Login Sukses
        currentUser = data;
        enterMainApp();
    }).catch(function(){ showToast('Error Login','error'); });
}

function doResetPassword(){
    var nip = document.getElementById('resetNip').value.trim();
    var pass = document.getElementById('resetPass').value.trim();
    if(!nip || !pass){ showToast('Lengkapi data','error'); return; }
    
    db.collection('users_guru').doc(nip).update({password: pass}).then(function(){
        showToast('Password berhasil direset. Silakan login.');
        closeModal();
    }).catch(function(){ showToast('NIP tidak ditemukan','error'); });
}

function doLogout(){
    currentUser = null;
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
    if(unsubQ) unsubQ();
    if(unsubPAJ) unsubPAJ();
    if(unsubSiswa) unsubSiswa();
    if(unsubToken) unsubToken();
    if(unsubResult) unsubResult();
    if(unsubGuru) unsubGuru();
}

function enterMainApp(){
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    
    document.getElementById('sidebarInfo').textContent = currentUser.nama + ' ('+currentUser.role.toUpperCase()+')';

    generateMenu();
    initFirebaseListeners();
    navigateTo('dashboard');
}

function initFirebaseListeners(){
    // Listener untuk cache user (Login Page)
    unsubGuru = db.collection('users_guru').onSnapshot(function(snap){
        usersCache = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        // Panggil ulang fungsi cek sekolah jika user sedang ngetik di form login
        var npsn = document.getElementById('loginNpsn')?.value;
        if(npsn && document.getElementById('loginNpsn').offsetParent !== null) {
            checkSchoolName();
        }
    });

    // Listener Soal
    var qRef = db.collection('questions');
    if(currentUser.role === 'kelas'){
        qRef = qRef.where('mapel','==',currentUser.mapel).where('kelas','==',currentUser.kelas);
    } else {
        qRef = qRef.where('mapel','==',currentUser.mapel); 
    }
    
    unsubQ = qRef.orderBy('createdAt','asc').onSnapshot(function(snap){
        questions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubPAJ = db.collection('questions_paj').orderBy('createdAt','asc').onSnapshot(function(snap){
        pajQuestions = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubSiswa = db.collection('students').orderBy('nama','asc').onSnapshot(function(snap){
        students = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubToken = db.collection('exam_tokens').onSnapshot(function(snap){
        examTokens = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });

    unsubResult = db.collection('exam_results').onSnapshot(function(snap){
        results = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        refreshCurrentView();
    });
}

function refreshCurrentView(){
    var activePage = document.querySelector('.nav-item.active')?.dataset.page;
    if(!activePage) return;
    var c = document.getElementById('pageContent');
    switch(activePage){
        case 'dashboard': renderDashboard(c); break;
        case 'data-siswa': renderDataSiswa(c); break;
        case 'bank-soal': renderBankSoal(c); break;
        case 'token': renderToken(c, false); break;
        case 'token-paj': renderToken(c, true); break;
        case 'koreksi': renderKoreksi(c, false); break;
        case 'koreksi-paj': renderKoreksi(c, true); break;
        case 'print': renderPrint(c, false); break;
        case 'kisi': renderKisi(c); break;
    }
}

function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
    var t = document.querySelector('.nav-item[data-page="'+page+'"]');
    if(t) t.classList.add('active');
    
    var titles = {dashboard:'Dashboard','data-siswa':'Data Siswa','bank-soal':'Bank Soal','token':'Token Ujian','token-paj':'Token PAJ','koreksi':'Koreksi & Nilai','koreksi-paj':'Nilai PAJ','print':'Cetak Naskah','kisi':'Kisi-Kisi'};
    document.getElementById('pageTitle').textContent = titles[page] || page;
    refreshCurrentView();
}

function renderSiswaTable(){

    }

function addSiswa(){
    var nama = document.getElementById('addNama').value.trim();
    var nisn = document.getElementById('addNisn').value.trim();
    var kelas = document.getElementById('addKelas').value;
    var rombel = document.getElementById('addRombel').value;

function delSiswa(id){ if(confirm('Hapus siswa?')) db.collection('students').doc(id).delete().then(()=>showToast('Terhapus')).catch(); }

function makeKelasOpt(def){

    KELAS_LIST.forEach(function(k){ h += '<option value="'+k+'"'+(k===def?' selected':'')+'>'+k+'</option>'; });

// (Fungsi Token, Koreksi, Print, Kisi sama seperti sebelumnya, saya singkat di sini agar kode tidak terlalu panjang)
// Kode lengkapnya sudah ada di blok utama di atas.

// Logic Token & Koreksi tetap sama...
function renderToken(c, isPAJ){
    var title = isPAJ ? 'Token PAJ' : 'Token Ujian';
    if(isPAJ){
        var allowed = false;
        if(currentUser.role === 'kelas' && currentUser.kelas === 'Kelas 6') allowed = true;
        if(currentUser.role === 'pai' || currentUser.role === 'pjok') allowed = true;
        if(!allowed){ c.innerHTML='<div class="text-center p-10 text-muted">Akses PAJ hanya untuk pengajar Kelas 6.</div>'; return; }
    }
    c.innerHTML = '<div class="fade-in card">' +
        '<h3 class="font-display text-lg font-bold text-light mb-4">'+title+'</h3>' +
        '<div class="grid md:grid-cols-4 gap-4 mb-6 bg-dark/30 p-4 rounded">' +
            '<div><label class="text-xs text-muted">Mapel</label><input type="text" class="input-field" value="'+getMapelName(isPAJ?'pai':currentUser.mapel)+'" disabled></div>' +
            '<div><label class="text-xs text-muted">Kelas</label><input type="text" class="input-field" value="'+(isPAJ?'Kelas 6':currentUser.kelas)+'" disabled></div>' +
            '<div><label class="text-xs text-muted">Durasi (Menit)</label><input type="number" id="tokDurasi" class="input-field" value="60"></div>' +
            '<div class="flex items-end"><button onclick="genToken('+isPAJ+')" class="btn-primary w-full">Buat Token</button></div>' +
        '</div>' +
        '<div id="tokenList" class="space-y-2"></div></div>';
    renderTokenList(isPAJ);
}
function renderTokenList(isPAJ){
    var list = examTokens.filter(t=>t.isPAJ===isPAJ && t.mapel===(isPAJ?'pai':currentUser.mapel) && t.kelas===(isPAJ?'Kelas 6':currentUser.kelas));
    list = list.filter(t=>t.rombel === currentUser.rombel);
    var container = document.getElementById('tokenList');
    if(!list.length){ container.innerHTML='<p class="text-center text-muted">Belum ada token.</p>'; return; }
    container.innerHTML = list.map(t=>'<div class="flex justify-between items-center bg-dark/30 p-3 rounded border border-border"><div><span class="font-mono font-bold text-lg tracking-widest text-kopAccent">'+t.token+'</span></div><button onclick="delToken(\''+t.id+'\')" class="text-danger hover:text-white"><i class="fas fa-trash"></i></button></div>').join('');
}
function genToken(isPAJ){
    var durasi = document.getElementById('tokDurasi').value;
    var token = Math.floor(100000 + Math.random() * 900000).toString();
    var data = {
        token: token, mapel: isPAJ ? 'pai' : currentUser.mapel, kelas: isPAJ ? 'Kelas 6' : currentUser.kelas, durasi: parseInt(durasi), isPAJ: isPAJ, rombel: currentUser.rombel, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    db.collection('exam_tokens').add(data).then(function(){ showToast('Token: '+token); }).catch();
}
function delToken(id){ if(confirm('Hapus token?')) db.collection('exam_tokens').doc(id).delete().then(()=>showToast('Terhapus')).catch(); }

function renderKoreksi(c, isPAJ){
    if(isPAJ){
        var allowed = false;
        if(currentUser.role === 'kelas' && currentUser.kelas === 'Kelas 6') allowed = true;
        if(currentUser.role === 'pai' || currentUser.role === 'pjok') allowed = true;
        if(!allowed){ c.innerHTML='<div class="text-center p-10 text-muted">Akses PAJ hanya untuk pengajar Kelas 6.</div>'; return; }
    }
    c.innerHTML = '<div class="fade-in grid md:grid-cols-2 gap-6">' +
        '<div class="card h-fit"><h3 class="font-bold text-kopAccent mb-4">Aksi Cetak</h3>' +
            '<button onclick="printLoginCards('+isPAJ+')" class="btn-secondary w-full mb-2"><i class="fas fa-id-card mr-2"></i>Kartu Login</button>' +
            '<button onclick="printNilai('+isPAJ+')" class="btn-primary w-full"><i class="fas fa-print mr-2"></i>Laporan Nilai</button>' +
        '</div>' +
        '<div class="card h-fit"><h3 class="font-bold text-kopAccent mb-4">Status Siswa</h3><div id="korSiswaList" class="space-y-2 max-h-[400px] overflow-y-auto text-sm"></div></div>' +
    '</div>';
    loadKorData(isPAJ);
}
function loadKorData(isPAJ){
    var container = document.getElementById('korSiswaList');
    var mapelFilter = isPAJ ? 'pai' : currentUser.mapel;
    var kelasFilter = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelasFilter && s.rombel===currentUser.rombel);
    var qList = isPAJ ? pajQuestions : questions; 
    var maxScore = qList.reduce((a,b)=>a+(b.score||0),0);
    if(!stList.length){ container.innerHTML='<p class="text-muted">Tidak ada siswa</p>'; return; }
    container.innerHTML = stList.map(function(s){
        var r = results.find(x=>x.siswaId===s.id && x.mapel===mapelFilter && x.isPAJ===isPAJ);
        var status = r ? '<span class="text-success font-bold">Selesai ('+r.score+'/'+maxScore+')</span>' : '<span class="text-muted">Belum Ujian</span>';
        return '<div class="flex justify-between items-center p-2 bg-dark/30 rounded"><span>'+s.nama+'</span><span>'+status+'</span></div>';
    }).join('');
}
function printLoginCards(isPAJ){
    var mapel = isPAJ ? 'pai' : currentUser.mapel;
    var kelas = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelas && s.rombel===currentUser.rombel);
    var tokens = examTokens.filter(t=>t.mapel===mapel && t.kelas===kelas && t.isPAJ===isPAJ && t.rombel===currentUser.rombel);
    var tokenStr = tokens.length ? tokens[0].token : 'N/A';
    var html = '<div class="print-only login-card-grid">';
    stList.forEach(function(s){
        html += '<div class="login-card-item">' +
            '<div class="lc-header">KARTU PESERTA</div>' +
            '<div class="lc-body"><strong>Nama:</strong> '+s.nama+'</div>' +
            '<div class="lc-body"><strong>NISN:</strong> '+s.nisn+'</div>' +
            '<div class="lc-body"><strong>Mapel:</strong> '+getMapelName(mapel)+'</div>' +
            '<div class="lc-body"><strong>Kelas:</strong> '+kelas+'</div>' +
            '<div class="lc-token">TOKEN: '+tokenStr+'</div>' +
            '<svg id="barcode-'+s.nisn+'"></svg>' +
        '</div>';
    });
    html += '</div>';
    var w = window.open('','','width=1000,height=800');
    w.document.write('<html><head><title>Kartu Login</title><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script><style>@page{margin:0.5cm}body{font-family:sans-serif}</style></head><body onload="window.print();window.close();">');
    w.document.write(html);
    stList.forEach(function(s){ try { w.JsBarcode("#barcode-"+s.nisn, s.nisn); } catch(e){} });
    w.document.write('</body></html>');
    w.document.close();
}
function printNilai(isPAJ){
    var mapel = isPAJ ? 'pai' : currentUser.mapel;
    var kelas = isPAJ ? 'Kelas 6' : currentUser.kelas;
    var stList = students.filter(s=>s.kelas===kelas && s.rombel===currentUser.rombel);
    var resList = results.filter(r=>r.mapel===mapel && r.kelas===kelas && r.isPAJ===isPAJ);
    var html = '<div class="print-only" style="font-family:Times New Roman; padding:20px;">' +
        '<h2 style="text-align:center;text-decoration:underline;">LAPORAN HASIL UJIAN</h2>' +
        '<p style="text-align:center;">'+getMapelName(mapel)+' - '+kelas+'</p><br>' +
        '<table style="width:100%;border-collapse:collapse" class="nilai-table"><thead><tr><th style="border:1px solid #000;padding:5px">No</th><th style="border:1px solid #000;padding:5px">Nama</th><th style="border:1px solid #000;padding:5px">Nilai</th><th style="border:1px solid #000;padding:5px">Ket</th></tr></thead><tbody>';
    stList.forEach(function(s,i){
        var r = resList.find(x=>x.siswaId===s.id);
        var score = r ? r.score : 0;
        var ket = score >= 70 ? '<span class="nilai-pass">TUNTAS</span>' : '<span class="nilai-fail">REMEDIAL</span>';
        html += '<tr><td style="text-align:center;border:1px solid #000;padding:5px">'+(i+1)+'</td><td style="border:1px solid #000;padding:5px">'+s.nama+'</td><td style="text-align:center;font-weight:bold;border:1px solid #000;padding:5px">'+score+'</td><td style="text-align:center;border:1px solid #000;padding:5px">'+ket+'</td></tr>';
    });
    html += '</tbody></table></div>';
    var w = window.open('','','width=1000,height=800');
    w.document.write('<html><head><title>Laporan</title><style>@page{margin:1cm}body{font-family:sans-serif} table{width:100%;border-collapse:collapse} th,td{border:1px solid #000;padding:5px}</style></head><body onload="window.print();window.close();">');
    w.document.write(html);
    w.document.write('</body></html>');
    w.document.close();
}
function renderPrint(c, isPAJ){
    var title = isPAJ ? 'Cetak Soal PAJ' : 'Cetak Soal Ujian';
    if(isPAJ){
        var allowed = false;
        if(currentUser.role === 'kelas' && currentUser.kelas === 'Kelas 6') allowed = true;
        if(currentUser.role === 'pai' || currentUser.role === 'pjok') allowed = true;
        if(!allowed){ c.innerHTML='<div class="text-center p-10 text-muted">Akses PAJ hanya untuk pengajar Kelas 6.</div>'; return; }
    }
    c.innerHTML = '<div class="fade-in no-print">' +
        '<div class="card mb-6">' +
            '<h3 class="font-display text-lg font-bold text-light mb-4"><i class="fas fa-print mr-2 text-kopAccent"></i>'+title+'</h3>' +
            '<div class="flex gap-4 mb-4">' +
                '<button onclick="doPrintSoal('+isPAJ+')" class="btn-primary"><i class="fas fa-print"></i> Cetak / PDF</button>' +
            '</div>' +
            '<div class="mb-2"><label class="text-xs text-muted">Tujuan Pembelajaran (Opsional)</label><textarea id="prTP" class="input-field" rows="2" placeholder="Masukkan TP umum..."></textarea></div>' +
        '</div>' +
        '<div id="printPreviewContainer" class="print-preview-wrap"><div class="print-preview-sheet">Sedang memuat...</div></div>' +
    '</div>';
    refreshPrintPreview(isPAJ);
}
function refreshPrintPreview(isPAJ){
    var container = document.getElementById('printPreviewContainer');
    var qList = isPAJ ? pajQuestions : questions;
    var pg = qList.filter(q=>q.type==='pg');
    var uraian = qList.filter(q=>q.type==='uraian');
    var logo = 'https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';
    var tp = document.getElementById('prTP').value;

    var html = '<div class="print-preview-sheet"><div class="print-page">' +
        '<div class="kop-surat"><div style="display:flex;align-items:center;justify-content:center;gap:20px"><img src="'+logo+'" alt="Logo" style="height:80px"><div style="text-align:center"><h1 style="font-size:16pt;font-weight:bold;text-transform:uppercase;margin:0">PEMERINTAH KABUPATEN MAJALENGKA</h1><h2 style="font-size:18pt;font-weight:bold;text-transform:uppercase;margin:0">KOREK API KECAMATAN MAJALENGKA</h2></div></div></div>' +
        '<div style="text-align:center;margin-bottom:20px"><h3 style="font-size:14pt;font-weight:bold;text-decoration:underline;text-transform:uppercase;margin:0">'+(isPAJ?'Penilaian Akhir Jenjang (PAJ)':'Sumatif Akhir Tahun')+'</h3><p style="font-size:12pt;margin:5px 0;font-weight:bold">'+getMapelName(isPAJ?'pai':currentUser.mapel)+'</p></div>' +
        '<div style="margin-bottom:20px"><table style="width:100%;font-size:12pt"><tr><td width="100">Nama</td><td width="12">:</td><td style="border-bottom:1px dotted #000"></td></tr><tr><td>Kelas</td><td>:</td><td>'+(isPAJ?'Kelas 6':currentUser.kelas)+'</td></tr><tr><td>Rombel</td><td>:</td><td>'+currentUser.rombel+'</td></tr></table></div>';
    if(tp) html += '<div style="margin-bottom:20px;padding:10px;border-left:4px solid #000;background:#f9f9f9"><strong>Tujuan Pembelajaran:</strong><br><em>'+escHtml(tp)+'</em></div>';

    if(pg.length){
        html += '<div style="font-weight:bold;font-size:12pt;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:10px">I. Pilihan Ganda</div>';
        pg.forEach(function(q,i){
            html += '<div style="margin-bottom:20px;page-break-inside:avoid"><div style="font-weight:bold;float:left;width:30px">'+(i+1)+'.</div><div style="margin-left:30px">'+escHtml(q.text)+'</div>';
            html += '<div style="margin-left:30px;margin-top:5px">';
            var letters = ['a','b','c','d','e'];
            (q.options||[]).forEach(function(opt,oi){ html += '<div style="margin-bottom:5px"><strong>'+letters[oi]+'.</strong> '+escHtml(opt)+'</div>'; });
            html += '</div></div><div style="clear:both"></div>';
        });
    }
    if(uraian.length){
        html += '<div style="font-weight:bold;font-size:12pt;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:10px;margin-top:20px">II. Uraian</div>';
        uraian.forEach(function(q,i){
            html += '<div style="margin-bottom:20px"><div style="font-weight:bold;float:left;width:30px">'+(i+1)+'.</div><div style="margin-left:30px">'+escHtml(q.text)+'</div><div style="margin-left:30px;margin-top:10px;border:1px dashed #bbb;height:80px;background:#fafafa"></div></div><div style="clear:both"></div>';
        });
    }
    html += '</div></div>';
    container.innerHTML = html;
}
function doPrintSoal(isPAJ){
    var sheet = document.querySelector('.print-preview-sheet');
    if(!sheet) return;
    var iframe = document.createElement('iframe');
    iframe.style.position='fixed'; iframe.style.left='-9999px'; iframe.style.top='0'; iframe.style.width='210mm'; iframe.style.height='297mm';
    document.body.appendChild(iframe);
    var doc=iframe.contentDocument||iframe.contentWindow.document;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><title>Cetak</title>');
    doc.write('<style>@page{size:A4 portrait;margin:1.5cm 2cm 2cm 2cm}body{margin:0;padding:0;font-family:"Times New Roman",Times,serif;font-size:12pt;line-height:1.4;color:black;background:white;-webkit-print-color-adjust:exact;print-color-adjust:exact}.kop-surat{text-align:center;padding-bottom:12px;margin-bottom:24px;border-bottom:3px double #000}.kop-surat img{height:80px}.section-heading{font-weight:bold;font-size:12pt;border-bottom:2px solid #000;padding-bottom:4px;margin-bottom:10px}.soal-item{margin-bottom:20px;page-break-inside:avoid}.soal-num{float:left;font-weight:bold;width:30px}.soal-text{margin-left:30px}.opsi-wrapper{margin-left:30px;margin-top:5px}.opsi-row{margin-bottom:5px}.answer-lines{margin-left:30px;border:1px dashed #bbb;height:80px;background:#fafafa}.clearfix::after{content:"";display:table;clear:both}');
    doc.write('</style></head><body>');
    doc.write(sheet.innerHTML);
    doc.write('</body></html>');
    doc.close();
    setTimeout(function(){
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
        setTimeout(function(){document.body.removeChild(iframe);},3000);
    },500);
}
function renderKisi(c){
    c.innerHTML = '<div class="fade-in no-print card"><h3 class="font-bold text-kopAccent mb-4">Kisi-Kisi Soal</h3><div id="kisiPrev" class="print-preview-wrap"></div></div>';
    var qList = questions; 
    var html = '<div class="print-preview-sheet"><table class="print-table" style="width:100%;border-collapse:collapse;margin-top:12px;font-size:10pt"><thead><tr><th style="border:1px solid #000;padding:6px">No</th><th style="border:1px solid #000;padding:6px">TP</th><th style="border:1px solid #000;padding:6px">Indikator</th><th style="border:1px solid #000;padding:6px">Tipe</th><th style="border:1px solid #000;padding:6px">Skor</th></tr></thead><tbody>';
    qList.forEach(function(q,i){ html+='<tr><td style="text-align:center;border:1px solid #000;padding:6px">'+(i+1)+'</td><td style="border:1px solid #000;padding:6px">'+escHtml(q.tp||'-')+'</td><td style="border:1px solid #000;padding:6px">'+escHtml(q.indicator||'-')+'</td><td style="text-align:center;border:1px solid #000;padding:6px">'+(q.type==='pg'?'PG':'Uraian')+'</td><td style="text-align:center;border:1px solid #000;padding:6px">'+q.score+'</td></tr>'; });
    html+='</tbody></table></div>';
    document.getElementById('kisiPrev').innerHTML=html;
}
